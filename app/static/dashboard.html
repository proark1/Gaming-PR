<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Gaming PR Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #16161f;
            --border: #2a2a3a;
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #5a5a72;
            --accent: #7c5cff;
            --accent-light: #9b7fff;
            --green: #22c55e;
            --red: #f87171;
            --radius: 12px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: grid;
            grid-template-columns: 280px 1fr;
            grid-template-rows: 70px 1fr;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(124, 92, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124, 92, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        /* ─── Header ─── */
        header {
            grid-column: 1 / -1;
            position: relative;
            z-index: 20;
            background: rgba(17, 17, 24, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 18px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .header-user {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-info {
            text-align: right;
            font-size: 13px;
        }

        .user-email {
            color: var(--text-primary);
            font-weight: 500;
        }

        .user-role {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .logout-btn {
            background: rgba(248, 113, 113, 0.1);
            color: var(--red);
            border: 1px solid rgba(248, 113, 113, 0.3);
            border-radius: 6px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(248, 113, 113, 0.2);
        }

        /* ─── Sidebar ─── */
        aside {
            grid-row: 2;
            position: relative;
            z-index: 10;
            background: rgba(17, 17, 24, 0.6);
            border-right: 1px solid var(--border);
            padding: 24px 0;
            overflow-y: auto;
        }

        .sidebar-section {
            padding: 0;
            margin-bottom: 8px;
        }

        .sidebar-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 20px 8px;
        }

        .sidebar-menu {
            list-style: none;
        }

        .menu-item {
            padding: 0;
        }

        .menu-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .menu-link:hover {
            color: var(--text-primary);
            background: rgba(124, 92, 255, 0.1);
        }

        .menu-link.active {
            color: var(--accent-light);
            background: rgba(124, 92, 255, 0.15);
            border-left-color: var(--accent);
        }

        .menu-icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        .menu-count {
            margin-left: auto;
            background: rgba(124, 92, 255, 0.2);
            color: var(--accent-light);
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 3px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* ─── Main ─── */
        main {
            grid-row: 2;
            grid-column: 2;
            position: relative;
            z-index: 1;
            overflow-y: auto;
            padding: 40px 32px;
        }

        .content-header {
            margin-bottom: 32px;
        }

        .content-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .content-header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
        }

        .items-list {
            list-style: none;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid rgba(42, 42, 58, 0.4);
            font-size: 13px;
            gap: 16px;
        }

        .item:last-child { border-bottom: none; }

        .item-name {
            font-weight: 500;
            color: var(--text-primary);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-meta {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            align-items: center;
        }

        .badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
            white-space: nowrap;
        }

        .badge-lang {
            background: rgba(124, 92, 255, 0.15);
            color: var(--accent-light);
            font-family: 'JetBrains Mono', monospace;
        }

        .badge-active {
            background: rgba(34, 197, 94, 0.15);
            color: var(--green);
        }

        .badge-inactive {
            background: rgba(248, 113, 113, 0.15);
            color: var(--red);
        }

        .loading, .error, .empty {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .error {
            color: var(--red);
        }

        .error button {
            margin-top: 12px;
            background: transparent;
            color: var(--accent-light);
            border: 1px solid var(--accent);
            border-radius: 4px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
        }

        .error button:hover {
            background: rgba(124, 92, 255, 0.15);
        }

        @media (max-width: 1024px) {
            body { grid-template-columns: 240px 1fr; }
            main { padding: 30px 24px; }
        }

        @media (max-width: 768px) {
            body { grid-template-columns: 1fr; }
            aside { grid-column: 1; grid-row: 1 / 3; height: 70px; width: 100%; padding: 0; display: flex; align-items: center; border-right: none; border-bottom: 1px solid var(--border); overflow-x: auto; overflow-y: hidden; }
            main { grid-row: 2; grid-column: 1; padding: 24px; }
            .sidebar-section { display: none; }
            .sidebar-section:first-child { display: flex; padding: 0 20px; margin: 0; }
            .sidebar-title { display: none; }
            .sidebar-menu { display: flex; gap: 0; }
            .menu-link { padding: 12px 12px; border: none; border-bottom: 2px solid transparent; border-radius: 0; }
            .menu-link.active { border-bottom-color: var(--accent); background: transparent; }
        }
    </style>
</head>
<body>
<div class="bg-grid"></div>

<header>
    <div class="header-logo">
        <div class="logo-icon">GP</div>
        <span>Gaming PR</span>
    </div>
    <div class="header-user">
        <div class="user-info">
            <div class="user-email" id="user-email">—</div>
            <div class="user-role">Administrator</div>
        </div>
        <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
</header>

<aside>
    <div class="sidebar-section">
        <div class="sidebar-title">Content Sources</div>
        <ul class="sidebar-menu">
            <li class="menu-item">
                <a class="menu-link active" onclick="switchView('all')">
                    <span class="menu-icon">📋</span>
                    <span>All Sources</span>
                    <span class="menu-count" id="count-all">0</span>
                </a>
            </li>
            <li class="menu-item">
                <a class="menu-link" onclick="switchView('outlets')">
                    <span class="menu-icon">📰</span>
                    <span>News Outlets</span>
                    <span class="menu-count" id="count-outlets">0</span>
                </a>
            </li>
            <li class="menu-item">
                <a class="menu-link" onclick="switchView('streamers')">
                    <span class="menu-icon">🎥</span>
                    <span>Streamers</span>
                    <span class="menu-count" id="count-streamers">0</span>
                </a>
            </li>
            <li class="menu-item">
                <a class="menu-link" onclick="switchView('vcs')">
                    <span class="menu-icon">💼</span>
                    <span>VCs / Influencers</span>
                    <span class="menu-count" id="count-vcs">0</span>
                </a>
            </li>
        </ul>
    </div>
</aside>

<main>
    <div class="content-header">
        <h1 id="page-title">All Sources</h1>
        <p id="page-desc">Manage all gaming outlets, streamers, and VCs</p>
    </div>

    <div class="panel">
        <div id="content-area">
            <div class="loading">Loading sources...</div>
        </div>
    </div>
</main>

<script>
    // ─── Auth Check ───
    function checkAuth() {
        const token = localStorage.getItem('auth_token');
        if (!token) {
            window.location.href = '/login';
            return;
        }
        verifyToken(token);
    }

    async function verifyToken(token) {
        try {
            const response = await fetch(`/api/auth/verify?token=${token}`);
            if (!response.ok) {
                localStorage.removeItem('auth_token');
                window.location.href = '/login';
                return;
            }
            const data = await response.json();
            document.getElementById('user-email').textContent = data.email;
        } catch (err) {
            localStorage.removeItem('auth_token');
            window.location.href = '/login';
        }
    }

    function logout() {
        localStorage.removeItem('auth_token');
        window.location.href = '/login';
    }

    // ─── Data & Views ───
    let allOutlets = [];
    let currentView = 'all';

    const viewInfo = {
        all: {
            icon: '📋',
            title: 'All Sources',
            desc: 'Manage all gaming outlets, streamers, and VCs',
            filter: () => true,
            countId: 'count-all'
        },
        outlets: {
            icon: '📰',
            title: 'News Outlets',
            desc: 'Gaming news outlets, esports, and gaming industry',
            filter: (o) => !o.category || o.category.includes('gaming') || o.category.includes('news') || o.category.includes('esports') || o.category.includes('console') || o.category.includes('mobile') || o.category.includes('pc'),
            countId: 'count-outlets'
        },
        streamers: {
            icon: '🎥',
            title: 'Streamers',
            desc: 'Gaming content creators and streamers',
            filter: (o) => o.category && o.category.includes('stream'),
            countId: 'count-streamers'
        },
        vcs: {
            icon: '💼',
            title: 'VCs / Influencers',
            desc: 'Venture capitalists and gaming influencers',
            filter: (o) => o.category && (o.category.includes('vc') || o.category.includes('influencer') || o.category.includes('creator')),
            countId: 'count-vcs'
        }
    };

    // ─── View Switching ───
    function switchView(view) {
        currentView = view;

        // Update active menu link
        document.querySelectorAll('.menu-link').forEach(link => {
            link.classList.toggle('active', link.onclick.toString().includes("'" + view + "'"));
        });

        // Better approach: update all links based on view
        const links = document.querySelectorAll('.menu-link');
        links.forEach((link, i) => {
            const views = ['all', 'outlets', 'streamers', 'vcs'];
            link.classList.toggle('active', views[i] === view);
        });

        // Update page header
        const info = viewInfo[view];
        document.getElementById('page-title').textContent = info.title;
        document.getElementById('page-desc').textContent = info.desc;

        // Re-render
        renderView();
    }

    // ─── Data Loading ───
    async function loadOutlets() {
        try {
            const response = await fetch('/api/outlets/');
            const data = await response.json();
            allOutlets = Array.isArray(data) ? data : [];

            // Update counts
            Object.keys(viewInfo).forEach(view => {
                const filtered = allOutlets.filter(viewInfo[view].filter);
                const countEl = document.getElementById(viewInfo[view].countId);
                if (countEl) countEl.textContent = filtered.length;
            });

            renderView();
        } catch (err) {
            document.getElementById('content-area').innerHTML =
                '<div class="error">Failed to load sources<br><button onclick="loadOutlets()">Retry</button></div>';
        }
    }

    function renderView() {
        const info = viewInfo[currentView];
        const filtered = allOutlets.filter(info.filter);

        if (filtered.length === 0) {
            document.getElementById('content-area').innerHTML =
                '<div class="empty">No ' + info.title.toLowerCase() + ' found yet.</div>';
            return;
        }

        let html = '<ul class="items-list">';
        for (const o of filtered) {
            const active = o.is_active ? 'badge-active' : 'badge-inactive';
            const category = (o.category || 'uncategorized').replace(/_/g, ' ');
            html +=
                '<li class="item">' +
                '<span class="item-name" title="' + (o.name || '—') + '">' + (o.name || '—') + '</span>' +
                '<span class="item-meta">' +
                '<span class="badge badge-lang">' + (o.language || '?') + '</span>' +
                '<span class="badge" style="background: rgba(156,163,175,0.15); color: #d1d5db;">' + category.substring(0, 12) + '</span>' +
                '<span class="badge ' + active + '">' + (o.is_active ? 'On' : 'Off') + '</span>' +
                '</span></li>';
        }
        html += '</ul>';
        document.getElementById('content-area').innerHTML = html;
    }

    // ─── Init ───
    checkAuth();
    loadOutlets();
</script>
</body>
</html>
