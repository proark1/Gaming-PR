<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Gaming PR Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #16161f;
            --border: #2a2a3a;
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #5a5a72;
            --accent: #7c5cff;
            --accent-light: #9b7fff;
            --green: #22c55e;
            --red: #f87171;
            --yellow: #fbbf24;
            --blue: #60a5fa;
            --radius: 12px;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: grid;
            grid-template-columns: 220px 1fr;
            grid-template-rows: 56px 1fr;
        }
        .bg-grid {
            position: fixed; inset: 0;
            background-image: linear-gradient(rgba(124,92,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(124,92,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px; z-index: 0; pointer-events: none;
        }
        header {
            grid-column: 1 / -1; position: relative; z-index: 20;
            background: rgba(17,17,24,0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; }
        .logo-icon {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px;
        }
        .header-user { display: flex; align-items: center; gap: 14px; }
        .user-info { text-align: right; font-size: 12px; }
        .user-email { color: var(--text-primary); font-weight: 500; }
        .user-role { color: var(--text-secondary); font-size: 11px; }
        .logout-btn {
            background: rgba(248,113,113,0.1); color: var(--red);
            border: 1px solid rgba(248,113,113,0.3); border-radius: 5px;
            padding: 6px 12px; cursor: pointer; font-size: 12px; font-weight: 600;
        }
        .logout-btn:hover { background: rgba(248,113,113,0.2); }

        /* Sidebar */
        aside {
            grid-row: 2; position: relative; z-index: 10;
            background: rgba(17,17,24,0.6); border-right: 1px solid var(--border);
            padding: 12px 0; overflow-y: auto;
        }
        .sidebar-title {
            font-size: 10px; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 1px; padding: 10px 16px 4px;
        }
        .sidebar-menu { list-style: none; }
        .menu-link {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 16px; color: var(--text-secondary); text-decoration: none;
            cursor: pointer; font-size: 13px; transition: all 0.15s;
            border-left: 3px solid transparent;
        }
        .menu-link:hover { color: var(--text-primary); background: rgba(124,92,255,0.08); }
        .menu-link.active { color: var(--accent-light); background: rgba(124,92,255,0.12); border-left-color: var(--accent); }
        .menu-icon { font-size: 15px; width: 20px; text-align: center; }
        .menu-count {
            margin-left: auto; background: rgba(124,92,255,0.2); color: var(--accent-light);
            font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 3px;
        }

        /* Main */
        main {
            grid-row: 2; grid-column: 2; position: relative; z-index: 1;
            overflow-y: auto; padding: 24px;
        }
        .content-header { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; }
        .content-header h1 { font-size: 22px; font-weight: 700; }
        .content-header p { color: var(--text-secondary); font-size: 13px; }
        .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

        /* Panels & Cards */
        .panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
        .panel h3 { font-size: 14px; font-weight: 600; margin-bottom: 14px; color: var(--accent-light); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .stat-card {
            background: rgba(124,92,255,0.08); border: 1px solid rgba(124,92,255,0.2);
            border-radius: 10px; padding: 16px; text-align: center;
        }
        .stat-card .stat-value { font-size: 28px; font-weight: 800; color: var(--accent-light); }
        .stat-card .stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Items list */
        .items-list { list-style: none; }
        .item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 12px; font-size: 13px; gap: 12px;
            cursor: pointer; border-radius: 8px; transition: all 0.15s;
            border: none; color: inherit; font: inherit; width: 100%;
            background: none; text-align: left;
        }
        .item:hover { background: rgba(124,92,255,0.1); }
        .item.selected { background: rgba(124,92,255,0.18); border-left: 3px solid var(--accent); }
        .item-name { font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-meta { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }

        /* Badges */
        .badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600; white-space: nowrap; }
        .badge-lang { background: rgba(124,92,255,0.15); color: var(--accent-light); }
        .badge-active { background: rgba(34,197,94,0.15); color: var(--green); }
        .badge-inactive { background: rgba(248,113,113,0.15); color: var(--red); }
        .badge-cat { background: rgba(156,163,175,0.12); color: #d1d5db; }
        .badge-info { background: rgba(96,165,250,0.15); color: var(--blue); }
        .badge-warn { background: rgba(251,191,36,0.15); color: var(--yellow); }

        /* Buttons */
        .btn {
            padding: 7px 14px; border-radius: 6px; border: none;
            font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover:not(:disabled) { background: var(--accent-light); }
        .btn-secondary { background: rgba(124,92,255,0.2); color: var(--accent-light); }
        .btn-secondary:hover:not(:disabled) { background: rgba(124,92,255,0.3); }
        .btn-danger { background: rgba(248,113,113,0.15); color: var(--red); }
        .btn-danger:hover:not(:disabled) { background: rgba(248,113,113,0.25); }
        .btn-success { background: rgba(34,197,94,0.15); color: var(--green); }
        .btn-success:hover:not(:disabled) { background: rgba(34,197,94,0.25); }
        .btn-sm { padding: 4px 10px; font-size: 11px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Forms */
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; background: var(--bg-secondary); border: 1px solid var(--border);
            color: var(--text-primary); border-radius: 6px; padding: 8px 10px;
            font-size: 13px; font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(124,92,255,0.2);
        }
        .form-group textarea { resize: vertical; min-height: 70px; font-size: 12px; }
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }

        /* Tables */
        .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .data-table th { text-align: left; padding: 8px 10px; color: var(--text-secondary); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        .data-table td { padding: 8px 10px; border-bottom: 1px solid rgba(42,42,58,0.3); }
        .data-table tr:hover td { background: rgba(124,92,255,0.05); }

        /* Detail panel */
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; font-size: 12px; }
        .detail-item label { color: var(--text-muted); font-size: 10px; text-transform: uppercase; display: block; margin-bottom: 2px; }
        .detail-item span { color: var(--text-primary); font-weight: 500; }
        .detail-full { grid-column: 1 / -1; }
        .tag-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
        .tag { background: rgba(124,92,255,0.12); color: var(--accent-light); padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 600; }

        /* Tabs */
        .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
        .tab {
            padding: 8px 16px; font-size: 12px; font-weight: 600; color: var(--text-secondary);
            cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s;
            background: none; border-top: none; border-left: none; border-right: none;
        }
        .tab:hover { color: var(--text-primary); }
        .tab.active { color: var(--accent-light); border-bottom-color: var(--accent); }

        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100;
            display: flex; align-items: center; justify-content: center;
        }
        .modal {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 24px; max-width: 700px; width: 90%; max-height: 80vh; overflow-y: auto;
        }
        .modal h2 { font-size: 18px; margin-bottom: 16px; }
        .modal-close { float: right; background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 20px; }

        /* Toast */
        .toast {
            position: fixed; bottom: 20px; right: 20px; z-index: 200;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 8px; padding: 12px 20px; font-size: 13px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4); transition: opacity 0.3s;
        }
        .toast.success { border-color: var(--green); color: var(--green); }
        .toast.error { border-color: var(--red); color: var(--red); }

        /* Live feed */
        .feed-item {
            background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2);
            border-radius: 8px; padding: 10px; margin-bottom: 8px; font-size: 12px;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }

        .loading, .error, .empty { padding: 30px 20px; text-align: center; color: var(--text-secondary); font-size: 13px; }
        .error { color: var(--red); }
        .error button { margin-top: 8px; background: transparent; color: var(--accent-light); border: 1px solid var(--accent); border-radius: 4px; padding: 5px 10px; cursor: pointer; font-size: 11px; }
        .hidden { display: none !important; }
        .scroll-y { max-height: 500px; overflow-y: auto; }

        @media (max-width: 900px) {
            body { grid-template-columns: 1fr; }
            aside { display: none; }
            .grid-4 { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
<div class="bg-grid"></div>

<header>
    <div class="header-logo"><div class="logo-icon">GP</div><span>Gaming PR</span></div>
    <div class="header-user">
        <div class="user-info"><div class="user-email" id="user-email">-</div><div class="user-role">Administrator</div></div>
        <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
</header>

<aside>
    <div class="sidebar-title">Sources</div>
    <ul class="sidebar-menu">
        <li><a class="menu-link active" data-section="outlets" onclick="go('outlets')"><span class="menu-icon">📰</span>News Outlets<span class="menu-count" id="cnt-outlets">0</span></a></li>
        <li><a class="menu-link" data-section="streamers" onclick="go('streamers')"><span class="menu-icon">🎥</span>Streamers<span class="menu-count" id="cnt-streamers">0</span></a></li>
        <li><a class="menu-link" data-section="vcs" onclick="go('vcs')"><span class="menu-icon">💼</span>Gaming VCs<span class="menu-count" id="cnt-vcs">0</span></a></li>
    </ul>
    <div class="sidebar-title">Content</div>
    <ul class="sidebar-menu">
        <li><a class="menu-link" data-section="articles" onclick="go('articles')"><span class="menu-icon">📄</span>Articles</a></li>
        <li><a class="menu-link" data-section="outreach" onclick="go('outreach')"><span class="menu-icon">✉️</span>Outreach</a></li>
    </ul>
    <div class="sidebar-title">Operations</div>
    <ul class="sidebar-menu">
        <li><a class="menu-link" data-section="scraper" onclick="go('scraper')"><span class="menu-icon">🔄</span>Scraper</a></li>
        <li><a class="menu-link" data-section="email" onclick="go('email')"><span class="menu-icon">📧</span>Email</a></li>
        <li><a class="menu-link" data-section="webhooks" onclick="go('webhooks')"><span class="menu-icon">🔗</span>Webhooks</a></li>
        <li><a class="menu-link" data-section="export" onclick="go('export')"><span class="menu-icon">📦</span>Export</a></li>
    </ul>
    <div class="sidebar-title">System</div>
    <ul class="sidebar-menu">
        <li><a class="menu-link" data-section="monitoring" onclick="go('monitoring')"><span class="menu-icon">📊</span>Monitoring</a></li>
        <li><a class="menu-link" data-section="livefeed" onclick="go('livefeed')"><span class="menu-icon">⚡</span>Live Feed</a></li>
    </ul>
</aside>

<main id="main-content">
    <div class="loading">Loading...</div>
</main>

<div id="modal-root"></div>
<div id="toast-root"></div>

<script>
// ─── State ───
const token = localStorage.getItem('auth_token');
let section = 'outlets';
let outlets = [], streamers = [], vcs = [];
let selectedItem = null;
let ws = null;

// ─── Auth ───
async function checkAuth() {
    if (!token) { window.location.href = '/login'; return; }
    try {
        const r = await fetch(`/api/auth/verify?token=${token}`);
        if (!r.ok) throw 0;
        const d = await r.json();
        document.getElementById('user-email').textContent = d.email;
    } catch { localStorage.removeItem('auth_token'); window.location.href = '/login'; }
}
function logout() { localStorage.removeItem('auth_token'); window.location.href = '/login'; }

// ─── Navigation ───
function go(s) {
    section = s; selectedItem = null;
    document.querySelectorAll('.menu-link').forEach(l => l.classList.toggle('active', l.dataset.section === s));
    render();
}

// ─── Toast ───
function toast(msg, type = 'success') {
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = msg;
    document.getElementById('toast-root').appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
}

// ─── Modal ───
function showModal(title, html) {
    document.getElementById('modal-root').innerHTML =
        `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><button class="modal-close" onclick="closeModal()">✕</button><h2>${title}</h2>${html}</div></div>`;
}
function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

// ─── API Helpers ───
async function api(url, opts = {}) {
    const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const r = await fetch(url, { ...opts, headers });
    if (!r.ok) {
        const t = await r.text().catch(() => '');
        throw new Error(t || `HTTP ${r.status}`);
    }
    if (r.status === 204) return null;
    return r.json();
}

// ─── Data Loading ───
async function loadOutlets() { try { outlets = await api('/api/outlets/'); } catch { outlets = []; } }
async function loadStreamers() { try { streamers = await api('/api/streamers/'); } catch { streamers = []; } }
async function loadVCs() { try { vcs = await api('/api/gaming-vcs/'); } catch { vcs = []; } }

function updateCounts() {
    document.getElementById('cnt-outlets').textContent = outlets.length;
    document.getElementById('cnt-streamers').textContent = streamers.length;
    document.getElementById('cnt-vcs').textContent = vcs.length;
}

// ─── Render Router ───
function render() {
    const m = document.getElementById('main-content');
    const renderers = { outlets: renderOutlets, streamers: renderStreamers, vcs: renderVCs, articles: renderArticles, outreach: renderOutreach, scraper: renderScraper, email: renderEmail, webhooks: renderWebhooks, export: renderExport, monitoring: renderMonitoring, livefeed: renderLiveFeed };
    (renderers[section] || renderOutlets)(m);
}

// ─── Outlets Section ───
function renderOutlets(m) {
    if (selectedItem && selectedItem._type === 'outlet') return renderOutletDetail(m);
    m.innerHTML = `
        <div class="content-header"><div><h1>News Outlets</h1><p>Manage ${outlets.length} gaming news outlets</p></div>
        <div class="header-actions"><button class="btn btn-primary" onclick="showCreateOutletForm()">+ Add Outlet</button><button class="btn btn-secondary" onclick="scrapeAllOutlets()">Scrape All</button></div></div>
        <div class="panel"><div id="outlets-list">${renderItemsList(outlets, 'outlet')}</div></div>`;
}

function renderOutletDetail(m) {
    const o = selectedItem;
    m.innerHTML = `
        <div class="content-header"><div><h1><button class="btn btn-sm btn-secondary" onclick="selectedItem=null;render()" style="margin-right:8px;">← Back</button>${esc(o.name)}</h1><p>${esc(o.url)}</p></div>
        <div class="header-actions">
            <button class="btn btn-secondary btn-sm" onclick="scrapeItem('outlet',${o.id})">Scrape Website</button>
            <button class="btn btn-primary btn-sm" onclick="showOutreachForm('outlet',${o.id},'${esc(o.name)}')">Generate Outreach</button>
            <button class="btn btn-danger btn-sm" onclick="deleteItem('outlets',${o.id})">Delete</button>
        </div></div>
        <div class="tabs">
            <button class="tab active" onclick="showOutletTab('info',this)">Info</button>
            <button class="tab" onclick="showOutletTab('editorial',this)">Editorial</button>
            <button class="tab" onclick="showOutletTab('audience',this)">Audience</button>
            <button class="tab" onclick="showOutletTab('coverage',this)">Coverage</button>
            <button class="tab" onclick="showOutletTab('messages',this)">Messages</button>
        </div>
        <div id="detail-tab-content">${renderOutletInfo(o)}</div>`;
}

function showOutletTab(tab, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    const o = selectedItem;
    const c = document.getElementById('detail-tab-content');
    if (tab === 'info') c.innerHTML = renderOutletInfo(o);
    else if (tab === 'editorial') c.innerHTML = renderOutletEditorial(o);
    else if (tab === 'audience') c.innerHTML = renderOutletAudience(o);
    else if (tab === 'coverage') c.innerHTML = renderOutletCoverage(o);
    else if (tab === 'messages') loadItemMessages('outlet', o.id);
}

function renderOutletInfo(o) {
    return `<div class="panel"><h3>Basic Information</h3><div class="detail-grid">
        ${dv('Name', o.name)}${dv('URL', o.url)}${dv('Language', o.language)}${dv('Region', o.region)}
        ${dv('Country', o.country)}${dv('Category', o.category)}${dv('Priority', o.priority)}${dv('Scraper Type', o.scraper_type)}
        ${dv('Active', o.is_active ? 'Yes' : 'No')}${dv('Monthly Visitors', fmt(o.monthly_visitors))}
        ${dv('Contact Email', o.contact_email)}${dv('Description', o.description, true)}
        </div></div>
        <div class="panel"><h3>Social Media</h3><div class="detail-grid">
        ${dv('Twitter', o.social_twitter)}${dv('Twitter Followers', fmt(o.social_twitter_followers))}
        ${dv('Facebook', o.social_facebook)}${dv('Facebook Followers', fmt(o.social_facebook_followers))}
        ${dv('YouTube', o.social_youtube)}${dv('YouTube Subs', fmt(o.social_youtube_subscribers))}
        ${dv('Instagram', o.social_instagram)}${dv('Instagram Followers', fmt(o.social_instagram_followers))}
        ${dv('TikTok', o.social_tiktok)}${dv('Discord', o.social_discord)}
        </div></div>
        <div class="panel"><h3>Scraping Stats</h3><div class="detail-grid">
        ${dv('Total Scraped', o.total_articles_scraped)}${dv('Avg Per Scrape', o.avg_articles_per_scrape?.toFixed(1))}
        ${dv('Last Scraped', fmtDate(o.last_scraped_at))}${dv('Last Success', fmtDate(o.last_successful_scrape_at))}
        ${dv('Consecutive Failures', o.consecutive_failures)}${dv('Created', fmtDate(o.created_at))}
        </div></div>`;
}

function renderOutletEditorial(o) {
    return `<div class="panel"><h3>Editorial Details</h3><div class="detail-grid">
        ${dv('Editor-in-Chief', o.editor_in_chief)}${dv('Editor Email', o.editor_email)}
        ${dv('Submission Email', o.submission_email)}${dv('Submission Guidelines', o.submission_guidelines_url)}
        ${dv('Preferred Contact', o.preferred_contact_method)}${dv('Response Time', o.typical_response_time)}
        ${dv('Press Page', o.press_page_url)}${dv('Press Kit Reqs', o.press_kit_requirements, true)}
        ${dvTags('Editorial Focus', o.editorial_focus)}
        ${dvTags('Content Types Accepted', o.content_types_accepted)}
        </div></div>
        <div class="panel"><h3>Staff</h3><div class="detail-grid">
        ${dv('Freelance Opportunities', o.freelance_opportunities != null ? (o.freelance_opportunities ? 'Yes' : 'No') : '-')}
        ${dv('Freelance Rate', o.freelance_rate)}
        ${dvJson('Staff Writers', o.staff_writers)}
        </div></div>`;
}

function renderOutletAudience(o) {
    return `<div class="panel"><h3>Audience & Reach</h3><div class="detail-grid">
        ${dv('Alexa Rank', fmt(o.alexa_rank))}${dv('Domain Authority', o.domain_authority)}
        ${dv('Newsletter Subs', fmt(o.newsletter_subscribers))}${dv('Age Range', o.audience_age_range)}
        ${dv('Podcast', o.podcast_name)}${dv('Podcast URL', o.podcast_url)}
        ${dv('YouTube Channel', o.youtube_channel_url)}

    sel.innerHTML = items.map(i => `<option value="${i.id}">${esc(i.name)}</option>`).join('');

async function generateOutreach() {
    const type = document.getElementById('or-type').value;
    const targetId = parseInt(document.getElementById('or-target').value);
    const body = {
        target_type: type, target_id: targetId,
        message_type: document.getElementById('or-msg-type').value,
        tone: document.getElementById('or-tone').value,
        game_title: document.getElementById('or-game').value,
        game_description: document.getElementById('or-desc').value,
        key_selling_points: document.getElementById('or-points').value.split(',').map(s => s.trim()).filter(Boolean)
    };
    try {
        const msg = await api('/api/outreach/generate', { method: 'POST', body: JSON.stringify(body) });
        closeModal();
        toast('Outreach message generated!');
        if (section === 'outreach') renderOutreach(document.getElementById('main-content'));
        else showModal('Generated Message', `<div class="panel"><h3>${esc(msg.subject)}</h3><div style="font-size:13px;line-height:1.7;white-space:pre-wrap">${esc(msg.body_text || msg.body_html || '')}</div></div>`);

async function loadScraperTab(tab, btn) {
    if (btn) { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); btn.classList.add('active'); }
    const el = document.getElementById('scraper-content');
    el.innerHTML = '<div class="loading">Loading...</div>';
    try {
        if (tab === 'stats') {
            const s = await api('/api/scraper/stats');
            el.innerHTML = `<div class="grid-4">${statCard(s.total_articles || 0, 'Articles')}${statCard(s.total_outlets || 0, 'Outlets')}${statCard(s.total_jobs || 0, 'Jobs')}${statCard(s.articles_today || 0, 'Today')}</div>`;
        } else if (tab === 'jobs') {
            const jobs = await api('/api/scraper/jobs');
            const list = Array.isArray(jobs) ? jobs : [];
            el.innerHTML = list.length ? `<div class="panel"><table class="data-table"><thead><tr><th>ID</th><th>Status</th><th>Outlets</th><th>New Articles</th><th>Started</th></tr></thead><tbody>
                ${list.slice(0, 50).map(j => `<tr><td>${j.id}</td><td><span class="badge badge-${j.status==='completed'?'active':j.status==='failed'?'inactive':'info'}">${j.status}</span></td>
                <td>${j.total_outlets || '-'}</td><td>${j.total_new_articles || 0}</td><td>${fmtDate(j.started_at)}</td></tr>`).join('')}</tbody></table></div>` : '<div class="empty">No jobs</div>';
        } else if (tab === 'circuit') {
            const cb = await api('/api/scraper/circuit-breakers');
            const entries = typeof cb === 'object' ? Object.entries(cb) : [];
            el.innerHTML = entries.length ? `<div class="panel"><table class="data-table"><thead><tr><th>Outlet</th><th>State</th><th>Failures</th><th>Actions</th></tr></thead><tbody>
                ${entries.map(([k, v]) => `<tr><td>${esc(k)}</td><td><span class="badge badge-${v.state==='closed'?'active':v.state==='open'?'inactive':'warn'}">${v.state}</span></td>
                <td>${v.failure_count || 0}</td><td>${v.state !== 'closed' ? `<button class="btn btn-sm btn-success" onclick="resetCircuitBreaker(${v.outlet_id || k})">Reset</button>` : '-'}</td></tr>`).join('')}</tbody></table></div>` : '<div class="empty">No circuit breaker data</div>';
        } else if (tab === 'retry') {
            const rq = await api('/api/scraper/retry-queue');
            el.innerHTML = `<div class="panel"><div class="detail-grid">${dv('Pending', rq.pending || 0)}${dv('Processing', rq.processing || 0)}${dv('Completed', rq.completed || 0)}${dv('Failed', rq.failed || 0)}</div></div>`;
        } else if (tab === 'schedule') {
            const sch = await api('/api/scraper/schedule');
            const entries = Array.isArray(sch) ? sch : Object.entries(sch || {}).map(([k,v]) => ({name:k,...v}));
            el.innerHTML = entries.length ? `<div class="panel"><table class="data-table"><thead><tr><th>Outlet</th><th>Interval</th><th>Next Scrape</th><th>Priority</th></tr></thead><tbody>
                ${entries.slice(0,50).map(s => `<tr><td>${esc(s.name || s.outlet_name || '-')}</td><td>${s.interval_minutes || s.interval || '-'}min</td><td>${fmtDate(s.next_scrape_at || s.next_run)}</td><td>${s.priority || '-'}</td></tr>`).join('')}</tbody></table></div>` : '<div class="empty">No schedule data</div>';
        }
    } catch (e) { el.innerHTML = `<div class="error">${esc(e.message)}</div>`; }
}

async function runScrape() {
    toast('Starting scrape...');
    try { const r = await api('/api/scraper/run', { method: 'POST' }); toast(`Scrape complete: ${r.total_new_articles || 0} new articles`); } catch (e) { toast('Scrape failed: ' + e.message, 'error'); }
}

async function processRetryQueue() {
    try { const r = await api('/api/scraper/retry-queue/process', { method: 'POST' }); toast(`Processed ${r.processed || 0} items`); } catch (e) { toast(e.message, 'error'); }

// ─── Live Feed Section ───
function renderLiveFeed(m) {
    m.innerHTML = `<div class="content-header"><div><h1>Live Feed</h1><p>Real-time article stream via WebSocket</p></div>
        <div class="header-actions"><button class="btn btn-primary" id="ws-btn" onclick="toggleWS()">Connect</button></div></div>
        <div class="panel"><div id="ws-status" style="font-size:12px;color:var(--text-secondary);margin-bottom:12px">Disconnected</div>
        <div id="ws-feed" class="scroll-y" style="max-height:600px"></div></div>`;
    if (ws) document.getElementById('ws-status').textContent = 'Connected';
}

function toggleWS() {
    if (ws) { ws.close(); ws = null; document.getElementById('ws-status').textContent = 'Disconnected'; document.getElementById('ws-btn').textContent = 'Connect'; return; }
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws/feed`);
    ws.onopen = () => { document.getElementById('ws-status').textContent = 'Connected'; document.getElementById('ws-btn').textContent = 'Disconnect'; };
    ws.onmessage = (e) => {
        try {
            const data = JSON.parse(e.data);
            const feed = document.getElementById('ws-feed');
            if (feed) {
                const item = document.createElement('div');
                item.className = 'feed-item';
                item.innerHTML = `<strong>${esc(data.title || 'New Article')}</strong><br><small>${esc(data.outlet_name || '')} - ${fmtDate(data.published_at)}</small>`;
                feed.prepend(item);
                if (feed.children.length > 100) feed.lastChild.remove();
            }
        } catch {}
    };
    ws.onclose = () => { ws = null; const s = document.getElementById('ws-status'); if (s) s.textContent = 'Disconnected'; const b = document.getElementById('ws-btn'); if (b) b.textContent = 'Connect'; };
}

// ─── Shared Helpers ───
function renderItemsList(items, type) {
    if (!items.length) return `<div class="empty">No ${type}s found</div>`;
    return items.map(o => {
        const lang = o.language || '';
        const cat = (o.category || o.firm_type || o.platform || '').replace(/_/g, ' ');
        const active = o.is_active !== false;
        return `<button class="item ${selectedItem && selectedItem.id === o.id && selectedItem._type === type ? 'selected' : ''}" onclick="selectItem('${type}',${o.id})" style="width:100%;text-align:left">
            <span class="item-name" title="${esc(o.name)}">${esc(o.name)}</span>
            <span class="item-meta">
                ${lang ? `<span class="badge badge-lang">${lang}</span>` : ''}
                ${cat ? `<span class="badge badge-cat">${cat.substring(0, 14)}</span>` : ''}
                <span class="badge badge-${active ? 'active' : 'inactive'}">${active ? 'On' : 'Off'}</span>
            </span></button>`;
    }).join('');
}

function selectItem(type, id) {
    const src = type === 'outlet' ? outlets : type === 'streamer' ? streamers : vcs;
    selectedItem = src.find(i => i.id === id);
    if (selectedItem) selectedItem._type = type;
    render();
}

async function scrapeItem(type, id) {
    toast('Scraping...');
    try {
        const url = type === 'outlet' ? `/api/outreach/scrape/outlet/${id}` : type === 'streamer' ? `/api/outreach/scrape/streamer/${id}` : `/api/outreach/scrape/gaming-vc/${id}`;
        await api(url, { method: 'POST' });
        toast('Scrape complete!');
        await Promise.all([loadOutlets(), loadStreamers(), loadVCs()]);
        if (selectedItem) { const src = type === 'outlet' ? outlets : type === 'streamer' ? streamers : vcs; const fresh = src.find(i => i.id === id); if (fresh) { fresh._type = type; selectedItem = fresh; } }
        render();
    } catch (e) { toast('Scrape failed: ' + e.message, 'error'); }
}

// ─── Formatting helpers ───
function esc(s) { if (s == null) return '-'; const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
function fmt(n) { return n != null ? Number(n).toLocaleString() : '-'; }
function fmtDate(d) { if (!d) return '-'; try { return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' }); } catch { return d; } }
function dv(label, val, full) { return `<div class="detail-item ${full ? 'detail-full' : ''}"><label>${esc(label)}</label><span>${val != null && val !== '' ? esc(String(val)) : '-'}</span></div>`; }
function dvTags(label, arr) { if (!Array.isArray(arr) || !arr.length) return dv(label, '-', true); return `<div class="detail-item detail-full"><label>${esc(label)}</label><div class="tag-list">${arr.map(t => `<span class="tag">${esc(typeof t === 'object' ? JSON.stringify(t) : t)}</span>`).join('')}</div></div>`; }
function dvJson(label, val) { if (!val || (Array.isArray(val) && !val.length)) return dv(label, '-', true); return `<div class="detail-item detail-full"><label>${esc(label)}</label><pre style="font-size:11px;color:var(--text-secondary);white-space:pre-wrap;max-height:200px;overflow-y:auto">${esc(JSON.stringify(val, null, 2))}</pre></div>`; }
function statCard(value, label) { return `<div class="stat-card"><div class="stat-value">${value}</div><div class="stat-label">${label}</div></div>`; }

    checkAuth();

    updateCounts();
    render();
}
