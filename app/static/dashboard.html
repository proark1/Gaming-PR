<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Gaming PR Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #16161f;
            --border: #2a2a3a;
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #5a5a72;
            --accent: #7c5cff;
            --accent-light: #9b7fff;
            --green: #22c55e;
            --red: #f87171;
            --radius: 12px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: grid;
            grid-template-columns: 280px 1fr 360px;
            grid-template-rows: 70px 1fr;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(124, 92, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124, 92, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        /* ─── Header ─── */
        header {
            grid-column: 1 / -1;
            position: relative;
            z-index: 20;
            background: rgba(17, 17, 24, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 18px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .header-user {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-info {
            text-align: right;
            font-size: 13px;
        }

        .user-email {
            color: var(--text-primary);
            font-weight: 500;
        }

        .user-role {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .logout-btn {
            background: rgba(248, 113, 113, 0.1);
            color: var(--red);
            border: 1px solid rgba(248, 113, 113, 0.3);
            border-radius: 6px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(248, 113, 113, 0.2);
        }

        /* ─── Sidebar ─── */
        aside {
            grid-row: 2;
            position: relative;
            z-index: 10;
            background: rgba(17, 17, 24, 0.6);
            border-right: 1px solid var(--border);
            padding: 24px 0;
            overflow-y: auto;
        }

        .sidebar-section {
            padding: 0;
            margin-bottom: 8px;
        }

        .sidebar-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 20px 8px;
        }

        .sidebar-menu {
            list-style: none;
        }

        .menu-item {
            padding: 0;
        }

        .menu-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .menu-link:hover {
            color: var(--text-primary);
            background: rgba(124, 92, 255, 0.1);
        }

        .menu-link.active {
            color: var(--accent-light);
            background: rgba(124, 92, 255, 0.15);
            border-left-color: var(--accent);
        }

        .menu-icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        .menu-count {
            margin-left: auto;
            background: rgba(124, 92, 255, 0.2);
            color: var(--accent-light);
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 3px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* ─── Main ─── */
        main {
            grid-row: 2;
            grid-column: 2;
            position: relative;
            z-index: 1;
            overflow-y: auto;
            padding: 40px 32px;
        }

        .content-header {
            margin-bottom: 32px;
        }

        .content-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .content-header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
        }

        .items-list {
            list-style: none;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 12px;
            border-bottom: 1px solid rgba(42, 42, 58, 0.4);
            font-size: 13px;
            gap: 16px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .item:hover {
            background: rgba(124, 92, 255, 0.08);
        }

        .item.selected {
            background: rgba(124, 92, 255, 0.15);
            border-left: 3px solid var(--accent);
        }

        .item:last-child { border-bottom: none; }

        .item-name {
            font-weight: 500;
            color: var(--text-primary);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-meta {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            align-items: center;
        }

        .badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
            white-space: nowrap;
        }

        .badge-lang {
            background: rgba(124, 92, 255, 0.15);
            color: var(--accent-light);
            font-family: 'JetBrains Mono', monospace;
        }

        .badge-active {
            background: rgba(34, 197, 94, 0.15);
            color: var(--green);
        }

        .badge-inactive {
            background: rgba(248, 113, 113, 0.15);
            color: var(--red);
        }

        .loading, .error, .empty {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .error {
            color: var(--red);
        }

        .error button {
            margin-top: 12px;
            background: transparent;
            color: var(--accent-light);
            border: 1px solid var(--accent);
            border-radius: 4px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
        }

        .error button:hover {
            background: rgba(124, 92, 255, 0.15);
        }

        /* ─── Message Panel ─── */
        .message-panel {
            grid-row: 2;
            grid-column: 3;
            background: var(--bg-card);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 5;
        }

        .message-panel.hidden {
            display: none;
        }

        .panel-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h2 {
            font-size: 16px;
            font-weight: 600;
            margin: 0;
        }

        .panel-header-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            margin: 4px 0 0;
        }

        .close-panel {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 20px;
            padding: 4px;
            transition: color 0.2s;
        }

        .close-panel:hover {
            color: var(--text-primary);
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .compose-section {
            background: rgba(124, 92, 255, 0.1);
            border: 1px solid rgba(124, 92, 255, 0.3);
            border-radius: 8px;
            padding: 16px;
        }

        .compose-section h3 {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--accent-light);
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 13px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(124, 92, 255, 0.2);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn {
            flex: 1;
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-light);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(124, 92, 255, 0.2);
            color: var(--accent-light);
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(124, 92, 255, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .messages-section {
            flex: 1;
            min-height: 200px;
        }

        .messages-section h3 {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-secondary);
        }

        .message-item {
            background: rgba(124, 92, 255, 0.08);
            border: 1px solid rgba(124, 92, 255, 0.2);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .message-item-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .message-item-subject {
            font-weight: 600;
            color: var(--text-primary);
        }

        .message-item-status {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 3px;
        }

        .status-draft {
            background: rgba(156, 163, 175, 0.2);
            color: #d1d5db;
        }

        .status-sent {
            background: rgba(34, 197, 94, 0.2);
            color: var(--green);
        }

        .status-failed {
            background: rgba(248, 113, 113, 0.2);
            color: var(--red);
        }

        .message-item-body {
            color: var(--text-secondary);
            line-height: 1.4;
            margin-bottom: 6px;
        }

        .message-item-time {
            color: var(--text-muted);
            font-size: 11px;
        }

        .no-outlet {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            text-align: center;
            padding: 40px 20px;
        }

        .no-outlet-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.6;
        }

        @media (max-width: 1024px) {
            body { grid-template-columns: 240px 1fr; }
            .message-panel { display: none; }
            main { padding: 30px 24px; }
        }

        @media (max-width: 768px) {
            body { grid-template-columns: 1fr; }
            .message-panel { display: none; }
            aside { grid-column: 1; grid-row: 1 / 3; height: 70px; width: 100%; padding: 0; display: flex; align-items: center; border-right: none; border-bottom: 1px solid var(--border); overflow-x: auto; overflow-y: hidden; }
            main { grid-row: 2; grid-column: 1; padding: 24px; }
            .sidebar-section { display: none; }
            .sidebar-section:first-child { display: flex; padding: 0 20px; margin: 0; }
            .sidebar-title { display: none; }
            .sidebar-menu { display: flex; gap: 0; }
            .menu-link { padding: 12px 12px; border: none; border-bottom: 2px solid transparent; border-radius: 0; }
            .menu-link.active { border-bottom-color: var(--accent); background: transparent; }
        }
    </style>
</head>
<body>
<div class="bg-grid"></div>

<header>
    <div class="header-logo">
        <div class="logo-icon">GP</div>
        <span>Gaming PR</span>
    </div>
    <div class="header-user">
        <div class="user-info">
            <div class="user-email" id="user-email">—</div>
            <div class="user-role">Administrator</div>
        </div>
        <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
</header>

<aside>
    <div class="sidebar-section">
        <div class="sidebar-title">Content Sources</div>
        <ul class="sidebar-menu">
            <li class="menu-item">
                <a class="menu-link active" onclick="switchView('all')">
                    <span class="menu-icon">📋</span>
                    <span>All Sources</span>
                    <span class="menu-count" id="count-all">0</span>
                </a>
            </li>
            <li class="menu-item">
                <a class="menu-link" onclick="switchView('outlets')">
                    <span class="menu-icon">📰</span>
                    <span>News Outlets</span>
                    <span class="menu-count" id="count-outlets">0</span>
                </a>
            </li>
            <li class="menu-item">
                <a class="menu-link" onclick="switchView('streamers')">
                    <span class="menu-icon">🎥</span>
                    <span>Streamers</span>
                    <span class="menu-count" id="count-streamers">0</span>
                </a>
            </li>
            <li class="menu-item">
                <a class="menu-link" onclick="switchView('vcs')">
                    <span class="menu-icon">💼</span>
                    <span>VCs / Influencers</span>
                    <span class="menu-count" id="count-vcs">0</span>
                </a>
            </li>
        </ul>
    </div>
</aside>

<main>
    <div class="content-header">
        <h1 id="page-title">All Sources</h1>
        <p id="page-desc">Manage all gaming outlets, streamers, and VCs</p>
    </div>

    <div class="panel">
        <div id="content-area">
            <div class="loading">Loading sources...</div>
        </div>
    </div>
</main>

<div class="message-panel hidden" id="message-panel">
    <div class="panel-header">
        <div>
            <h2 id="panel-outlet-name">—</h2>
            <div class="panel-header-subtitle" id="panel-outlet-category">—</div>
        </div>
        <button class="close-panel" onclick="closeMessagePanel()">✕</button>
    </div>
    <div class="panel-content">
        <div class="compose-section">
            <h3>✉️ Compose Message</h3>
            <div class="form-group">
                <label>Subject</label>
                <input type="text" id="compose-subject" placeholder="E.g., Partnership Inquiry">
            </div>
            <div class="form-group">
                <label>Type</label>
                <select id="compose-type">
                    <option value="inquiry">General Inquiry</option>
                    <option value="interview_request">Interview Request</option>
                    <option value="partnership">Partnership Offer</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea id="compose-body" placeholder="Write your message here..."></textarea>
            </div>
            <div class="button-group">
                <button class="btn btn-secondary" id="btn-draft" onclick="saveDraft()">Save Draft</button>
                <button class="btn btn-primary" id="btn-send" onclick="sendMessage()">Send</button>
            </div>
        </div>

        <div class="messages-section">
            <h3>📋 Recent Messages</h3>
            <div id="messages-list"></div>
        </div>
    </div>
</div>

<script>
    // ─── Auth Check ───
    function checkAuth() {
        const token = localStorage.getItem('auth_token');
        if (!token) {
            window.location.href = '/login';
            return;
        }
        verifyToken(token);
    }

    async function verifyToken(token) {
        try {
            const response = await fetch(`/api/auth/verify?token=${token}`);
            if (!response.ok) {
                localStorage.removeItem('auth_token');
                window.location.href = '/login';
                return;
            }
            const data = await response.json();
            document.getElementById('user-email').textContent = data.email;
        } catch (err) {
            localStorage.removeItem('auth_token');
            window.location.href = '/login';
        }
    }

    function logout() {
        localStorage.removeItem('auth_token');
        window.location.href = '/login';
    }

    // ─── Data & Views ───
    let allOutlets = [];
    let currentView = 'all';
    let selectedOutlet = null;
    const token = localStorage.getItem('auth_token');

    const viewInfo = {
        all: {
            icon: '📋',
            title: 'All Sources',
            desc: 'Manage all gaming outlets, streamers, and VCs',
            filter: () => true,
            countId: 'count-all'
        },
        outlets: {
            icon: '📰',
            title: 'News Outlets',
            desc: 'Gaming news outlets, esports, and gaming industry',
            filter: (o) => !o.category || o.category.includes('gaming') || o.category.includes('news') || o.category.includes('esports') || o.category.includes('console') || o.category.includes('mobile') || o.category.includes('pc'),
            countId: 'count-outlets'
        },
        streamers: {
            icon: '🎥',
            title: 'Streamers',
            desc: 'Gaming content creators and streamers',
            filter: (o) => o.category && o.category.includes('stream'),
            countId: 'count-streamers'
        },
        vcs: {
            icon: '💼',
            title: 'VCs / Influencers',
            desc: 'Venture capitalists and gaming influencers',
            filter: (o) => o.category && (o.category.includes('vc') || o.category.includes('influencer') || o.category.includes('creator')),
            countId: 'count-vcs'
        }
    };

    // ─── View Switching ───
    function switchView(view) {
        currentView = view;

        // Update active menu link
        document.querySelectorAll('.menu-link').forEach(link => {
            link.classList.toggle('active', link.onclick.toString().includes("'" + view + "'"));
        });

        // Better approach: update all links based on view
        const links = document.querySelectorAll('.menu-link');
        links.forEach((link, i) => {
            const views = ['all', 'outlets', 'streamers', 'vcs'];
            link.classList.toggle('active', views[i] === view);
        });

        // Update page header
        const info = viewInfo[view];
        document.getElementById('page-title').textContent = info.title;
        document.getElementById('page-desc').textContent = info.desc;

        // Re-render
        renderView();
    }

    // ─── Data Loading ───
    async function loadOutlets() {
        try {
            const response = await fetch('/api/outlets/');
            const data = await response.json();
            allOutlets = Array.isArray(data) ? data : [];

            // Update counts
            Object.keys(viewInfo).forEach(view => {
                const filtered = allOutlets.filter(viewInfo[view].filter);
                const countEl = document.getElementById(viewInfo[view].countId);
                if (countEl) countEl.textContent = filtered.length;
            });

            renderView();
        } catch (err) {
            document.getElementById('content-area').innerHTML =
                '<div class="error">Failed to load sources<br><button onclick="loadOutlets()">Retry</button></div>';
        }
    }

    function renderView() {
        const info = viewInfo[currentView];
        const filtered = allOutlets.filter(info.filter);

        if (filtered.length === 0) {
            document.getElementById('content-area').innerHTML =
                '<div class="empty">No ' + info.title.toLowerCase() + ' found yet.</div>';
            return;
        }

        let html = '<ul class="items-list">';
        for (const o of filtered) {
            const active = o.is_active ? 'badge-active' : 'badge-inactive';
            const category = (o.category || 'uncategorized').replace(/_/g, ' ');
            const selected = selectedOutlet && selectedOutlet.id === o.id ? 'selected' : '';
            html +=
                '<li class="item ' + selected + '" onclick="selectOutlet(' + o.id + ')">' +
                '<span class="item-name" title="' + (o.name || '—') + '">' + (o.name || '—') + '</span>' +
                '<span class="item-meta">' +
                '<span class="badge badge-lang">' + (o.language || '?') + '</span>' +
                '<span class="badge" style="background: rgba(156,163,175,0.15); color: #d1d5db;">' + category.substring(0, 12) + '</span>' +
                '<span class="badge ' + active + '">' + (o.is_active ? 'On' : 'Off') + '</span>' +
                '</span></li>';
        }
        html += '</ul>';
        document.getElementById('content-area').innerHTML = html;
    }

    // ─── Messaging ───
    function selectOutlet(outletId) {
        selectedOutlet = allOutlets.find(o => o.id === outletId);
        if (!selectedOutlet) return;

        // Update panel header
        const category = (selectedOutlet.category || 'uncategorized').replace(/_/g, ' ');
        document.getElementById('panel-outlet-name').textContent = selectedOutlet.name || '—';
        document.getElementById('panel-outlet-category').textContent = category;

        // Clear form
        document.getElementById('compose-subject').value = '';
        document.getElementById('compose-body').value = '';
        document.getElementById('compose-type').value = 'inquiry';

        // Show panel
        document.getElementById('message-panel').classList.remove('hidden');

        // Load messages for this outlet
        loadOutletMessages();

        // Re-render to highlight selected item
        renderView();
    }

    function closeMessagePanel() {
        selectedOutlet = null;
        document.getElementById('message-panel').classList.add('hidden');
        renderView();
    }

    async function loadOutletMessages() {
        if (!selectedOutlet) return;
        const list = document.getElementById('messages-list');
        list.innerHTML = '<div class="loading">Loading messages...</div>';

        try {
            const response = await fetch(
                `/api/outlets/${selectedOutlet.id}/messages?token=${token}`
            );
            if (!response.ok) throw new Error('Failed to load messages');
            const messages = await response.json();

            if (!Array.isArray(messages) || messages.length === 0) {
                list.innerHTML = '<div style="color: var(--text-secondary); font-size: 12px; text-align: center; padding: 20px;">No messages yet</div>';
                return;
            }

            let html = '';
            for (const msg of messages) {
                const status = msg.status || 'draft';
                const time = new Date(msg.created_at).toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                html +=
                    '<div class="message-item">' +
                    '<div class="message-item-header">' +
                    '<span class="message-item-subject">' + (msg.subject || '(no subject)') + '</span>' +
                    '<span class="message-item-status status-' + status + '">' + status.toUpperCase() + '</span>' +
                    '</div>' +
                    '<div class="message-item-body">' + (msg.body || '').substring(0, 100) + (msg.body && msg.body.length > 100 ? '...' : '') + '</div>' +
                    '<div class="message-item-time">' + time + '</div>' +
                    '</div>';
            }
            list.innerHTML = html;
        } catch (err) {
            list.innerHTML = '<div class="error">Failed to load messages<br><button onclick="loadOutletMessages()" style="margin-top: 8px;">Retry</button></div>';
        }
    }

    async function saveDraft() {
        if (!selectedOutlet) {
            alert('Please select an outlet first');
            return;
        }

        const subject = document.getElementById('compose-subject').value.trim();
        const body = document.getElementById('compose-body').value.trim();
        const messageType = document.getElementById('compose-type').value;

        if (!subject || !body) {
            alert('Please fill in subject and message');
            return;
        }

        const btn = document.getElementById('btn-draft');
        btn.disabled = true;
        btn.textContent = 'Saving...';

        try {
            const response = await fetch('/api/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    outlet_id: selectedOutlet.id,
                    subject: subject,
                    body: body,
                    message_type: messageType
                })
            });

            if (!response.ok) throw new Error('Failed to save draft');

            // Clear form
            document.getElementById('compose-subject').value = '';
            document.getElementById('compose-body').value = '';

            // Reload messages
            await loadOutletMessages();
            alert('Draft saved');
        } catch (err) {
            alert('Error saving draft: ' + err.message);
        } finally {
            btn.disabled = false;
            btn.textContent = 'Save Draft';
        }
    }

    async function sendMessage() {
        if (!selectedOutlet) {
            alert('Please select an outlet first');
            return;
        }

        const subject = document.getElementById('compose-subject').value.trim();
        const body = document.getElementById('compose-body').value.trim();
        const messageType = document.getElementById('compose-type').value;

        if (!subject || !body) {
            alert('Please fill in subject and message');
            return;
        }

        const btn = document.getElementById('btn-send');
        btn.disabled = true;
        btn.textContent = 'Sending...';

        try {
            // First create the message
            const createResponse = await fetch('/api/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    outlet_id: selectedOutlet.id,
                    subject: subject,
                    body: body,
                    message_type: messageType
                })
            });

            if (!createResponse.ok) throw new Error('Failed to create message');
            const message = await createResponse.json();

            // Then send it
            const sendResponse = await fetch(`/api/messages/${message.id}/send`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            if (!sendResponse.ok) throw new Error('Failed to send message');

            // Clear form
            document.getElementById('compose-subject').value = '';
            document.getElementById('compose-body').value = '';

            // Reload messages
            await loadOutletMessages();
            alert('Message sent successfully!');
        } catch (err) {
            alert('Error sending message: ' + err.message);
        } finally {
            btn.disabled = false;
            btn.textContent = 'Send';
        }
    }

    // ─── Init ───
    checkAuth();
    loadOutlets();
</script>
</body>
</html>
