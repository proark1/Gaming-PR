<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Gaming PR Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0f; --bg-secondary: #111118; --bg-card: #16161f;
            --border: #2a2a3a; --text-primary: #f0f0f5; --text-secondary: #8888a0;
            --text-muted: #5a5a72; --accent: #7c5cff; --accent-light: #9b7fff;
            --green: #22c55e; --red: #f87171; --yellow: #fbbf24; --blue: #60a5fa;
            --cat-outlets: #7c5cff; --cat-streamers: #ec4899; --cat-vcs: #f59e0b;
            --radius: 12px;
        }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: grid; grid-template-columns: 230px 1fr; grid-template-rows: 56px 1fr; }
        .bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(124,92,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(124,92,255,0.03) 1px, transparent 1px); background-size: 60px 60px; z-index: 0; pointer-events: none; }

        /* Header */
        header { grid-column: 1 / -1; position: relative; z-index: 20; background: rgba(17,17,24,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .header-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; }
        .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--accent-light)); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px; }
        .header-center { display: flex; align-items: center; gap: 8px; }
        .cat-chip { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; letter-spacing: 0.3px; border: 1px solid transparent; transition: all 0.2s; }
        .cat-chip.outlets { background: rgba(124,92,255,0.15); color: var(--cat-outlets); border-color: rgba(124,92,255,0.35); }
        .cat-chip.streamers { background: rgba(236,72,153,0.15); color: var(--cat-streamers); border-color: rgba(236,72,153,0.35); }
        .cat-chip.vcs { background: rgba(245,158,11,0.15); color: var(--cat-vcs); border-color: rgba(245,158,11,0.35); }
        .header-user { display: flex; align-items: center; gap: 12px; }
        .user-info { text-align: right; font-size: 12px; }
        .user-email { color: var(--text-primary); font-weight: 500; }
        .user-role { color: var(--text-secondary); font-size: 11px; }
        .logout-btn { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.3); border-radius: 5px; padding: 5px 12px; cursor: pointer; font-size: 12px; font-weight: 600; }
        .logout-btn:hover { background: rgba(248,113,113,0.2); }

        /* Sidebar */
        aside { grid-row: 2; position: relative; z-index: 10; background: rgba(17,17,24,0.6); border-right: 1px solid var(--border); padding: 10px 0; overflow-y: auto; }
        .sidebar-title { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; padding: 10px 16px 4px; }
        .sidebar-cat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 10px 16px 4px; }
        .sidebar-cat-label.outlets { color: var(--cat-outlets); }
        .sidebar-cat-label.streamers { color: var(--cat-streamers); }
        .sidebar-cat-label.vcs { color: var(--cat-vcs); }
        .sidebar-menu { list-style: none; }
        .menu-link { display: flex; align-items: center; gap: 10px; padding: 8px 16px; color: var(--text-secondary); cursor: pointer; font-size: 13px; transition: all 0.15s; border-left: 3px solid transparent; background: none; border-top: none; border-right: none; border-bottom: none; width: 100%; text-align: left; font-family: inherit; }
        .menu-link:hover { color: var(--text-primary); background: rgba(124,92,255,0.07); }
        .menu-link.active.outlets { color: var(--cat-outlets); background: rgba(124,92,255,0.12); border-left-color: var(--cat-outlets); }
        .menu-link.active.streamers { color: var(--cat-streamers); background: rgba(236,72,153,0.1); border-left-color: var(--cat-streamers); }
        .menu-link.active.vcs { color: var(--cat-vcs); background: rgba(245,158,11,0.1); border-left-color: var(--cat-vcs); }
        .menu-link.active { color: var(--accent-light); background: rgba(124,92,255,0.12); border-left-color: var(--accent); }
        .menu-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
        .menu-count { margin-left: auto; background: rgba(124,92,255,0.2); color: var(--accent-light); font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 3px; }
        .menu-count.streamers { background: rgba(236,72,153,0.2); color: var(--cat-streamers); }
        .menu-count.vcs { background: rgba(245,158,11,0.2); color: var(--cat-vcs); }

        /* Main */
        main { grid-row: 2; grid-column: 2; position: relative; z-index: 1; overflow-y: auto; padding: 20px 24px; }

        /* Context banner */
        .ctx-banner { display: flex; align-items: center; gap: 10px; padding: 8px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 12px; font-weight: 600; }
        .ctx-banner.outlets { background: rgba(124,92,255,0.1); border: 1px solid rgba(124,92,255,0.25); color: var(--cat-outlets); }
        .ctx-banner.streamers { background: rgba(236,72,153,0.1); border: 1px solid rgba(236,72,153,0.25); color: var(--cat-streamers); }
        .ctx-banner.vcs { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.25); color: var(--cat-vcs); }

        .content-header { margin-bottom: 16px; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 10px; }
        .content-header h1 { font-size: 20px; font-weight: 700; }
        .content-header p { color: var(--text-secondary); font-size: 13px; margin-top: 2px; }
        .header-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

        /* Cards & Panels */
        .panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; }
        .panel h3 { font-size: 13px; font-weight: 600; margin-bottom: 12px; color: var(--accent-light); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
        .stat-card { background: rgba(124,92,255,0.08); border: 1px solid rgba(124,92,255,0.2); border-radius: 10px; padding: 14px; text-align: center; }
        .stat-card .stat-value { font-size: 26px; font-weight: 800; color: var(--accent-light); }
        .stat-card .stat-label { font-size: 10px; color: var(--text-secondary); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Item list */
        .item { display: flex; justify-content: space-between; align-items: center; padding: 10px 10px; font-size: 13px; gap: 10px; cursor: pointer; border-radius: 7px; transition: all 0.12s; border: none; color: inherit; font: inherit; width: 100%; background: none; text-align: left; }
        .item:hover { background: rgba(124,92,255,0.09); }
        .item.selected { background: rgba(124,92,255,0.16); border-left: 3px solid var(--accent); }
        .item.selected.cat-streamers { background: rgba(236,72,153,0.12); border-left-color: var(--cat-streamers); }
        .item.selected.cat-vcs { background: rgba(245,158,11,0.1); border-left-color: var(--cat-vcs); }
        .item-name { font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-meta { display: flex; gap: 5px; flex-shrink: 0; align-items: center; }

        /* Badges */
        .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; white-space: nowrap; }
        .badge-lang { background: rgba(124,92,255,0.15); color: var(--accent-light); }
        .badge-active { background: rgba(34,197,94,0.15); color: var(--green); }
        .badge-inactive { background: rgba(248,113,113,0.15); color: var(--red); }
        .badge-cat { background: rgba(156,163,175,0.12); color: #d1d5db; }
        .badge-info { background: rgba(96,165,250,0.15); color: var(--blue); }
        .badge-warn { background: rgba(251,191,36,0.15); color: var(--yellow); }

        /* Buttons */
        .btn { padding: 7px 13px; border-radius: 6px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: inherit; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover:not(:disabled) { background: var(--accent-light); }
        .btn-secondary { background: rgba(124,92,255,0.18); color: var(--accent-light); }
        .btn-secondary:hover:not(:disabled) { background: rgba(124,92,255,0.28); }
        .btn-danger { background: rgba(248,113,113,0.13); color: var(--red); }
        .btn-danger:hover:not(:disabled) { background: rgba(248,113,113,0.22); }
        .btn-success { background: rgba(34,197,94,0.13); color: var(--green); }
        .btn-success:hover:not(:disabled) { background: rgba(34,197,94,0.22); }
        .btn-pink { background: rgba(236,72,153,0.15); color: var(--cat-streamers); }
        .btn-pink:hover:not(:disabled) { background: rgba(236,72,153,0.25); }
        .btn-amber { background: rgba(245,158,11,0.15); color: var(--cat-vcs); }
        .btn-amber:hover:not(:disabled) { background: rgba(245,158,11,0.25); }
        .btn-sm { padding: 4px 9px; font-size: 11px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Forms */
        .form-group { margin-bottom: 11px; }
        .form-group label { display: block; font-size: 10px; font-weight: 700; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-primary); border-radius: 6px; padding: 7px 10px; font-size: 13px; font-family: inherit; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(124,92,255,0.18); }
        .form-group textarea { resize: vertical; min-height: 65px; }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }

        /* Table */
        .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .data-table th { text-align: left; padding: 7px 10px; color: var(--text-secondary); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        .data-table td { padding: 7px 10px; border-bottom: 1px solid rgba(42,42,58,0.25); }
        .data-table tr:hover td { background: rgba(124,92,255,0.05); }

        /* Detail */
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px 16px; font-size: 12px; }
        .detail-item label { color: var(--text-muted); font-size: 10px; text-transform: uppercase; display: block; margin-bottom: 1px; }
        .detail-item span { color: var(--text-primary); font-weight: 500; }
        .detail-full { grid-column: 1 / -1; }
        .tag-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
        .tag { background: rgba(124,92,255,0.12); color: var(--accent-light); padding: 2px 7px; border-radius: 3px; font-size: 10px; font-weight: 600; }

        /* Tabs */
        .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 14px; overflow-x: auto; }
        .tab { padding: 7px 14px; font-size: 12px; font-weight: 600; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.12s; background: none; border-top: none; border-left: none; border-right: none; white-space: nowrap; font-family: inherit; }
        .tab:hover { color: var(--text-primary); }
        .tab.active { color: var(--accent-light); border-bottom-color: var(--accent); }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; max-width: 680px; width: 100%; max-height: 85vh; overflow-y: auto; }
        .modal h2 { font-size: 16px; margin-bottom: 14px; }
        .modal-close { float: right; background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 18px; }

        /* Toast */
        .toast { position: fixed; bottom: 20px; right: 20px; z-index: 200; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 18px; font-size: 13px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); transition: opacity 0.3s; }
        .toast.success { border-color: var(--green); color: var(--green); }
        .toast.error { border-color: var(--red); color: var(--red); }

        /* Feed */
        .feed-item { background: rgba(34,197,94,0.07); border: 1px solid rgba(34,197,94,0.18); border-radius: 7px; padding: 9px; margin-bottom: 7px; font-size: 12px; animation: fadeIn 0.3s; }
        .msg-item { background: rgba(124,92,255,0.07); border: 1px solid rgba(124,92,255,0.18); border-radius: 7px; padding: 9px; margin-bottom: 7px; font-size: 12px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }

        .loading, .error, .empty { padding: 28px 16px; text-align: center; color: var(--text-secondary); font-size: 13px; }
        .error { color: var(--red); }
        .error button { margin-top: 8px; background: transparent; color: var(--accent-light); border: 1px solid var(--accent); border-radius: 4px; padding: 4px 10px; cursor: pointer; font-size: 11px; }
        .hidden { display: none !important; }
        .scroll-y { overflow-y: auto; }

        @media (max-width: 800px) { body { grid-template-columns: 1fr; } aside { display: none; } .grid-4 { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
<div class="bg-grid"></div>

<header>
    <div class="header-logo"><div class="logo-icon">GP</div><span>Gaming PR</span></div>
    <div class="header-center">
        <span style="font-size:11px;color:var(--text-muted);margin-right:4px">Context:</span>
        <span class="cat-chip outlets" id="header-cat-chip">📰 News Outlets</span>
    </div>
    <div class="header-user">
        <div class="user-info"><div class="user-email" id="user-email">—</div><div class="user-role">Administrator</div></div>
        <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
</header>

<aside id="sidebar">
    <div class="sidebar-title">Sources</div>
    <ul class="sidebar-menu">
        <li><button class="menu-link active outlets" data-section="outlets" onclick="setCategory('outlets')"><span class="menu-icon">📰</span>News Outlets<span class="menu-count" id="cnt-outlets">0</span></button></li>
        <li><button class="menu-link" data-section="streamers" onclick="setCategory('streamers')"><span class="menu-icon">🎥</span>Streamers<span class="menu-count streamers" id="cnt-streamers">0</span></button></li>
        <li><button class="menu-link" data-section="vcs" onclick="setCategory('vcs')"><span class="menu-icon">💼</span>Gaming VCs<span class="menu-count vcs" id="cnt-vcs">0</span></button></li>
    </ul>
    <div class="sidebar-cat-label outlets" id="sidebar-cat-label">📰 News Outlets</div>
    <ul class="sidebar-menu">
        <li><button class="menu-link" data-section="articles" onclick="go('articles')"><span class="menu-icon">📄</span><span id="articles-label">Articles</span></button></li>
        <li><button class="menu-link" data-section="outreach" onclick="go('outreach')"><span class="menu-icon">✉️</span>Outreach</button></li>
        <li><button class="menu-link" data-section="scraper" onclick="go('scraper')"><span class="menu-icon">🔄</span>Scraper</button></li>
        <li><button class="menu-link" data-section="email" onclick="go('email')"><span class="menu-icon">📧</span>Email</button></li>
        <li><button class="menu-link" data-section="export" onclick="go('export')"><span class="menu-icon">📦</span>Export</button></li>
    </ul>
    <div class="sidebar-title">System</div>
    <ul class="sidebar-menu">
        <li><button class="menu-link" data-section="monitoring" onclick="go('monitoring')"><span class="menu-icon">📊</span>Monitoring</button></li>
        <li><button class="menu-link" data-section="livefeed" onclick="go('livefeed')"><span class="menu-icon">⚡</span>Live Feed</button></li>
        <li><button class="menu-link" data-section="webhooks" onclick="go('webhooks')"><span class="menu-icon">🔗</span>Webhooks</button></li>
    </ul>
</aside>

<main id="main-content"><div class="loading">Loading...</div></main>

<div id="modal-root"></div>
<div id="toast-root"></div>

<script>
// ─── State ───
const token = localStorage.getItem('auth_token');
let section = 'outlets';
let activeCategory = 'outlets'; // 'outlets' | 'streamers' | 'vcs'
let outlets = [], streamers = [], vcs = [];
let selectedItem = null;
let ws = null;
let outletCategoryFilter = 'all'; // client-side filter for outlets section

const CAT_META = {
    outlets:   { icon: '📰', label: 'News Outlets',  color: 'outlets',   articlesLabel: 'Articles',          targetType: 'outlet'    },
    streamers: { icon: '🎥', label: 'Streamers',      color: 'streamers', articlesLabel: 'Outreach History',  targetType: 'streamer'  },
    vcs:       { icon: '💼', label: 'Gaming VCs',     color: 'vcs',       articlesLabel: 'Outreach History',  targetType: 'gaming_vc' },
};

// ─── Auth ───
async function checkAuth() {
    if (!token) { window.location.href = '/login'; return; }
    try {
        const r = await fetch(`/api/auth/verify?token=${token}`);
        if (!r.ok) throw 0;
        const d = await r.json();
        document.getElementById('user-email').textContent = d.email;
    } catch { localStorage.removeItem('auth_token'); window.location.href = '/login'; }
}
function logout() { localStorage.removeItem('auth_token'); window.location.href = '/login'; }

// ─── Navigation ───
function setCategory(cat) {
    activeCategory = cat;
    section = cat; // also navigate to that source list
    selectedItem = null;
    updateCategoryUI();
    render();
}

function go(s) {
    section = s;
    selectedItem = null;
    document.querySelectorAll('[data-section]').forEach(l => {
        const match = l.dataset.section === s;
        l.classList.toggle('active', match);
        if (match) { l.classList.remove('outlets','streamers','vcs'); }
    });
    render();
}

function updateCategoryUI() {
    const meta = CAT_META[activeCategory];
    // header chip
    const chip = document.getElementById('header-cat-chip');
    chip.textContent = `${meta.icon} ${meta.label}`;
    chip.className = `cat-chip ${meta.color}`;
    // sidebar label
    const label = document.getElementById('sidebar-cat-label');
    label.textContent = `${meta.icon} ${meta.label}`;
    label.className = `sidebar-cat-label ${meta.color}`;
    // articles label
    const al = document.getElementById('articles-label');
    if (al) al.textContent = meta.articlesLabel;
    // source menu items
    document.querySelectorAll('[data-section="outlets"],[data-section="streamers"],[data-section="vcs"]').forEach(l => {
        const cat = l.dataset.section;
        const isActive = cat === activeCategory;
        l.classList.toggle('active', isActive);
        if (isActive) { l.classList.remove('outlets','streamers','vcs'); l.classList.add(meta.color); }
        else l.classList.remove('outlets','streamers','vcs');
    });
}

// ─── Toast / Modal ───
function toast(msg, type = 'success') {
    const el = document.createElement('div');
    el.className = 'toast ' + type; el.textContent = msg;
    document.getElementById('toast-root').appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
}
function showModal(title, html) {
    document.getElementById('modal-root').innerHTML =
        `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><button class="modal-close" onclick="closeModal()">✕</button><h2>${title}</h2>${html}</div></div>`;
}
function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

// ─── API ───
async function api(url, opts = {}) {
    const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const r = await fetch(url, { ...opts, headers });
    if (!r.ok) { const t = await r.text().catch(() => ''); throw new Error(t || `HTTP ${r.status}`); }
    if (r.status === 204) return null;
    return r.json();
}

// ─── Data Loading ───
async function loadAll() {
    await Promise.all([
        api('/api/outlets/').then(d => { outlets = Array.isArray(d) ? d : []; }).catch(() => {}),
        api('/api/streamers/').then(d => { streamers = Array.isArray(d) ? d : []; }).catch(() => {}),
        api('/api/gaming-vcs/').then(d => { vcs = Array.isArray(d) ? d : []; }).catch(() => {}),
    ]);
    document.getElementById('cnt-outlets').textContent = outlets.length;
    document.getElementById('cnt-streamers').textContent = streamers.length;
    document.getElementById('cnt-vcs').textContent = vcs.length;
}

// ─── Context Banner ───
function ctxBanner(extra) {
    const meta = CAT_META[activeCategory];
    return `<div class="ctx-banner ${meta.color}">${meta.icon} <strong>${meta.label}</strong> context${extra ? ' — ' + extra : ''}</div>`;
}

// ─── Render Router ───
function render() {
    const m = document.getElementById('main-content');
    // update non-source menu items active state
    const nonSrcSections = ['articles','outreach','scraper','email','export','monitoring','livefeed','webhooks'];
    document.querySelectorAll('[data-section]').forEach(l => {
        if (nonSrcSections.includes(l.dataset.section)) l.classList.toggle('active', l.dataset.section === section);
    });
    const map = { outlets: renderOutlets, streamers: renderStreamers, vcs: renderVCs, articles: renderArticles, outreach: renderOutreach, scraper: renderScraper, email: renderEmail, export: renderExport, monitoring: renderMonitoring, livefeed: renderLiveFeed, webhooks: renderWebhooks };
    (map[section] || renderOutlets)(m);
}

// ─── SOURCE: Outlets ───
function renderOutlets(m) {
    if (selectedItem && selectedItem._type === 'outlet') return renderOutletDetail(m);
    const cats = ['all','gaming_news','esports','pc_gaming','mobile_gaming','console','nintendo','playstation','xbox','gaming_culture','gaming_industry'];
    const catLabels = {all:'All',gaming_news:'Gaming News',esports:'Esports',pc_gaming:'PC Gaming',mobile_gaming:'Mobile',console:'Console',nintendo:'Nintendo',playstation:'PlayStation',xbox:'Xbox',gaming_culture:'Culture',gaming_industry:'Industry'};
    const filtered = outletCategoryFilter === 'all' ? outlets : outlets.filter(o => o.category === outletCategoryFilter);
    const filterChips = cats.map(c => `<button onclick="setOutletFilter('${c}')" style="padding:3px 10px;border-radius:12px;border:1px solid ${outletCategoryFilter===c?'var(--accent)':'var(--border)'};background:${outletCategoryFilter===c?'rgba(124,92,255,0.18)':'transparent'};color:${outletCategoryFilter===c?'var(--accent-light)':'var(--text-secondary)'};cursor:pointer;font-size:11px;font-weight:600;font-family:inherit">${catLabels[c]}</button>`).join('');
    m.innerHTML = `<div class="content-header"><div><h1>News Outlets</h1><p>Showing ${filtered.length} of ${outlets.length} gaming news outlets</p></div>
        <div class="header-actions"><button class="btn btn-primary" onclick="showCreateOutletForm()">+ Add Outlet</button><button class="btn btn-secondary" onclick="scrapeAllType('outlets')">Scrape All Sites</button></div></div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">${filterChips}</div>
        <div class="panel"><div>${renderItemsList(filtered, 'outlet')}</div></div>`;
}
function setOutletFilter(cat) { outletCategoryFilter = cat; renderOutlets(document.getElementById('main-content')); }

function renderOutletDetail(m) {
    const o = selectedItem;
    m.innerHTML = `${ctxBanner()}
        <div class="content-header"><div><h1><button class="btn btn-sm btn-secondary" onclick="selectedItem=null;render()" style="margin-right:7px">← Back</button>${esc(o.name)}</h1><p>${esc(o.url)}</p></div>
        <div class="header-actions">
            <button class="btn btn-secondary btn-sm" onclick="scrapeItem('outlet',${o.id})">Scrape Site</button>
            <button class="btn btn-primary btn-sm" onclick="showOutreachForm('outlet',${o.id},'${esc(o.name)}')">Generate Outreach</button>
            <button class="btn btn-danger btn-sm" onclick="deleteItem('outlets',${o.id})">Delete</button>
        </div></div>
        <div class="tabs"><button class="tab active" onclick="showTab('outlet','info',this)">Info</button><button class="tab" onclick="showTab('outlet','editorial',this)">Editorial</button><button class="tab" onclick="showTab('outlet','audience',this)">Audience</button><button class="tab" onclick="showTab('outlet','coverage',this)">Coverage</button><button class="tab" onclick="showTab('outlet','messages',this)">Messages</button></div>
        <div id="detail-tab">${renderOutletInfo(o)}</div>`;
}

function showTab(type, tab, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    const el = document.getElementById('detail-tab');
    const o = selectedItem;
    if (type === 'outlet') {
        if (tab === 'info') el.innerHTML = renderOutletInfo(o);
        else if (tab === 'editorial') el.innerHTML = renderOutletEditorial(o);
        else if (tab === 'audience') el.innerHTML = renderOutletAudience(o);
        else if (tab === 'coverage') el.innerHTML = renderOutletCoverage(o);
        else if (tab === 'messages') loadItemMessages(o.id);
    }
}

          <strong style="color:#9146ff">&#11015; Twitch Live Import</strong>

          <div style="margin-top:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">

async function triggerTwitchImport() {
    const btn = document.getElementById('twitch-import-btn');
    btn.disabled = true;
    btn.textContent = 'Importing...';
    let successMsg = null;
    let errorMsg = null;
    try {
        const res = await fetch('/api/streamers/import-twitch?max_per_category=200&min_viewers=50', {method:'POST'});
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Import failed');
        successMsg = `Twitch import complete: <strong>${data.imported}</strong> new, <strong>${data.updated}</strong> updated across ${data.categories_processed} categories.`;
        streamers = await fetch('/api/streamers/').then(r => r.json());
        renderStreamers(document.getElementById('main-content'));
    } catch(e) {
        errorMsg = `Error: ${e.message}`;
    } finally {
        // After renderStreamers() the DOM is fresh — grab new references
        const resultDiv = document.getElementById('twitch-import-result');
        const newBtn = document.getElementById('twitch-import-btn');
        if (successMsg && resultDiv) resultDiv.innerHTML = `<div style="background:#d4edda;color:#155724;padding:8px 12px;border-radius:6px;margin-top:8px">${successMsg}</div>`;
        if (errorMsg && resultDiv) resultDiv.innerHTML = `<div style="background:#f8d7da;color:#721c24;padding:8px 12px;border-radius:6px;margin-top:8px">${esc(errorMsg)}</div>`;
        if (newBtn) { newBtn.disabled = false; newBtn.textContent = 'Import from Twitch'; }
    }
}

// ─── SECTION: Articles (context-aware) ───
async function renderArticles(m) {
    const meta = CAT_META[activeCategory];
    if (activeCategory === 'outlets') {
        m.innerHTML = `${ctxBanner('scraped news articles')}
            <div class="content-header"><div><h1>Articles</h1><p>Scraped articles from news outlets</p></div>
            <div class="header-actions"><button class="btn btn-primary" onclick="runScrape()">Run Scraper Now</button></div></div>
            <div class="panel"><div class="form-row"><div class="form-group"><input id="article-search" placeholder="Search articles..." onkeyup="if(event.key==='Enter')searchArticles()"></div><div class="form-group" style="flex:0"><button class="btn btn-secondary" onclick="searchArticles()">Search</button></div></div></div>
            <div class="panel"><div id="articles-content"><div class="loading">Loading...</div></div></div>`;
        loadArticles();
    } else {
        // For streamers/VCs: show outreach history scoped to this category
        const tt = meta.targetType;
        const title = activeCategory === 'streamers' ? 'Streamer Outreach History' : 'VC Outreach History';
        const desc = activeCategory === 'streamers' ? 'All outreach messages sent to streamers' : 'All outreach messages sent to gaming VCs';
        m.innerHTML = `${ctxBanner(title.toLowerCase())}
            <div class="content-header"><div><h1>${title}</h1><p>${desc}</p></div>
            <div class="header-actions"><button class="btn btn-${meta.color==='streamers'?'pink':'amber'}" onclick="showOutreachForm('${tt}')">+ Generate Outreach</button></div></div>
            <div class="panel"><div id="articles-content"><div class="loading">Loading outreach history...</div></div></div>`;
        try {
            const msgs = await api(`/api/outreach/messages?target_type=${tt}&per_page=100`);
            const list = Array.isArray(msgs) ? msgs : [];
            document.getElementById('articles-content').innerHTML = list.length ?
                `<table class="data-table"><thead><tr><th>Recipient</th><th>Subject</th><th>Type</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody>${list.map(m => `<tr>
                    <td>${esc(m.recipient_name||'-')}</td>
                    <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(m.subject)}</td>
                    <td><span class="badge badge-info">${m.message_type}</span></td>
                    <td><span class="badge badge-${m.status==='sent'?'active':'cat'}">${m.status}</span></td>
                    <td>${fmtDate(m.created_at)}</td>
                    <td><button class="btn btn-sm btn-secondary" onclick="viewOutreachMsg(${m.id})">View</button> <button class="btn btn-sm btn-danger" onclick="deleteOutreach(${m.id})">Del</button></td></tr>`).join('')}</tbody></table>` :
                `<div class="empty">No outreach messages yet for ${meta.label}. <button class="btn btn-sm btn-primary" style="margin-left:8px" onclick="showOutreachForm('${tt}')">Generate First</button></div>`;
        } catch (e) { document.getElementById('articles-content').innerHTML = `<div class="error">${esc(e.message)}</div>`; }
    }
}

async function loadArticles(q) {
    const el = document.getElementById('articles-content');
    el.innerHTML = '<div class="loading">Loading...</div>';
    try {
        const url = q ? `/api/scraper/articles?limit=50&search=${encodeURIComponent(q)}` : '/api/scraper/articles?limit=50';
        const data = await api(url);
        const list = Array.isArray(data) ? data : (data.articles || []);
        el.innerHTML = list.length ? `<table class="data-table"><thead><tr><th>Title</th><th>Outlet</th><th>Published</th><th></th></tr></thead><tbody>
            ${list.map(a => `<tr><td style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(a.title||'-')}</td>
            <td>${esc(a.outlet_name||a.outlet_id||'-')}</td><td>${fmtDate(a.published_at||a.scraped_at)}</td>
            <td><button class="btn btn-sm btn-secondary" onclick="viewArticle(${a.id})">View</button></td></tr>`).join('')}</tbody></table>` : '<div class="empty">No articles found</div>';
    } catch (e) { el.innerHTML = `<div class="error">${esc(e.message)}</div>`; }
}
function searchArticles() { loadArticles(document.getElementById('article-search')?.value||''); }

async function viewArticle(id) {
    try {
        const a = await api(`/api/scraper/articles/${id}`);
        showModal(esc(a.title||'Article'), `<div class="detail-grid" style="margin-bottom:14px">${dv('URL',a.url)}${dv('Published',fmtDate(a.published_at))}${dv('Outlet',a.outlet_name||a.outlet_id)}${dv('Author',a.author)}${dv('Language',a.language)}</div>
            <div class="panel"><h3>Content</h3><div style="font-size:13px;line-height:1.6;max-height:360px;overflow-y:auto">${esc(a.full_content||a.summary||a.description||'No content')}</div></div>
            <div style="margin-top:10px;display:flex;gap:8px"><button class="btn btn-secondary btn-sm" onclick="viewArticleHistory(${id})">History</button><button class="btn btn-secondary btn-sm" onclick="viewTranslations(${a.article_id||id})">Translations</button></div>`);
    } catch (e) { toast('Failed: '+e.message,'error'); }
}
async function viewArticleHistory(id) {
    try { const h = await api(`/api/scraper/articles/${id}/history`); const items = Array.isArray(h)?h:[]; showModal('Content History', items.length?items.map(i=>`<div class="feed-item"><strong>${fmtDate(i.snapshot_at||i.created_at)}</strong><br>${esc((i.content||i.summary||'').substring(0,200))}</div>`).join(''):'<div class="empty">No history</div>'); } catch(e){toast(e.message,'error');}
}
async function viewTranslations(articleId) {
    try {
        const t = await api(`/api/articles/${articleId}/translations/`);
        const items = Array.isArray(t)?t:[];
        showModal('Translations', (items.length?items.map(i=>`<div class="feed-item"><span class="badge badge-lang">${i.language}</span> <strong>${esc(i.translated_title||'-')}</strong><br><small>${esc((i.translated_summary||'').substring(0,150))}</small></div>`).join(''):'<div class="empty">No translations</div>')+`<button class="btn btn-secondary btn-sm" style="margin-top:10px" onclick="retryTranslation(${articleId})">Retry Translations</button>`);
    } catch(e){toast(e.message,'error');}
}
async function retryTranslation(id) { try{await api(`/api/articles/${id}/translations/retry`,{method:'POST'});toast('Queued');}catch(e){toast(e.message,'error');} }

// ─── SECTION: Outreach (context-aware) ───
async function renderOutreach(m) {
    const meta = CAT_META[activeCategory];
    const tt = meta.targetType;
    m.innerHTML = `${ctxBanner(`outreach to ${meta.label.toLowerCase()}`)}
        <div class="content-header"><div><h1>Outreach</h1><p>Personalized messages to ${meta.label.toLowerCase()}</p></div>
        <div class="header-actions"><button class="btn btn-primary" onclick="showOutreachForm('${tt}')">+ Generate Message</button></div></div>
        <div id="or-stats"></div>
        <div class="panel"><h3>Messages for ${meta.label}</h3><div id="or-list"><div class="loading">Loading...</div></div></div>`;
    try {
        const [msgs, stats] = await Promise.all([api(`/api/outreach/messages?target_type=${tt}&per_page=100`), api('/api/outreach/stats').catch(()=>null)]);
        if (stats) {
            const cnt = (stats.by_target_type||{})[tt] || 0;
            document.getElementById('or-stats').innerHTML = `<div class="grid-4" style="margin-bottom:14px">${statCard(cnt,'This Category')}${statCard(stats.total||0,'Total')}${statCard(stats.drafts||0,'Drafts')}${statCard(stats.sent||0,'Sent')}</div>`;
        }
        const list = Array.isArray(msgs)?msgs:[];
        document.getElementById('or-list').innerHTML = list.length ?
            `<table class="data-table"><thead><tr><th>Recipient</th><th>Subject</th><th>Type</th><th>Tone</th><th>Status</th><th>Game</th><th>Actions</th></tr></thead><tbody>
            ${list.map(m=>`<tr><td>${esc(m.recipient_name||'-')}</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(m.subject)}</td>
            <td><span class="badge badge-info">${m.message_type}</span></td><td><span class="badge badge-cat">${m.tone||'-'}</span></td>
            <td><span class="badge badge-${m.status==='sent'?'active':'cat'}">${m.status}</span></td>
            <td>${esc(m.game_title||'-')}</td>

        <div class="header-actions"><button class="btn btn-primary" id="ws-btn" onclick="toggleWS()">Connect</button></div></div>
        <div class="panel"><div id="ws-status" style="font-size:12px;color:var(--text-secondary);margin-bottom:10px">Disconnected</div><div id="ws-feed" class="scroll-y" style="max-height:600px"></div></div>`;
    if (ws) { document.getElementById('ws-status').textContent='Connected'; document.getElementById('ws-btn').textContent='Disconnect'; }

function toggleWS() {
    if (ws) { ws.close(); ws=null; return; }
    const proto=location.protocol==='https:'?'wss:':'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws/feed`);
    ws.onopen=()=>{document.getElementById('ws-status').textContent='Connected';document.getElementById('ws-btn').textContent='Disconnect';};
    ws.onmessage=(e)=>{try{const d=JSON.parse(e.data);const feed=document.getElementById('ws-feed');if(feed){const el=document.createElement('div');el.className='feed-item';el.innerHTML=`<strong>${esc(d.title||'New Article')}</strong><br><small>${esc(d.outlet_name||'')} — ${fmtDate(d.published_at)}</small>`;feed.prepend(el);if(feed.children.length>100)feed.lastChild.remove();}}catch{}};
    ws.onclose=()=>{ws=null;const s=document.getElementById('ws-status');if(s)s.textContent='Disconnected';const b=document.getElementById('ws-btn');if(b)b.textContent='Connect';};
}

// ─── SECTION: Webhooks ───
async function renderWebhooks(m) {
    m.innerHTML = `${ctxBanner()}
        <div class="content-header"><div><h1>Webhooks</h1><p>Manage webhook notifications</p></div>
        <div class="header-actions"><button class="btn btn-primary" onclick="showWebhookForm()">+ Add Webhook</button></div></div>
        <div class="panel"><div id="wh-list"><div class="loading">Loading...</div></div></div>`;
    try {
        const hooks=await api('/api/webhooks/'); const list=Array.isArray(hooks)?hooks:[];
        document.getElementById('wh-list').innerHTML=list.length?`<table class="data-table"><thead><tr><th>URL</th><th>Events</th><th>Active</th><th>Actions</th></tr></thead><tbody>${list.map(h=>`<tr><td style="max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(h.url)}</td><td>${(h.events||[]).map(e=>`<span class="badge badge-info">${e}</span>`).join(' ')}</td><td><span class="badge badge-${h.is_active?'active':'inactive'}">${h.is_active?'On':'Off'}</span></td><td><button class="btn btn-sm btn-secondary" onclick="toggleWebhook(${h.id})">Toggle</button> <button class="btn btn-sm btn-secondary" onclick="testWebhook(${h.id})">Test</button> <button class="btn btn-sm btn-danger" onclick="deleteWebhook(${h.id})">Del</button></td></tr>`).join('')}</tbody></table>`:'<div class="empty">No webhooks</div>';
    } catch(e){document.getElementById('wh-list').innerHTML=`<div class="error">${esc(e.message)}</div>`;}
}
function showWebhookForm(){showModal('Add Webhook',`<div class="form-group"><label>URL</label><input id="wh-url" placeholder="https://your-server.com/webhook"></div><div class="form-group"><label>Events (comma separated)</label><input id="wh-ev" placeholder="new_article, scrape_complete"></div><div class="form-group"><label>Secret (optional)</label><input id="wh-sec"></div><button class="btn btn-primary" onclick="createWebhook()">Create</button>`);}
async function createWebhook(){try{await api('/api/webhooks/',{method:'POST',body:JSON.stringify({url:document.getElementById('wh-url').value,events:document.getElementById('wh-ev').value.split(',').map(s=>s.trim()).filter(Boolean),secret:document.getElementById('wh-sec').value||undefined})});closeModal();toast('Created');renderWebhooks(document.getElementById('main-content'));}catch(e){toast(e.message,'error');}}
async function toggleWebhook(id){try{await api(`/api/webhooks/${id}/toggle`,{method:'POST'});toast('Toggled');renderWebhooks(document.getElementById('main-content'));}catch(e){toast(e.message,'error');}}
async function testWebhook(id){try{await api(`/api/webhooks/${id}/test`,{method:'POST'});toast('Test sent');}catch(e){toast(e.message,'error');}}
async function deleteWebhook(id){if(!confirm('Delete?'))return;try{await api(`/api/webhooks/${id}`,{method:'DELETE'});toast('Deleted');renderWebhooks(document.getElementById('main-content'));}catch(e){toast(e.message,'error');}}

// ─── Shared helpers ───
function renderItemsList(items, type) {
    if (!items.length) return `<div class="empty">No ${type}s found</div>`;
    const catClass = type==='streamer'?'cat-streamers':type==='vc'?'cat-vcs':'';
    return items.map(o=>{
        const lang=o.language||''; const cat=(o.category||o.firm_type||o.platform||'').replace(/_/g,' '); const active=o.is_active!==false;
        const isSel = selectedItem && selectedItem.id===o.id && selectedItem._type===type;
        return `<button class="item ${isSel?'selected '+catClass:''}" onclick="selectItem('${type}',${o.id})" style="width:100%;text-align:left">
            <span class="item-name" title="${esc(o.name)}">${esc(o.name)}</span>
            <span class="item-meta">${lang?`<span class="badge badge-lang">${lang}</span>`:''}<span class="badge badge-cat">${esc(cat.substring(0,14)||'—')}</span><span class="badge badge-${active?'active':'inactive'}">${active?'On':'Off'}</span></span></button>`;
    }).join('');
}

function selectItem(type, id) {
    const src = type==='outlet'?outlets:type==='streamer'?streamers:vcs;
    selectedItem = src.find(i=>i.id===id);
    if (selectedItem) selectedItem._type = type;
    render();
}

async function scrapeItem(type, id) {
    toast('Scraping...');
    const url = type==='outlet'?`/api/outreach/scrape/outlet/${id}`:type==='streamer'?`/api/outreach/scrape/streamer/${id}`:`/api/outreach/scrape/gaming-vc/${id}`;
    try {
        await api(url,{method:'POST'}); toast('Done!');
        await loadAll();
        if (selectedItem) { const src=type==='outlet'?outlets:type==='streamer'?streamers:vcs; const fresh=src.find(i=>i.id===id); if(fresh){fresh._type=type;selectedItem=fresh;} }
        render();
    } catch(e){toast('Failed: '+e.message,'error');}
}

async function scrapeAllType(cat) {
    const urls = { outlets:'/api/outreach/scrape/all-outlets', streamers:'/api/outreach/scrape/all-streamers', vcs:'/api/outreach/scrape/all-gaming-vcs' };
    toast('Scraping all...');
    try { await api(urls[cat],{method:'POST'}); toast('Done!'); await loadAll(); render(); } catch(e){toast('Failed: '+e.message,'error');}
}

async function deleteItem(endpoint, id) {
    if(!confirm('Delete this item?'))return;
    try { await api(`/api/${endpoint}/${id}`,{method:'DELETE'}); toast('Deleted'); selectedItem=null; await loadAll(); render(); } catch(e){toast(e.message,'error');}
}

async function loadItemMessages(outletId) {
    const el = document.getElementById('detail-tab');
    el.innerHTML = '<div class="loading">Loading messages...</div>';
    try {
        const msgs = await api(`/api/messages/outlets/${outletId}/messages?token=${token}`);
        const list = Array.isArray(msgs)?msgs:[];
        el.innerHTML = `<div class="panel"><h3>Compose Message</h3>
            <div class="form-group"><label>Subject</label><input id="msg-subj" placeholder="Subject"></div>
            <div class="form-group"><label>Type</label><select id="msg-type"><option value="inquiry">General Inquiry</option><option value="interview_request">Interview Request</option><option value="partnership">Partnership</option><option value="other">Other</option></select></div>
            <div class="form-group"><label>Body</label><textarea id="msg-body" placeholder="Write your message..."></textarea></div>
            <div style="display:flex;gap:8px"><button class="btn btn-secondary" onclick="saveMsg(${outletId},'draft')">Save Draft</button><button class="btn btn-primary" onclick="saveMsg(${outletId},'send')">Send</button></div></div>
        <div class="panel"><h3>Recent Messages</h3>${list.length?list.map(m=>`<div class="msg-item"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><strong>${esc(m.subject||'(no subject)')}</strong><span class="badge badge-${m.status==='sent'?'active':'cat'}">${m.status}</span></div><div style="color:var(--text-secondary)">${esc((m.body||'').substring(0,120))}</div><small style="color:var(--text-muted)">${fmtDate(m.created_at)}</small></div>`).join(''):'<div class="empty">No messages yet</div>'}</div>`;
    } catch(e){el.innerHTML=`<div class="error">${esc(e.message)}</div>`;}
}

async function saveMsg(outletId, action) {
    const subj=document.getElementById('msg-subj').value.trim(); const body=document.getElementById('msg-body').value.trim();
    if(!subj||!body){toast('Fill in subject and body','error');return;}
    try {
        const msg=await api('/api/messages',{method:'POST',body:JSON.stringify({outlet_id:outletId,subject:subj,body,message_type:document.getElementById('msg-type').value})});
        if(action==='send') await api(`/api/messages/${msg.id}/send`,{method:'POST'});
        toast(action==='send'?'Sent!':'Draft saved'); loadItemMessages(outletId);
    } catch(e){toast(e.message,'error');}
}

function showCreateOutletForm() {
    showModal('Add Outlet',`<div class="form-row"><div class="form-group"><label>Name</label><input id="no-name" placeholder="Outlet name"></div><div class="form-group"><label>URL</label><input id="no-url" placeholder="https://example.com"></div></div>
        <div class="form-row"><div class="form-group"><label>Language</label><input id="no-lang" value="en"></div><div class="form-group"><label>Region</label><input id="no-region" value="NA"></div></div>
        <div class="form-row"><div class="form-group"><label>RSS Feed</label><input id="no-rss" placeholder="https://..."></div><div class="form-group"><label>Category</label><input id="no-cat" value="gaming_news"></div></div>
        <button class="btn btn-primary" onclick="createOutlet()" style="margin-top:8px">Create</button>`);
}
async function createOutlet(){try{await api('/api/outlets/',{method:'POST',body:JSON.stringify({name:document.getElementById('no-name').value,url:document.getElementById('no-url').value,language:document.getElementById('no-lang').value,region:document.getElementById('no-region').value,rss_feed_url:document.getElementById('no-rss').value||undefined,category:document.getElementById('no-cat').value})});closeModal();toast('Created');await loadAll();render();}catch(e){toast(e.message,'error');}}

// ─── Formatters ───
function esc(s){if(s==null)return'-';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML;}
function fmt(n){return n!=null?Number(n).toLocaleString():'-';}
function boolFmt(v){return v!=null?(v?'Yes':'No'):'-';}
function fmtDate(d){if(!d)return'-';try{return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});}catch{return d;}}
function dv(label,val,full){return `<div class="detail-item${full?' detail-full':''}"><label>${esc(label)}</label><span>${val!=null&&val!==''?esc(String(val)):'-'}</span></div>`;}
function dvTags(label,arr){if(!Array.isArray(arr)||!arr.length)return dv(label,'-',true);return `<div class="detail-item detail-full"><label>${esc(label)}</label><div class="tag-list">${arr.map(t=>`<span class="tag">${esc(typeof t==='object'?JSON.stringify(t):t)}</span>`).join('')}</div></div>`;}
function dvJson(label,val){if(!val||(Array.isArray(val)&&!val.length))return dv(label,'-',true);return `<div class="detail-item detail-full"><label>${esc(label)}</label><pre style="font-size:11px;color:var(--text-secondary);white-space:pre-wrap;max-height:180px;overflow-y:auto">${esc(JSON.stringify(val,null,2))}</pre></div>`;}
function statCard(v,l){return `<div class="stat-card"><div class="stat-value">${v}</div><div class="stat-label">${l}</div></div>`;}

// ─── Init ───
async function init() {
    await checkAuth();
    await loadAll();
    updateCategoryUI();
    render();
}
init();
</script>
