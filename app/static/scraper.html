<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scraper — Gaming PR Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0f; --bg-secondary: #111118; --bg-card: #16161f; --bg-card-hover: #1c1c28;
            --border: #2a2a3a; --text-primary: #f0f0f5; --text-secondary: #8888a0; --text-muted: #5a5a72;
            --accent: #7c5cff; --accent-light: #9b7fff; --green: #22c55e; --green-dim: rgba(34,197,94,0.15);
            --orange: #f59e0b; --orange-dim: rgba(245,158,11,0.15); --red: #ef4444; --red-dim: rgba(239,68,68,0.15);
            --cyan: #06b6d4; --cyan-dim: rgba(6,182,212,0.15); --radius: 12px;
        }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; min-height: 100vh; }
        .bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(124,92,255,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(124,92,255,0.03) 1px,transparent 1px); background-size: 60px 60px; z-index: 0; pointer-events: none; }
        .container { max-width: 1400px; margin: 0 auto; padding: 32px 24px; position: relative; z-index: 1; }
        h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; }
        .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 28px; }

        /* Header row */
        .header-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; gap: 16px; flex-wrap: wrap; }
        .run-btn {
            background: linear-gradient(135deg, var(--green), #16a34a); color: #fff; border: none;
            padding: 12px 28px; border-radius: 10px; font-size: 0.92rem; font-weight: 700; cursor: pointer;
            font-family: inherit; transition: all .2s; box-shadow: 0 4px 16px rgba(34,197,94,0.3); flex-shrink: 0;
        }
        .run-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(34,197,94,0.4); }
        .run-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Stats */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 28px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; transition: border-color .2s; }
        .stat-card:hover { border-color: var(--accent); }
        .stat-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 6px; }
        .stat-value { font-size: 1.5rem; font-weight: 800; }
        .stat-sub { font-size: 0.72rem; color: var(--text-muted); margin-top: 3px; }
        .stat-value.accent { color: var(--accent-light); }
        .stat-value.green { color: var(--green); }
        .stat-value.cyan { color: var(--cyan); }
        .stat-value.red { color: var(--red); }
        .stat-value.orange { color: var(--orange); }

        /* Grid */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        @media (max-width: 1000px) { .grid-3 { grid-template-columns: 1fr; } }
        @media (max-width: 800px) { .grid-2 { grid-template-columns: 1fr; } }

        /* Card */
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
        .card-header { padding: 14px 20px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 0.92rem; display: flex; align-items: center; justify-content: space-between; }

        /* Table */
        table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        th { text-align: left; padding: 9px 14px; color: var(--text-muted); font-weight: 600; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        td { padding: 9px 14px; border-bottom: 1px solid rgba(42,42,58,0.3); color: var(--text-secondary); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(124,92,255,0.03); }

        .badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
        .badge-green { background: var(--green-dim); color: var(--green); }
        .badge-red { background: var(--red-dim); color: var(--red); }
        .badge-orange { background: var(--orange-dim); color: var(--orange); }
        .badge-cyan { background: var(--cyan-dim); color: var(--cyan); }
        .badge-accent { background: rgba(124,92,255,0.15); color: var(--accent-light); }

        .act-btn { background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-secondary); padding: 5px 12px; border-radius: 6px; font-size: 0.76rem; font-weight: 500; cursor: pointer; font-family: inherit; transition: all .2s; }
        .act-btn:hover { border-color: var(--accent); color: var(--text-primary); }
        .act-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Circuit breaker bars */
        .cb-item { display: flex; align-items: center; gap: 10px; padding: 8px 14px; border-bottom: 1px solid rgba(42,42,58,0.2); font-size: 0.82rem; }
        .cb-item:last-child { border-bottom: none; }
        .cb-name { flex: 1; color: var(--text-primary); font-weight: 500; }
        .cb-state { font-weight: 600; font-size: 0.75rem; text-transform: uppercase; }
        .cb-state.closed { color: var(--green); }
        .cb-state.open { color: var(--red); }
        .cb-state.half-open { color: var(--orange); }

        /* Schedule list */
        .sched-item { display: flex; align-items: center; gap: 12px; padding: 8px 14px; border-bottom: 1px solid rgba(42,42,58,0.2); font-size: 0.82rem; }
        .sched-item:last-child { border-bottom: none; }
        .sched-name { flex: 1; color: var(--text-primary); font-weight: 500; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .sched-val { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; color: var(--accent-light); }

        .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text-muted); font-size: 0.88rem; }
        .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 0.85rem; }
        .login-notice { text-align: center; padding: 12px; background: var(--orange-dim); border: 1px solid rgba(245,158,11,0.3); border-radius: 10px; color: var(--orange); font-size: 0.84rem; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <script src="/static/nav.js" data-active="scraper"></script>

    <div class="container">
        <div class="header-row">
            <div>
                <h1>Scraper Control Panel</h1>
                <div class="subtitle">Run scrapes, manage jobs, circuit breakers, retry queue, and adaptive scheduling</div>
            </div>
            <button class="run-btn" id="runBtn" onclick="runScrapeAll()">Run Full Scrape</button>
        </div>

        <div id="login-notice" class="login-notice" style="display:none">Log in to run scrapes, reset circuit breakers, and process retry queues.</div>

        <!-- Stats -->
        <div class="stat-grid" id="stats"></div>

        <!-- Jobs table -->
        <div class="card" style="margin-bottom:24px">
            <div class="card-header">
                <span>Recent Scrape Jobs</span>
                <button class="act-btn" onclick="loadJobs()">Refresh</button>
            </div>
            <div id="jobs-table"><div class="loading"><div class="spinner"></div> Loading jobs...</div></div>
        </div>

        <!-- Circuit Breakers / Retry Queue / Schedule -->
        <div class="grid-3">
            <div class="card">
                <div class="card-header"><span>Circuit Breakers</span></div>
                <div id="circuit-breakers"><div class="loading"><div class="spinner"></div></div></div>
            </div>
            <div class="card">
                <div class="card-header">
                    <span>Retry Queue</span>
                    <button class="act-btn" id="retryBtn" onclick="processRetries()">Process Now</button>
                </div>
                <div id="retry-queue"><div class="loading"><div class="spinner"></div></div></div>
            </div>
            <div class="card">
                <div class="card-header"><span>Adaptive Schedule</span></div>
                <div id="schedule" style="max-height:400px;overflow-y:auto"><div class="loading"><div class="spinner"></div></div></div>
            </div>
        </div>
    </div>

    <script>
        function authHeaders() {
            const t = gprGetToken();
            return t ? { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json' } : null;
        }
        function isLoggedIn() { return !!gprGetToken(); }
        function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        function timeAgo(iso) {
            if (!iso) return 'N/A';
            const d = (Date.now() - new Date(iso).getTime()) / 1000;
            if (d < 60) return Math.round(d) + 's ago';
            if (d < 3600) return Math.round(d/60) + 'm ago';
            if (d < 86400) return Math.round(d/3600) + 'h ago';
            return Math.round(d/86400) + 'd ago';
        }
        function statusBadge(s) {
            const m = { completed: 'green', running: 'cyan', failed: 'red', queued: 'orange', pending: 'accent' };
            return `<span class="badge badge-${m[s]||'accent'}">${s}</span>`;
        }

        function checkLogin() {
            document.getElementById('login-notice').style.display = isLoggedIn() ? 'none' : 'block';
        }

        // ─── Stats ───
        async function loadStats() {
            try {
                const res = await fetch('/api/scraper/stats');
                const s = await res.json();
                const langCount = Object.keys(s.articles_by_language || {}).length;
                const typeCount = Object.keys(s.articles_by_type || {}).length;
                document.getElementById('stats').innerHTML = `
                    <div class="stat-card"><div class="stat-label">Total Articles</div><div class="stat-value accent">${(s.total_articles||0).toLocaleString()}</div></div>
                    <div class="stat-card"><div class="stat-label">Full Content</div><div class="stat-value green">${(s.full_content_articles||0).toLocaleString()}</div><div class="stat-sub">${s.total_articles ? Math.round(s.full_content_articles/s.total_articles*100) : 0}% extraction rate</div></div>
                    <div class="stat-card"><div class="stat-label">Languages</div><div class="stat-value cyan">${langCount}</div></div>
                    <div class="stat-card"><div class="stat-label">Article Types</div><div class="stat-value orange">${typeCount}</div></div>
                `;
            } catch (e) {}
        }

        // ─── Jobs ───
        async function loadJobs() {
            const el = document.getElementById('jobs-table');
            el.innerHTML = '<div class="loading"><div class="spinner"></div> Loading...</div>';
            checkLogin();
            try {
                const res = await fetch('/api/scraper/jobs?limit=15');
                const jobs = await res.json();
                if (!jobs.length) { el.innerHTML = '<div class="empty">No scrape jobs yet.</div>'; return; }
                el.innerHTML = `<table>
                    <thead><tr><th>ID</th><th>Type</th><th>Status</th><th>Started</th><th>Duration</th><th>Outlets</th><th>Found</th><th>New</th><th>Full</th><th>Errors</th></tr></thead>
                    <tbody>${jobs.map(j => `<tr>
                        <td style="font-family:'JetBrains Mono',monospace;font-size:0.78rem">#${j.id}</td>
                        <td>${esc(j.job_type)}</td>
                        <td>${statusBadge(j.status)}</td>
                        <td>${timeAgo(j.started_at)}</td>
                        <td>${j.duration_seconds != null ? j.duration_seconds.toFixed(1) + 's' : '-'}</td>
                        <td>${j.total_outlets_scraped ?? '-'}</td>
                        <td>${j.total_articles_found ?? '-'}</td>
                        <td style="color:var(--green);font-weight:600">${j.total_new_articles ?? '-'}</td>
                        <td>${j.total_full_content_extracted ?? '-'}</td>
                        <td style="color:${(j.total_errors||0) > 0 ? 'var(--red)' : 'var(--text-muted)'}">${j.total_errors ?? 0}</td>
                    </tr>`).join('')}</tbody>
                </table>`;
            } catch (e) { el.innerHTML = `<div class="empty" style="color:var(--red)">Failed: ${e.message}</div>`; }
        }

        // ─── Run scrape ───
        async function runScrapeAll() {
            const h = authHeaders();
            if (!h) return gprOpenModal('login');
            const btn = document.getElementById('runBtn');
            btn.disabled = true; btn.textContent = 'Starting...';
            try {
                const res = await fetch('/api/scraper/run?run_async=true', { method: 'POST', headers: h });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed');
                btn.textContent = 'Queued!';
                setTimeout(() => { btn.disabled = false; btn.textContent = 'Run Full Scrape'; loadJobs(); loadStats(); }, 3000);
            } catch (e) {
                btn.textContent = 'Error: ' + e.message;
                setTimeout(() => { btn.disabled = false; btn.textContent = 'Run Full Scrape'; }, 3000);
            }
        }

        // ─── Circuit breakers ───
        async function loadCircuitBreakers() {
            const el = document.getElementById('circuit-breakers');
            try {
                const res = await fetch('/api/scraper/circuit-breakers');
                const data = await res.json();
                const circuits = data.circuits || {};
                const keys = Object.keys(circuits);
                if (!keys.length) { el.innerHTML = '<div class="empty">No circuit breaker data. All circuits clean.</div>'; return; }
                el.innerHTML = keys.map(k => {
                    const c = circuits[k];
                    const state = c.state || 'closed';
                    return `<div class="cb-item">
                        <span class="cb-name">${esc(k)}</span>
                        <span class="cb-state ${state}">${state}</span>
                        ${state !== 'closed' ? `<button class="act-btn" onclick="resetCB(${esc(k)})" ${!isLoggedIn()?'disabled':''}>Reset</button>` : ''}
                    </div>`;
                }).join('');
            } catch (e) { el.innerHTML = `<div class="empty">Disabled or unavailable</div>`; }
        }

        async function resetCB(outletId) {
            const h = authHeaders();
            if (!h) return gprOpenModal('login');
            try {
                await fetch(`/api/scraper/circuit-breakers/${outletId}/reset`, { method: 'POST', headers: h });
                loadCircuitBreakers();
            } catch (e) { alert('Failed: ' + e.message); }
        }

        // ─── Retry queue ───
        async function loadRetryQueue() {
            const el = document.getElementById('retry-queue');
            try {
                const res = await fetch('/api/scraper/retry-queue');
                const data = await res.json();
                el.innerHTML = `<div style="padding:16px">
                    <div style="margin-bottom:10px"><span style="color:var(--text-muted);font-size:0.78rem;text-transform:uppercase;font-weight:600">Status</span><br>
                        ${data.enabled ? '<span class="badge badge-green">enabled</span>' : '<span class="badge badge-red">disabled</span>'}
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
                        <div><span style="color:var(--text-muted);font-size:0.72rem;text-transform:uppercase;font-weight:600">Queue Size</span><div style="font-size:1.2rem;font-weight:700">${data.queue_size ?? data.pending ?? 0}</div></div>
                        <div><span style="color:var(--text-muted);font-size:0.72rem;text-transform:uppercase;font-weight:600">Processed</span><div style="font-size:1.2rem;font-weight:700;color:var(--green)">${data.total_processed ?? 0}</div></div>
                        <div><span style="color:var(--text-muted);font-size:0.72rem;text-transform:uppercase;font-weight:600">Succeeded</span><div style="font-size:1.2rem;font-weight:700;color:var(--green)">${data.total_succeeded ?? 0}</div></div>
                        <div><span style="color:var(--text-muted);font-size:0.72rem;text-transform:uppercase;font-weight:600">Failed</span><div style="font-size:1.2rem;font-weight:700;color:var(--red)">${data.total_failed ?? 0}</div></div>
                    </div>
                </div>`;
            } catch (e) { el.innerHTML = '<div class="empty">Unavailable</div>'; }
        }

        async function processRetries() {
            const h = authHeaders();
            if (!h) return gprOpenModal('login');
            const btn = document.getElementById('retryBtn');
            btn.disabled = true; btn.textContent = 'Processing...';
            try {
                const res = await fetch('/api/scraper/retry-queue/process', { method: 'POST', headers: h });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed');
                btn.textContent = 'Done!';
                setTimeout(() => { btn.disabled = false; btn.textContent = 'Process Now'; loadRetryQueue(); loadStats(); }, 2000);
            } catch (e) {
                btn.textContent = 'Error';
                setTimeout(() => { btn.disabled = false; btn.textContent = 'Process Now'; }, 2000);
            }
        }

        // ─── Schedule ───
        async function loadSchedule() {
            const el = document.getElementById('schedule');
            try {
                const res = await fetch('/api/scraper/schedule');
                const data = await res.json();
                const outlets = data.outlets || [];
                if (!outlets.length) { el.innerHTML = '<div class="empty">No schedule data yet.</div>'; return; }
                el.innerHTML = outlets.slice(0, 30).map(o => `<div class="sched-item">
                    <span class="sched-name" title="${esc(o.outlet_name || o.name || '')}">${esc(o.outlet_name || o.name || 'Outlet #' + o.outlet_id)}</span>
                    <span class="sched-val">${o.interval_minutes ? o.interval_minutes + 'min' : o.next_scrape ? timeAgo(o.next_scrape) : '-'}</span>
                    ${o.priority ? `<span class="badge badge-accent">P${o.priority}</span>` : ''}
                </div>`).join('');
            } catch (e) { el.innerHTML = '<div class="empty">Adaptive scheduling data unavailable</div>'; }
        }

        loadStats();
        loadJobs();
        loadCircuitBreakers();
        loadRetryQueue();
        loadSchedule();
    </script>
</body>
</html>
