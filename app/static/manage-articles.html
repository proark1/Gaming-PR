<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Articles — Gaming PR Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0f; --bg-secondary: #111118; --bg-card: #16161f; --bg-card-hover: #1c1c28;
            --border: #2a2a3a; --text-primary: #f0f0f5; --text-secondary: #8888a0; --text-muted: #5a5a72;
            --accent: #7c5cff; --accent-light: #9b7fff; --green: #22c55e; --green-dim: rgba(34,197,94,0.15);
            --orange: #f59e0b; --orange-dim: rgba(245,158,11,0.15); --red: #ef4444; --red-dim: rgba(239,68,68,0.15);
            --cyan: #06b6d4; --cyan-dim: rgba(6,182,212,0.15); --radius: 12px;
        }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; min-height: 100vh; }
        .bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(124,92,255,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(124,92,255,0.03) 1px,transparent 1px); background-size: 60px 60px; z-index: 0; pointer-events: none; }
        .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; position: relative; z-index: 1; }
        h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; }
        .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 28px; }
        .header-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; gap: 16px; }
        .add-btn { background: linear-gradient(135deg, var(--accent), #6344e0); color: #fff; border: none; padding: 10px 22px; border-radius: 10px; font-size: 0.88rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .2s; box-shadow: 0 4px 16px rgba(124,92,255,0.3); flex-shrink: 0; }
        .add-btn:hover { transform: translateY(-1px); }

        /* Card list */
        .article-list { display: flex; flex-direction: column; gap: 12px; }
        .art-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; transition: border-color .2s, background .2s; }
        .art-card:hover { border-color: rgba(124,92,255,0.3); background: var(--bg-card-hover); }
        .art-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 8px; }
        .art-title { font-size: 1.05rem; font-weight: 600; line-height: 1.4; }
        .art-meta { display: flex; flex-wrap: wrap; gap: 10px; font-size: 0.78rem; color: var(--text-muted); align-items: center; margin-bottom: 8px; }
        .art-body-preview { font-size: 0.84rem; color: var(--text-secondary); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 10px; }
        .art-translations { display: flex; flex-wrap: wrap; gap: 5px; }
        .art-actions { display: flex; gap: 6px; flex-shrink: 0; }

        .badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
        .badge-green { background: var(--green-dim); color: var(--green); }
        .badge-red { background: var(--red-dim); color: var(--red); }
        .badge-orange { background: var(--orange-dim); color: var(--orange); }
        .badge-cyan { background: var(--cyan-dim); color: var(--cyan); }
        .badge-accent { background: rgba(124,92,255,0.15); color: var(--accent-light); }
        .badge-sm { padding: 2px 7px; font-size: 0.68rem; }

        .act-btn { background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-secondary); padding: 6px 12px; border-radius: 6px; font-size: 0.76rem; font-weight: 500; cursor: pointer; font-family: inherit; transition: all .2s; }
        .act-btn:hover { border-color: var(--accent); color: var(--text-primary); }
        .act-btn.danger:hover { border-color: var(--red); color: var(--red); }
        .act-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Pagination */
        .pagination { display: flex; gap: 8px; margin-top: 16px; align-items: center; }
        .page-btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); padding: 6px 14px; border-radius: 8px; font-size: 0.82rem; cursor: pointer; font-family: inherit; transition: all .2s; }
        .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--text-primary); }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .page-info { font-size: 0.8rem; color: var(--text-muted); }

        /* Modal */
        .form-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 200; align-items: center; justify-content: center; }
        .form-overlay.active { display: flex; }
        .form-modal { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 20px; padding: 32px; width: 100%; max-width: 620px; position: relative; box-shadow: 0 25px 60px rgba(0,0,0,0.5); max-height: 90vh; overflow-y: auto; }
        .form-modal h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; }
        .form-modal .close-btn { position: absolute; top: 14px; right: 14px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.3rem; }
        .fg { margin-bottom: 14px; }
        .fg label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 4px; }
        .fg input, .fg textarea, .fg select { width: 100%; padding: 10px 12px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 0.88rem; font-family: inherit; outline: none; transition: border-color .2s; }
        .fg input:focus, .fg textarea:focus, .fg select:focus { border-color: var(--accent); }
        .fg textarea { min-height: 200px; resize: vertical; line-height: 1.6; }
        .fg .hint { font-size: 0.7rem; color: var(--text-muted); margin-top: 3px; }
        .fg select option { background: var(--bg-primary); }
        .submit-btn { width: 100%; padding: 11px; border-radius: 10px; font-weight: 600; font-size: 0.9rem; border: none; cursor: pointer; background: linear-gradient(135deg, var(--accent), #6344e0); color: #fff; font-family: inherit; margin-top: 8px; transition: all .2s; }
        .submit-btn:hover { transform: translateY(-1px); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .form-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; padding: 9px 12px; border-radius: 8px; font-size: 0.82rem; margin-bottom: 14px; display: none; }
        .form-error.visible { display: block; }
        .form-success { background: var(--green-dim); border: 1px solid rgba(34,197,94,0.3); color: var(--green); padding: 9px 12px; border-radius: 8px; font-size: 0.82rem; margin-bottom: 14px; display: none; }
        .form-success.visible { display: block; }

        .loading { display: flex; align-items: center; justify-content: center; padding: 50px; color: var(--text-muted); }
        .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .login-notice { text-align: center; padding: 12px; background: var(--orange-dim); border: 1px solid rgba(245,158,11,0.3); border-radius: 10px; color: var(--orange); font-size: 0.84rem; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <script src="/static/nav.js" data-active="manage-articles"></script>

    <div class="container">
        <div class="header-row">
            <div>
                <h1>Manage Articles</h1>
                <div class="subtitle">Create, edit, and manage articles with automatic translation to 9 languages</div>
            </div>
            <button class="add-btn" onclick="openForm()">+ New Article</button>
        </div>

        <div id="login-notice" class="login-notice" style="display:none">Log in to create, edit, or delete articles.</div>

        <div id="article-list" class="article-list">
            <div class="loading"><div class="spinner"></div> Loading articles...</div>
        </div>

        <div class="pagination">
            <button class="page-btn" id="btn-prev" onclick="prevPage()" disabled>Previous</button>
            <span class="page-info" id="page-info"></span>
            <button class="page-btn" id="btn-next" onclick="nextPage()">Next</button>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div class="form-overlay" id="formOverlay" onclick="if(event.target===this)closeForm()">
        <div class="form-modal">
            <button class="close-btn" onclick="closeForm()">&times;</button>
            <h2 id="form-title">New Article</h2>
            <div class="form-error" id="formError"></div>
            <div class="form-success" id="formSuccess"></div>
            <form onsubmit="handleSubmit(event)">
                <input type="hidden" id="edit-id">
                <div class="fg">
                    <label>Title</label>
                    <input type="text" id="f-title" placeholder="Article title" required>
                </div>
                <div class="fg">
                    <label>Author Name</label>
                    <input type="text" id="f-author" placeholder="Author name (optional)">
                </div>
                <div class="fg">
                    <label>Source Language</label>
                    <select id="f-lang"></select>
                    <div class="hint">The article will be auto-translated to all other languages</div>
                </div>
                <div class="fg">
                    <label>Body</label>
                    <textarea id="f-body" placeholder="Write your article content here..." required></textarea>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">Create Article</button>
            </form>
        </div>
    </div>

    <script>
        let currentSkip = 0;
        const PAGE_SIZE = 20;
        let lastCount = 0;

        function authHeaders() {
            const t = gprGetToken();
            return t ? { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json' } : null;
        }
        function isLoggedIn() { return !!gprGetToken(); }
        function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        function timeAgo(iso) {
            if (!iso) return 'N/A';
            const d = (Date.now() - new Date(iso).getTime()) / 1000;
            if (d < 60) return Math.round(d) + 's ago';
            if (d < 3600) return Math.round(d/60) + 'm ago';
            if (d < 86400) return Math.round(d/3600) + 'h ago';
            return Math.round(d/86400) + 'd ago';
        }
        function statusBadge(s) {
            const m = { completed: 'green', pending: 'orange', failed: 'red', in_progress: 'cyan' };
            return `<span class="badge badge-sm badge-${m[s]||'accent'}">${s}</span>`;
        }

        async function loadLanguages() {
            try {
                const res = await fetch('/api/languages');
                const langs = await res.json();
                const sel = document.getElementById('f-lang');
                sel.innerHTML = '';
                for (const [code, name] of Object.entries(langs)) {
                    const opt = document.createElement('option');
                    opt.value = code; opt.textContent = `${name} (${code})`;
                    if (code === 'en') opt.selected = true;
                    sel.appendChild(opt);
                }
            } catch (e) {}
        }

        async function loadArticles() {
            const el = document.getElementById('article-list');
            el.innerHTML = '<div class="loading"><div class="spinner"></div> Loading articles...</div>';
            document.getElementById('login-notice').style.display = isLoggedIn() ? 'none' : 'block';

            try {
                const res = await fetch(`/api/articles/?skip=${currentSkip}&limit=${PAGE_SIZE}`);
                const articles = await res.json();
                lastCount = articles.length;

                document.getElementById('page-info').textContent = `Showing ${currentSkip + 1}-${currentSkip + articles.length}`;
                document.getElementById('btn-prev').disabled = currentSkip === 0;
                document.getElementById('btn-next').disabled = articles.length < PAGE_SIZE;

                if (!articles.length) {
                    el.innerHTML = '<div class="empty"><div style="font-size:2rem;margin-bottom:10px">&#9997;&#65039;</div><div style="font-size:1.05rem;font-weight:600;color:var(--text-secondary);margin-bottom:6px">No articles yet</div><div>Create your first article to start auto-translating</div></div>';
                    return;
                }

                // Load translations for each
                const withTranslations = await Promise.all(articles.map(async (a) => {
                    try {
                        const tRes = await fetch(`/api/articles/${a.id}?include_translations=true`);
                        const full = await tRes.json();
                        return { ...a, translations: full.translations || [] };
                    } catch (e) { return { ...a, translations: [] }; }
                }));

                el.innerHTML = withTranslations.map(a => {
                    const completed = a.translations.filter(t => t.status === 'completed').length;
                    const failed = a.translations.filter(t => t.status === 'failed').length;
                    const pending = a.translations.filter(t => t.status === 'pending' || t.status === 'in_progress').length;
                    return `<div class="art-card">
                        <div class="art-top">
                            <div class="art-title">${esc(a.title)}</div>
                            <div class="art-actions">
                                <button class="act-btn" onclick="openEdit(${a.id})" ${!isLoggedIn()?'disabled':''}>Edit</button>
                                <button class="act-btn" onclick="viewTranslations(${a.id})">Translations</button>
                                <button class="act-btn danger" onclick="deleteArticle(${a.id})" ${!isLoggedIn()?'disabled':''}>Delete</button>
                            </div>
                        </div>
                        <div class="art-meta">
                            ${a.author_name ? `<span>${esc(a.author_name)}</span>` : ''}
                            <span class="badge badge-accent">${a.source_language}</span>
                            <span>Created ${timeAgo(a.created_at)}</span>
                            <span>Updated ${timeAgo(a.updated_at)}</span>
                        </div>
                        <div class="art-body-preview">${esc(a.body)}</div>
                        <div class="art-translations">
                            ${completed > 0 ? `<span class="badge badge-sm badge-green">${completed} translated</span>` : ''}
                            ${pending > 0 ? `<span class="badge badge-sm badge-orange">${pending} pending</span>` : ''}
                            ${failed > 0 ? `<span class="badge badge-sm badge-red">${failed} failed</span>` : ''}
                            ${a.translations.length === 0 ? '<span style="font-size:0.75rem;color:var(--text-muted)">No translations yet</span>' : ''}
                        </div>
                    </div>`;
                }).join('');
            } catch (err) {
                el.innerHTML = `<div class="empty" style="color:var(--red)">Failed: ${err.message}</div>`;
            }
        }

        function prevPage() { currentSkip = Math.max(0, currentSkip - PAGE_SIZE); loadArticles(); }
        function nextPage() { currentSkip += PAGE_SIZE; loadArticles(); }

        // ─── Create / Edit ───
        let editingId = null;

        function openForm(id) {
            if (!isLoggedIn()) return gprOpenModal('login');
            editingId = null;
            document.getElementById('form-title').textContent = 'New Article';
            document.getElementById('submitBtn').textContent = 'Create Article';
            document.getElementById('edit-id').value = '';
            document.getElementById('f-title').value = '';
            document.getElementById('f-author').value = '';
            document.getElementById('f-lang').value = 'en';
            document.getElementById('f-body').value = '';
            document.getElementById('formError').classList.remove('visible');
            document.getElementById('formSuccess').classList.remove('visible');
            document.getElementById('formOverlay').classList.add('active');
        }

        async function openEdit(id) {
            if (!isLoggedIn()) return gprOpenModal('login');
            try {
                const res = await fetch(`/api/articles/${id}?include_translations=false`);
                const a = await res.json();
                editingId = id;
                document.getElementById('form-title').textContent = 'Edit Article';
                document.getElementById('submitBtn').textContent = 'Save Changes';
                document.getElementById('edit-id').value = id;
                document.getElementById('f-title').value = a.title || '';
                document.getElementById('f-author').value = a.author_name || '';
                document.getElementById('f-lang').value = a.source_language || 'en';
                document.getElementById('f-body').value = a.body || '';
                document.getElementById('formError').classList.remove('visible');
                document.getElementById('formSuccess').classList.remove('visible');
                document.getElementById('formOverlay').classList.add('active');
            } catch (e) { alert('Failed to load article: ' + e.message); }
        }

        function closeForm() { document.getElementById('formOverlay').classList.remove('active'); }

        async function handleSubmit(e) {
            e.preventDefault();
            const h = authHeaders();
            if (!h) return gprOpenModal('login');
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            document.getElementById('formError').classList.remove('visible');

            const payload = {
                title: document.getElementById('f-title').value,
                body: document.getElementById('f-body').value,
                source_language: document.getElementById('f-lang').value,
                author_name: document.getElementById('f-author').value || null,
            };

            const isEdit = !!editingId;
            const url = isEdit ? `/api/articles/${editingId}` : '/api/articles/';
            const method = isEdit ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, { method, headers: h, body: JSON.stringify(payload) });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed');
                const suc = document.getElementById('formSuccess');
                suc.textContent = isEdit ? 'Article updated! Translations will re-run.' : 'Article created! Translations started.';
                suc.classList.add('visible');
                setTimeout(() => { closeForm(); loadArticles(); }, 1200);
            } catch (err) {
                const el = document.getElementById('formError');
                el.textContent = err.message; el.classList.add('visible');
            } finally { btn.disabled = false; btn.textContent = isEdit ? 'Save Changes' : 'Create Article'; }
        }

        async function deleteArticle(id) {
            const h = authHeaders();
            if (!h) return gprOpenModal('login');
            if (!confirm('Delete this article and all its translations?')) return;
            try {
                const res = await fetch(`/api/articles/${id}`, { method: 'DELETE', headers: h });
                if (!res.ok && res.status !== 204) { const d = await res.json(); throw new Error(d.detail || 'Failed'); }
                loadArticles();
            } catch (e) { alert('Failed: ' + e.message); }
        }

        function viewTranslations(id) {
            window.location.href = `/translations?article_id=${id}`;
        }

        loadLanguages();
        loadArticles();
    </script>
</body>
</html>
