<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Streamers — Gaming PR Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        .stats-bar { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
        .stat-pill { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; display: flex; flex-direction: column; gap: 2px; min-width: 130px; }
        .stat-pill .label { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        .stat-pill .value { font-size: 1.3rem; font-weight: 800; }
        .stat-pill .value.accent { color: var(--accent-light); }
        .stat-pill .value.green { color: var(--green); }
        .stat-pill .value.cyan { color: var(--cyan); }
        .stat-pill .value.orange { color: var(--orange); }

        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; padding: 14px 18px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); align-items: flex-end; }
        .fg input { width: 200px; }
        .fg select { min-width: 130px; }
        .tbtn { padding: 7px 16px; border-radius: 8px; font-size: 0.82rem; font-weight: 600; cursor: pointer; font-family: inherit; border: none; transition: all .2s; }
        .tbtn-primary { background: var(--accent); color: #fff; }
        .tbtn-primary:hover { opacity: 0.85; }
        .tbtn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
        .tbtn-ghost:hover { border-color: var(--accent); color: var(--text-primary); }
        .tbtn-green { background: var(--green); color: #fff; }
        .tbtn-green:hover { opacity: 0.85; }
        .tbtn-green:disabled { opacity: 0.4; cursor: not-allowed; }
        .toolbar-right { margin-left: auto; display: flex; gap: 8px; align-items: flex-end; }
        .selected-count { font-size: 0.8rem; color: var(--accent-light); font-weight: 600; padding: 8px 0; }

        .table-wrap { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
        th.sortable { cursor: pointer; user-select: none; }
        th.sortable:hover { color: var(--text-secondary); }
        .cb-cell { width: 36px; text-align: center; }
        .cb-cell input { accent-color: var(--accent); cursor: pointer; }
        .name-cell { color: var(--text-primary); font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .name-cell:hover { color: var(--accent-light); }
        .name-cell img { width: 28px; height: 28px; border-radius: 6px; object-fit: cover; }
        .name-cell .fallback-icon { width: 28px; height: 28px; border-radius: 6px; background: var(--accent-dim); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; color: var(--accent-light); flex-shrink: 0; }
        .platform-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 6px; font-size: 0.72rem; font-weight: 600; }
        .platform-twitch { background: rgba(145, 70, 255, 0.15); color: #bf94ff; }
        .platform-youtube { background: rgba(255, 0, 0, 0.12); color: #ff6b6b; }
        .platform-other { background: var(--accent-dim); color: var(--accent-light); }

        .detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; }
        .detail-overlay.open { display: block; }
        .detail-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 520px; max-width: 90vw; background: var(--bg-secondary); border-left: 1px solid var(--border); z-index: 201; transform: translateX(100%); transition: transform .25s ease; overflow-y: auto; padding: 28px; }
        .detail-panel.open { transform: translateX(0); }
        .dp-close { position: absolute; top: 16px; right: 16px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; display: grid; place-items: center; font-size: 1.1rem; transition: all .2s; }
        .dp-close:hover { border-color: var(--accent); color: var(--text-primary); }
        .dp-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; padding-right: 40px; }
        .dp-avatar { width: 56px; height: 56px; border-radius: 14px; background: var(--accent-dim); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; color: var(--accent-light); flex-shrink: 0; overflow: hidden; }
        .dp-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .dp-name { font-size: 1.2rem; font-weight: 800; }
        .dp-url { font-size: 0.8rem; color: var(--text-muted); word-break: break-all; }
        .dp-url a { color: inherit; text-decoration: none; }
        .dp-url a:hover { color: var(--accent-light); }
        .dp-section { margin-bottom: 22px; }
        .dp-section-title { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
        .dp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .dp-field { }
        .dp-label { font-size: 0.7rem; color: var(--text-muted); font-weight: 600; margin-bottom: 2px; }
        .dp-value { font-size: 0.88rem; color: var(--text-primary); }
        .dp-value a { color: var(--accent-light); text-decoration: none; }
        .dp-value a:hover { text-decoration: underline; }
        .dp-value.mono { font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; }
        .dp-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .dp-btn { padding: 8px 18px; border-radius: 8px; font-size: 0.84rem; font-weight: 600; cursor: pointer; font-family: inherit; border: none; transition: all .2s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
        .dp-btn-primary { background: var(--accent); color: #fff; }
        .dp-btn-primary:hover { opacity: 0.85; }
        .dp-btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
        .dp-btn-ghost:hover { border-color: var(--accent); color: var(--text-primary); }
        .dp-btn-green { background: var(--green); color: #fff; }
        .dp-btn-green:hover { opacity: 0.85; }

        .scraped-items { display: flex; flex-direction: column; gap: 10px; }
        .scraped-item { padding: 10px 12px; background: var(--bg-primary); border-radius: 8px; border: 1px solid var(--border); }
        .scraped-item:hover { border-color: var(--border-hover); }
        .si-title { font-size: 0.84rem; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
        .si-title a { color: inherit; text-decoration: none; }
        .si-title a:hover { color: var(--accent-light); }
        .si-meta { font-size: 0.72rem; color: var(--text-muted); display: flex; gap: 12px; }

        .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
        .empty-state .msg { font-size: 0.9rem; }
        .email-cell { font-size: 0.78rem; color: var(--accent-light); }
        .email-cell a { color: inherit; text-decoration: none; }
        .email-cell a:hover { text-decoration: underline; }
        .no-data { color: var(--text-muted); font-size: 0.75rem; }
        .contact-cell { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
        .contact-link { display: inline-flex; align-items: center; gap: 3px; padding: 2px 7px; border-radius: 5px; font-size: 0.72rem; font-weight: 600; text-decoration: none; border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-secondary); white-space: nowrap; }
        .contact-link:hover { color: var(--text-primary); border-color: var(--accent); }
        .contact-link.email { color: var(--accent-light); border-color: rgba(124,92,255,0.3); }
        .contact-link.twitter { color: #1d9bf0; border-color: rgba(29,155,240,0.3); }
        .contact-link.youtube { color: #ff0000; border-color: rgba(255,0,0,0.25); }
        .contact-link.discord { color: #5865f2; border-color: rgba(88,101,242,0.3); }
        .contact-link.tiktok { color: #fe2c55; border-color: rgba(254,44,85,0.3); }
        .contact-link.web { color: var(--cyan); border-color: rgba(6,182,212,0.3); }
        .tbtn-accent { background: var(--accent); color: #fff; }
        .tbtn-accent:hover { opacity: 0.85; }
        .tbtn-accent:disabled { opacity: 0.35; cursor: not-allowed; }
        .email-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 250; align-items: center; justify-content: center; }
        .email-overlay.open { display: flex; }
        .email-modal { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 20px; padding: 32px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; position: relative; }
        .email-modal h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
        .email-modal .sub { font-size: 0.84rem; color: var(--text-secondary); margin-bottom: 20px; }
        .email-modal .close-btn { position: absolute; top: 14px; right: 14px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.3rem; }
        .em-fg { margin-bottom: 14px; }
        .em-fg label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 4px; }
        .em-fg input, .em-fg textarea, .em-fg select { width: 100%; padding: 10px 12px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 0.88rem; font-family: inherit; outline: none; }
        .em-fg input:focus, .em-fg textarea:focus, .em-fg select:focus { border-color: var(--accent); }
        .em-fg textarea { min-height: 120px; resize: vertical; }
        .em-recipients { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
        .em-chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: rgba(124,92,255,0.1); color: var(--accent-light); border-radius: 6px; font-size: 0.76rem; font-weight: 500; }
        .em-chip .name { color: var(--text-primary); font-weight: 600; }
        .em-submit { width: 100%; padding: 12px; border-radius: 10px; font-weight: 600; font-size: 0.92rem; border: none; cursor: pointer; background: linear-gradient(135deg, var(--accent), #6344e0); color: #fff; font-family: inherit; margin-top: 8px; transition: all .2s; }
        .em-submit:hover { transform: translateY(-1px); }
        .em-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .em-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; padding: 9px 12px; border-radius: 8px; font-size: 0.82rem; margin-bottom: 14px; display: none; }
        .em-error.visible { display: block; }
        .em-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--green); padding: 9px 12px; border-radius: 8px; font-size: 0.82rem; margin-bottom: 14px; display: none; }
        .em-success.visible { display: block; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="container">
        <h1>Gaming Streamers</h1>
        <div class="subtitle">Track top gaming content creators across Twitch, YouTube, and more</div>

        <div class="stats-bar" id="statsBar">
            <div class="stat-pill stat-card--hero"><span class="label">Total Streamers</span><span class="value accent" id="statTotal">-</span></div>
            <div class="stat-pill"><span class="label">Active</span><span class="value green" id="statActive">-</span></div>
            <div class="stat-pill"><span class="label">Twitch</span><span class="value" id="statTwitch" style="color:#bf94ff">-</span></div>
            <div class="stat-pill"><span class="label">YouTube</span><span class="value" id="statYoutube" style="color:#ff6b6b">-</span></div>
            <div class="stat-pill"><span class="label">Content Scraped</span><span class="value cyan" id="statScraped">-</span></div>
            <div class="stat-pill"><span class="label">With Email</span><span class="value green" id="statWithEmail">-</span></div>
            <div class="stat-pill"><span class="label">With Failures</span><span class="value orange" id="statFailing">-</span></div>
        </div>

        <div class="toolbar">
            <div class="fg">
                <label>Search</label>
                <input type="text" id="searchInput" placeholder="Streamer name...">
            </div>
            <div class="fg">
                <label>Platform</label>
                <select id="platformFilter">
                    <option value="">All Platforms</option>
                    <option value="twitch">Twitch</option>
                    <option value="youtube">YouTube</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="fg">
                <label>Language</label>
                <select id="langFilter"><option value="">All Languages</option></select>
            </div>
            <div class="fg">
                <label>Status</label>
                <select id="statusFilter">
                    <option value="">All</option>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
            </div>
            <button class="tbtn tbtn-primary" onclick="loadStreamersAndChips()">Filter</button>
            <button class="tbtn tbtn-ghost" onclick="clearFilters()">Clear</button>
            <div class="toolbar-right">
                <span class="selected-count" id="selectedCount"></span>
                <button class="tbtn tbtn-accent" id="scrapeContactsBtn" onclick="bulkScrapeContacts()" disabled>Scrape Contacts</button>
                <button class="tbtn tbtn-green" id="scrapeBtn" onclick="scrapeSelected()" disabled>Scrape Selected</button>
                <button class="tbtn tbtn-green" id="emailBtn" onclick="openEmailModal()" disabled>Email Selected</button>
            </div>
        </div>

        <div id="streamer-filter-chips"></div>

        <div class="table-wrap">
            <table style="width:100%;border-collapse:collapse;">
                <thead>
                    <tr>
                        <th class="cb-cell"><input type="checkbox" id="selectAll" onclick="toggleAll(this)"></th>
                        <th class="sortable" id="sort-name" onclick="sortBy('name')">Streamer</th>
                        <th class="sortable" id="sort-platform" onclick="sortBy('platform')">Platform</th>
                        <th class="sortable" id="sort-language" onclick="sortBy('language')">Language</th>
                        <th>Country</th>
                        <th>Contact</th>
                        <th class="sortable" id="sort-is_active" onclick="sortBy('is_active')">Status</th>
                        <th class="sortable" id="sort-total_articles_scraped" onclick="sortBy('total_articles_scraped')">Content</th>
                        <th class="sortable" id="sort-last_scraped_at" onclick="sortBy('last_scraped_at')">Last Scraped</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="9"><div style="padding:20px"><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div></div></td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="detail-overlay" id="detailOverlay" onclick="closeDetail()"></div>
    <div class="detail-panel" id="detailPanel">
        <button class="dp-close" onclick="closeDetail()">&times;</button>
        <div id="detailContent"></div>
    </div>

    <!-- Email Modal -->
    <div class="email-overlay" id="emailOverlay" onclick="if(event.target===this)closeEmailModal()">
        <div class="email-modal">
            <button class="close-btn" onclick="closeEmailModal()">&times;</button>
            <h2>Send Email to Streamers</h2>
            <div class="sub" id="emSub">Sending to 0 streamers</div>
            <div class="em-error" id="emError"></div>
            <div class="em-success" id="emSuccess"></div>
            <div class="em-recipients" id="emRecipients"></div>
            <form onsubmit="handleSendEmail(event)">
                <div class="em-fg"><label>From Domain</label><select id="emDomain" required><option value="">Loading domains...</option></select></div>
                <div class="em-fg"><label>From Email</label><input type="email" id="emFrom" placeholder="press@yourdomain.com" required></div>
                <div class="em-fg"><label>From Name</label><input type="text" id="emFromName" placeholder="Gaming PR Team"></div>
                <div class="em-fg"><label>Subject</label><input type="text" id="emSubject" placeholder="Email subject line" required></div>
                <div class="em-fg"><label>HTML Body</label><textarea id="emHtml" placeholder="<h1>Hello!</h1><p>Your content...</p>"></textarea></div>
                <div class="em-fg"><label>Plain Text</label><textarea id="emText" placeholder="Plain text version..." style="min-height:80px"></textarea></div>
                <button type="submit" class="em-submit" id="emBtn">Send to All Selected</button>
            </form>
        </div>
    </div>

    <script src="/static/nav.js" data-active="streamers"></script>
    <script>
        let allStreamers = [];
        let selectedIds = new Set();
        let sortField = 'name';
        let sortDir = 1;

        async function loadStreamers() {
            const params = new URLSearchParams();
            params.set('category', 'gaming_streamer');
            const lang = document.getElementById('langFilter').value;
            const status = document.getElementById('statusFilter').value;
            const search = document.getElementById('searchInput').value.trim();
            if (lang) params.set('language', lang);
            if (status === 'active') params.set('is_active', 'true');
            else if (status === 'inactive') params.set('is_active', 'false');
            if (search) params.set('search', search);

            try {
                const res = await fetch(`/api/outlets/?${params}`);
                allStreamers = await res.json();
                filterAndRender();
                updateStats();
            } catch (e) {
                console.error('Failed to load streamers:', e);
            }
        }

        function filterAndRender() {
            const platform = document.getElementById('platformFilter').value;
            let filtered = allStreamers;
            if (platform) {
                filtered = filtered.filter(s => {
                    const cfg = s.scraper_config || {};
                    const p = (cfg.platform || detectPlatform(s.url)).toLowerCase();
                    if (platform === 'twitch') return p === 'twitch';
                    if (platform === 'youtube') return p === 'youtube';
                    return p !== 'twitch' && p !== 'youtube';
                });
            }
            filtered.sort((a, b) => {
                const av = (a[sortField] || '').toString().toLowerCase();
                const bv = (b[sortField] || '').toString().toLowerCase();
                return av < bv ? -sortDir : av > bv ? sortDir : 0;
            });
            renderTable(filtered);
        }

        function detectPlatform(url) {
            if (!url) return 'other';
            if (url.includes('twitch.tv')) return 'twitch';
            if (url.includes('youtube.com') || url.includes('youtu.be')) return 'youtube';
            return 'other';
        }

        function renderTable(streamers) {
            const tbody = document.getElementById('tableBody');
            if (!streamers.length) {
                tbody.innerHTML = '<tr><td colspan="9"><div class="gpr-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg><div class="msg">No streamers found</div><div class="hint">Try adjusting your filters</div></div></td></tr>';
                return;
            }
            tbody.innerHTML = streamers.map(s => {
                const cfg = s.scraper_config || {};
                const platform = cfg.platform || detectPlatform(s.url);
                const pClass = platform === 'twitch' ? 'platform-twitch' : platform === 'youtube' ? 'platform-youtube' : 'platform-other';
                const pLabel = platform.charAt(0).toUpperCase() + platform.slice(1);
                const checked = selectedIds.has(s.id) ? 'checked' : '';
                const statusBadge = s.is_active
                    ? '<span class="badge badge-green">Active</span>'
                    : '<span class="badge badge-red">Inactive</span>';
                const lastScraped = s.last_scraped_at ? timeAgo(s.last_scraped_at) : '<span class="no-data">Never</span>';
                const initial = s.name.charAt(0).toUpperCase();
                const favicon = s.favicon_url || s.logo_url;
                const icon = favicon
                    ? `<img src="${esc(favicon)}" onerror="this.outerHTML='<span class=fallback-icon>${initial}</span>'">`
                    : `<span class="fallback-icon">${initial}</span>`;

                const contactCell = (() => {
                        const links = [];
                        if (s.contact_email) links.push(`<a class="contact-link email" href="mailto:${esc(s.contact_email.split(',')[0].trim())}">✉ Email</a>`);
                        if (s.social_twitter) links.push(`<a class="contact-link twitter" href="${esc(s.social_twitter)}" target="_blank" rel="noopener">𝕏 Twitter</a>`);
                        if (s.social_youtube) links.push(`<a class="contact-link youtube" href="${esc(s.social_youtube)}" target="_blank" rel="noopener">▶ YouTube</a>`);
                        if (s.social_discord) links.push(`<a class="contact-link discord" href="${esc(s.social_discord)}" target="_blank" rel="noopener">Discord</a>`);
                        if (s.social_tiktok) links.push(`<a class="contact-link tiktok" href="${esc(s.social_tiktok)}" target="_blank" rel="noopener">TikTok</a>`);
                        if (s.contact_page_url) links.push(`<a class="contact-link web" href="${esc(s.contact_page_url)}" target="_blank" rel="noopener">↗ Contact</a>`);
                        if (!links.length) return '<span class="no-data">N/A</span>';
                        const visible = links.slice(0, 2).join('');
                        const extra = links.length > 2 ? `<span class="contact-more-badge" onclick="showDetail(${s.id})" title="See all contacts">+${links.length - 2} more</span>` : '';
                        return `<div class="contact-cell">${visible}${extra}</div>`;
                    })();
                return `<tr>
                    <td class="cb-cell"><input type="checkbox" ${checked} onchange="toggleSelect(${s.id}, this.checked)"></td>
                    <td><div class="name-cell" onclick="showDetail(${s.id})">${icon} ${esc(s.name)}</div></td>
                    <td><span class="platform-badge ${pClass}">${pLabel}</span></td>
                    <td>${esc(s.language || '')}</td>
                    <td>${esc(s.country || s.region || '')}</td>
                    <td>${contactCell}</td>
                    <td>${statusBadge}</td>
                    <td class="mono" style="font-size:0.82rem">${s.total_articles_scraped || 0}</td>
                    <td style="font-size:0.78rem;color:var(--text-muted)">${lastScraped} <span class="row-action" onclick="showDetail(${s.id})">View →</span></td>
                </tr>`;
            }).join('');
        }

        function updateStats() {
            const total = allStreamers.length;
            const active = allStreamers.filter(s => s.is_active).length;
            const twitch = allStreamers.filter(s => {
                const p = (s.scraper_config || {}).platform || detectPlatform(s.url);
                return p === 'twitch';
            }).length;
            const youtube = total - twitch;
            const scraped = allStreamers.reduce((sum, s) => sum + (s.total_articles_scraped || 0), 0);
            const failing = allStreamers.filter(s => s.consecutive_failures > 0).length;

            document.getElementById('statTotal').textContent = total;
            document.getElementById('statActive').textContent = active;
            document.getElementById('statTwitch').textContent = twitch;
            document.getElementById('statYoutube').textContent = youtube;
            const withEmail = allStreamers.filter(s => s.contact_email).length;
            document.getElementById('statScraped').textContent = scraped.toLocaleString();
            document.getElementById('statWithEmail').textContent = withEmail;
            document.getElementById('statFailing').textContent = failing;
        }

        async function showDetail(id) {
            const s = allStreamers.find(x => x.id === id);
            if (!s) return;
            const cfg = s.scraper_config || {};
            const platform = cfg.platform || detectPlatform(s.url);
            const pClass = platform === 'twitch' ? 'platform-twitch' : platform === 'youtube' ? 'platform-youtube' : 'platform-other';
            const initial = s.name.charAt(0).toUpperCase();

            let articlesHtml = '<div class="scraped-items"><div style="color:var(--text-muted);font-size:0.82rem">Loading recent content...</div></div>';

            document.getElementById('detailContent').innerHTML = `
                <div class="dp-header">
                    <div class="dp-avatar">${initial}</div>
                    <div>
                        <div class="dp-name">${esc(s.name)}</div>
                        <div class="dp-url"><a href="${esc(s.url)}" target="_blank">${esc(s.url)}</a></div>
                    </div>
                </div>
                <div class="dp-section">
                    <div class="dp-section-title">Profile</div>
                    <div class="dp-grid">
                        <div class="dp-field"><div class="dp-label">Platform</div><div class="dp-value"><span class="platform-badge ${pClass}">${platform}</span></div></div>
                        <div class="dp-field"><div class="dp-label">Language</div><div class="dp-value">${esc(s.language || '-')}</div></div>
                        <div class="dp-field"><div class="dp-label">Country</div><div class="dp-value">${esc(s.country || s.region || '-')}</div></div>
                        <div class="dp-field"><div class="dp-label">Status</div><div class="dp-value">${s.is_active ? '<span class="badge badge-green">Active</span>' : '<span class="badge badge-red">Inactive</span>'}</div></div>
                        <div class="dp-field"><div class="dp-label">Priority</div><div class="dp-value">${s.priority || '-'}</div></div>
                        <div class="dp-field"><div class="dp-label">Channel</div><div class="dp-value mono">${esc(cfg.channel_name || cfg.channel_id || '-')}</div></div>
                    </div>
                    ${s.description ? `<div style="margin-top:12px" class="dp-desc">${esc(s.description)}</div>` : ''}
                </div>
                <div class="dp-section">
                    <div class="dp-section-title">Scraping Stats</div>
                    <div class="dp-grid">
                        <div class="dp-field"><div class="dp-label">Content Scraped</div><div class="dp-value mono">${s.total_articles_scraped || 0}</div></div>
                        <div class="dp-field"><div class="dp-label">Avg per Scrape</div><div class="dp-value mono">${s.avg_articles_per_scrape || 0}</div></div>
                        <div class="dp-field"><div class="dp-label">Last Scraped</div><div class="dp-value">${s.last_scraped_at ? timeAgo(s.last_scraped_at) : 'Never'}</div></div>
                        <div class="dp-field"><div class="dp-label">Failures</div><div class="dp-value">${s.consecutive_failures > 0 ? `<span style="color:var(--orange)">${s.consecutive_failures}</span>` : '0'}</div></div>
                    </div>
                </div>
                <div class="dp-section">
                    <div class="dp-section-title">Contact Information</div>
                    <div class="dp-grid">
                        <div class="dp-field"><div class="dp-label">Email(s)</div><div class="dp-value">${s.contact_email ? s.contact_email.split(',').map(e => `<a href="mailto:${esc(e.trim())}">${esc(e.trim())}</a>`).join(', ') : '<span style="color:var(--text-muted)">Not found</span>'}</div></div>
                        <div class="dp-field"><div class="dp-label">Phone</div><div class="dp-value mono">${s.contact_phone || '<span style="color:var(--text-muted)">-</span>'}</div></div>
                        ${s.contact_page_url ? `<div class="dp-field"><div class="dp-label">Contact Page</div><div class="dp-value"><a href="${esc(s.contact_page_url)}" target="_blank">Visit</a></div></div>` : ''}
                    </div>
                </div>
                <div class="dp-section">
                    <div class="dp-section-title">Social Links</div>
                    <div class="dp-grid">
                        ${s.social_twitter ? `<div class="dp-field"><div class="dp-label">Twitter / X</div><div class="dp-value"><a href="${esc(s.social_twitter)}" target="_blank">Profile</a></div></div>` : ''}
                        ${s.social_youtube ? `<div class="dp-field"><div class="dp-label">YouTube</div><div class="dp-value"><a href="${esc(s.social_youtube)}" target="_blank">Channel</a></div></div>` : ''}
                        ${s.social_instagram ? `<div class="dp-field"><div class="dp-label">Instagram</div><div class="dp-value"><a href="${esc(s.social_instagram)}" target="_blank">Profile</a></div></div>` : ''}
                        ${s.social_tiktok ? `<div class="dp-field"><div class="dp-label">TikTok</div><div class="dp-value"><a href="${esc(s.social_tiktok)}" target="_blank">Profile</a></div></div>` : ''}
                        ${s.social_discord ? `<div class="dp-field"><div class="dp-label">Discord</div><div class="dp-value"><a href="${esc(s.social_discord)}" target="_blank">Server</a></div></div>` : ''}
                        ${s.social_facebook ? `<div class="dp-field"><div class="dp-label">Facebook</div><div class="dp-value"><a href="${esc(s.social_facebook)}" target="_blank">Page</a></div></div>` : ''}
                        ${s.social_linkedin ? `<div class="dp-field"><div class="dp-label">LinkedIn</div><div class="dp-value"><a href="${esc(s.social_linkedin)}" target="_blank">Profile</a></div></div>` : ''}
                    </div>
                    ${!s.social_twitter && !s.social_youtube && !s.social_instagram && !s.social_tiktok && !s.social_discord ? '<div style="color:var(--text-muted);font-size:0.82rem;padding:4px">No social links found yet. Try scraping contacts.</div>' : ''}
                </div>
                <div class="dp-section">
                    <div class="dp-section-title">Recent Content</div>
                    <div id="detailArticles">${articlesHtml}</div>
                </div>
                <div class="dp-section">
                    <div class="dp-section-title">Outreach Profile <button style="float:right;font-size:0.7rem;padding:2px 8px;cursor:pointer;border:1px solid var(--border);border-radius:4px;background:none;color:var(--text-muted)" onclick="refreshStreamerProfile(${s.id})">↺ Refresh</button></div>
                    ${s.outreach_profile ? `<pre style="font-size:0.75rem;color:var(--text-secondary);background:var(--bg-primary);padding:10px;border-radius:6px;overflow:auto;max-height:200px;white-space:pre-wrap;word-break:break-word">${esc(JSON.stringify(JSON.parse(s.outreach_profile), null, 2))}</pre>` : `<div style="color:var(--text-muted);font-size:0.82rem">No profile yet. Click ↺ Refresh to compile from current data.</div>`}
                </div>
                <div class="dp-actions">
                    <button class="dp-btn dp-btn-green" onclick="scrapeOne(${s.id})">Scrape Content</button>
                    <button class="dp-btn dp-btn-primary" onclick="scrapeOne(${s.id})">Scrape Contacts</button>
                    <a class="dp-btn dp-btn-ghost" href="${esc(s.url)}" target="_blank">Visit Channel</a>
                </div>
            `;

            document.getElementById('detailOverlay').classList.add('open');
            document.getElementById('detailPanel').classList.add('open');

            // Load recent scraped content
            try {
                const res = await fetch(`/api/scraper/articles?outlet_id=${id}&limit=10`);
                const articles = await res.json();
                const el = document.getElementById('detailArticles');
                if (articles.length) {
                    el.innerHTML = '<div class="scraped-items">' + articles.map(a => `
                        <div class="scraped-item">
                            <div class="si-title"><a href="${esc(a.url)}" target="_blank">${esc(a.title)}</a></div>
                            <div class="si-meta">
                                <span>${a.article_type || 'content'}</span>
                                ${a.published_at ? `<span>${new Date(a.published_at).toLocaleDateString()}</span>` : ''}
                            </div>
                        </div>
                    `).join('') + '</div>';
                } else {
                    el.innerHTML = '<div style="color:var(--text-muted);font-size:0.82rem;padding:8px">No content scraped yet</div>';
                }
            } catch (e) { /* ignore */ }
        }

        function closeDetail() {
            document.getElementById('detailOverlay').classList.remove('open');
            document.getElementById('detailPanel').classList.remove('open');
        }

        async function refreshStreamerProfile(id) {
            try {
                const r = await fetch(`/api/streamers/${id}/refresh-profile`, { method: 'POST' });
                if (!r.ok) throw new Error(await r.text());
                const updated = await r.json();
                const idx = allStreamers.findIndex(x => x.id === id);
                if (idx !== -1) { allStreamers[idx] = updated; showDetail(id); }
            } catch (e) { alert('Failed to refresh profile: ' + e.message); }
        }

        function toggleSelect(id, checked) {
            if (checked) selectedIds.add(id); else selectedIds.delete(id);
            updateSelectionUI();
        }

        function toggleAll(cb) {
            const boxes = document.querySelectorAll('#tableBody input[type="checkbox"]');
            boxes.forEach(b => { b.checked = cb.checked; });
            if (cb.checked) allStreamers.forEach(s => selectedIds.add(s.id));
            else selectedIds.clear();
            updateSelectionUI();
        }

        function updateSelectionUI() {
            const count = selectedIds.size;
            document.getElementById('selectedCount').textContent = count ? `${count} selected` : '';
            document.getElementById('scrapeBtn').disabled = count === 0;
            document.getElementById('scrapeContactsBtn').disabled = count === 0;
            document.getElementById('emailBtn').disabled = count === 0;
        }

        async function scrapeSelected() {
            const token = localStorage.getItem('gpr_token');
            if (!token) { if (typeof gprOpenModal === 'function') gprOpenModal('login'); return; }
            for (const id of selectedIds) {
                try {
                    await fetch(`/api/scraper/run/${id}?run_async=true`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
                } catch (e) { /* continue */ }
            }
            if (typeof gprToast === 'function') gprToast('Scraping', `Queued ${selectedIds.size} streamers for scraping`, 'success');
        }

        async function scrapeOne(id) {
            const token = localStorage.getItem('gpr_token');
            if (!token) { if (typeof gprOpenModal === 'function') gprOpenModal('login'); return; }
            try {
                const res = await fetch(`/api/scraper/run/${id}?run_async=true`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
                if (res.status === 401 || res.status === 403) { localStorage.removeItem('gpr_token'); if (typeof gprOpenModal === 'function') gprOpenModal('login'); return; }
                if (typeof gprToast === 'function') gprToast('Scraping', 'Streamer scrape queued', 'success');
            } catch (e) {
                if (typeof gprToast === 'function') gprToast('Error', 'Failed to start scrape', 'error');
            }
        }

        function sortBy(field) {
            if (sortField === field) sortDir *= -1; else { sortField = field; sortDir = 1; }
            document.querySelectorAll('th.sortable').forEach(th => th.classList.remove('sort-asc', 'sort-desc'));
            const activeTh = document.getElementById('sort-' + field);
            if (activeTh) activeTh.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
            filterAndRender();
        }

        function renderStreamerFilterChips() {
            const search = document.getElementById('searchInput').value.trim();
            const platform = document.getElementById('platformFilter').value;
            const lang = document.getElementById('langFilter').value;
            const status = document.getElementById('statusFilter').value;
            const chips = [];
            if (search) chips.push(`<span class="filter-chip">Search: <strong>${esc(search)}</strong><button class="filter-chip-remove" onclick="clearStreamerFilter('search')">×</button></span>`);
            if (platform) chips.push(`<span class="filter-chip">Platform: <strong>${esc(platform)}</strong><button class="filter-chip-remove" onclick="clearStreamerFilter('platform')">×</button></span>`);
            if (lang) chips.push(`<span class="filter-chip">Language: <strong>${esc(lang)}</strong><button class="filter-chip-remove" onclick="clearStreamerFilter('lang')">×</button></span>`);
            if (status) chips.push(`<span class="filter-chip">Status: <strong>${esc(status)}</strong><button class="filter-chip-remove" onclick="clearStreamerFilter('status')">×</button></span>`);
            const container = document.getElementById('streamer-filter-chips');
            if (container) container.innerHTML = chips.length ? `<div class="filter-chips">${chips.join('')}</div>` : '';
        }

        window.clearStreamerFilter = function(key) {
            const map = {search:'searchInput', platform:'platformFilter', lang:'langFilter', status:'statusFilter'};
            if (map[key]) { const el = document.getElementById(map[key]); if (el) el.value = ''; }
            loadStreamersAndChips();
        };

        function loadStreamersAndChips() { loadStreamers().then(() => renderStreamerFilterChips()); }

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('platformFilter').value = '';
            document.getElementById('langFilter').value = '';
            document.getElementById('statusFilter').value = '';
            const container = document.getElementById('streamer-filter-chips');
            if (container) container.innerHTML = '';
            loadStreamers();
        }

        function timeAgo(d) { return typeof gprTimeAgo === 'function' ? gprTimeAgo(d) : (d || ''); }
        function esc(s) { return typeof gprEsc === 'function' ? gprEsc(s) : (s || ''); }

        async function loadLanguages() {
            try {
                const res = await fetch('/api/languages');
                const langs = await res.json();
                const sel = document.getElementById('langFilter');
                for (const [code, name] of Object.entries(langs)) {
                    sel.innerHTML += `<option value="${code}">${name}</option>`;
                }
            } catch (e) { /* ignore */ }
        }

        async function bulkScrapeContacts() {
            const token = localStorage.getItem('gpr_token');
            if (!token) { if (typeof gprOpenModal === 'function') gprOpenModal('login'); return; }
            for (const id of selectedIds) {
                try {
                    await fetch(`/api/scraper/run/${id}?run_async=true`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
                } catch (e) { /* continue */ }
            }
            if (typeof gprToast === 'function') gprToast('Scraping', `Queued ${selectedIds.size} streamers for contact scraping`, 'success');
        }

        async function openEmailModal() {
            const withEmail = allStreamers.filter(s => selectedIds.has(s.id) && s.contact_email);
            if (!withEmail.length) {
                if (typeof gprToast === 'function') gprToast('No Emails', 'None of the selected streamers have contact emails. Try scraping contacts first.', 'error');
                return;
            }
            document.getElementById('emSub').textContent = `Sending to ${withEmail.length} streamer(s)`;
            document.getElementById('emRecipients').innerHTML = withEmail.map(s =>
                `<span class="em-chip"><span class="name">${esc(s.name)}</span> ${esc(s.contact_email.split(',')[0].trim())}</span>`
            ).join('');
            document.getElementById('emError').className = 'em-error';
            document.getElementById('emSuccess').className = 'em-success';
            // Load domains
            try {
                const res = await fetch('/api/email/domains');
                const domains = await res.json();
                const sel = document.getElementById('emDomain');
                sel.innerHTML = '<option value="">Select domain...</option>' +
                    domains.filter(d => d.status === 'verified').map(d =>
                        `<option value="${d.id}">${esc(d.domain)}</option>`
                    ).join('');
            } catch (e) {
                document.getElementById('emDomain').innerHTML = '<option value="">No domains available</option>';
            }
            document.getElementById('emailOverlay').classList.add('open');
        }

        function closeEmailModal() {
            document.getElementById('emailOverlay').classList.remove('open');
        }

        async function handleSendEmail(e) {
            e.preventDefault();
            const token = localStorage.getItem('gpr_token');
            if (!token) { if (typeof gprOpenModal === 'function') gprOpenModal('login'); return; }
            const btn = document.getElementById('emBtn');
            btn.disabled = true; btn.textContent = 'Sending...';
            const domainId = document.getElementById('emDomain').value;
            const fromEmail = document.getElementById('emFrom').value;
            const fromName = document.getElementById('emFromName').value;
            const subject = document.getElementById('emSubject').value;
            const html = document.getElementById('emHtml').value;
            const text = document.getElementById('emText').value;
            const withEmail = allStreamers.filter(s => selectedIds.has(s.id) && s.contact_email);
            let sent = 0, failed = 0;
            for (const s of withEmail) {
                const to = s.contact_email.split(',')[0].trim();
                try {
                    const res = await fetch('/api/email/send', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ domain_id: parseInt(domainId), from_email: fromEmail, from_name: fromName, to: [to], subject, html, text })
                    });
                    if (res.ok) sent++; else failed++;
                } catch (e) { failed++; }
            }
            btn.disabled = false; btn.textContent = 'Send to All Selected';
            if (sent > 0) {
                const el = document.getElementById('emSuccess');
                el.textContent = `Sent ${sent} email(s) successfully${failed ? `, ${failed} failed` : ''}`;
                el.className = 'em-success visible';
            }
            if (failed > 0 && sent === 0) {
                const el = document.getElementById('emError');
                el.textContent = `Failed to send ${failed} email(s)`;
                el.className = 'em-error visible';
            }
        }

        // Auto-set global category when visiting this page
        setTimeout(() => { if (typeof gprGetCategory === 'function' && gprGetCategory() !== 'gaming_streamer') { localStorage.setItem('gpr_category', 'gaming_streamer'); document.querySelectorAll('.sb-cat-pill').forEach(p => p.classList.toggle('active', p.dataset.cat === 'gaming_streamer')); } }, 100);

        loadLanguages();
        loadStreamers();
    </script>
</body>
</html>
