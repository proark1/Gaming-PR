<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaigns — Gaming PR Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        .container { max-width: 1300px; }
        .tabs { display: flex; gap: 4px; margin-bottom: 28px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 4px; width: fit-content; }
        .tab { padding: 8px 20px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; background: transparent; border: none; color: var(--text-muted); font-family: inherit; transition: all .2s; }
        .tab:hover { color: var(--text-secondary); }
        .tab.active { background: var(--accent); color: #fff; }
        .stat-value.green { color: var(--green); }
        .stat-value.cyan { color: var(--cyan); }
        .stat-value.red { color: var(--red); }
        .stat-value.orange { color: var(--orange); }
        .stat-value.accent { color: var(--accent-light); }
        .card { margin-bottom: 20px; }
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
        .act-btn { background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-secondary); padding: 6px 14px; border-radius: 8px; font-size: 0.78rem; font-weight: 500; cursor: pointer; font-family: inherit; transition: all .2s; }
        .act-btn:hover { border-color: var(--accent); color: var(--text-primary); }
        .act-btn.danger:hover { border-color: var(--red); color: var(--red); }
        .act-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .add-btn { background: linear-gradient(135deg, var(--accent), #6344e0); color: #fff; border: none; padding: 8px 18px; border-radius: 8px; font-size: 0.84rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .2s; box-shadow: 0 4px 16px rgba(124,92,255,0.3); }
        .add-btn:hover { transform: translateY(-1px); }
        .form-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 200; align-items: center; justify-content: center; }
        .form-overlay.active { display: flex; }
        .form-modal { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 20px; padding: 32px; width: 100%; max-width: 600px; position: relative; box-shadow: 0 25px 60px rgba(0,0,0,0.5); max-height: 90vh; overflow-y: auto; }
        .form-modal h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; }
        .form-modal .close-btn { position: absolute; top: 14px; right: 14px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.3rem; }
        .fg { margin-bottom: 14px; }
        .fg label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; }
        .fg input, .fg select, .fg textarea { width: 100%; padding: 9px 12px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-family: inherit; font-size: 0.85rem; box-sizing: border-box; }
        .fg input:focus, .fg select:focus, .fg textarea:focus { border-color: var(--accent); outline: none; }
        .fg textarea { min-height: 80px; resize: vertical; }
        .fg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .fg-row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .submit-btn { width: 100%; padding: 11px; border-radius: 10px; font-weight: 600; font-size: 0.9rem; border: none; cursor: pointer; background: linear-gradient(135deg, var(--accent), #6344e0); color: #fff; font-family: inherit; margin-top: 8px; transition: all .2s; }
        .submit-btn:hover { transform: translateY(-1px); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; }
        .badge.draft { background: rgba(148,163,184,0.15); color: #94a3b8; }
        .badge.personalizing, .badge.paused { background: rgba(251,146,60,0.15); color: #fb923c; }
        .badge.scheduled { background: rgba(34,211,238,0.15); color: #22d3ee; }
        .badge.sending { background: rgba(124,92,255,0.15); color: var(--accent-light); }
        .badge.completed { background: rgba(52,211,153,0.15); color: #34d399; }
        .badge.failed, .badge.bounced { background: rgba(239,68,68,0.15); color: #ef4444; }
        .badge.sent, .badge.delivered { background: rgba(34,211,238,0.15); color: #22d3ee; }
        .badge.opened, .badge.clicked { background: rgba(52,211,153,0.15); color: #34d399; }
        .badge.skipped { background: rgba(148,163,184,0.1); color: #64748b; }
        .badge.personalized { background: rgba(124,92,255,0.1); color: var(--accent-light); }
        .detail-back { cursor: pointer; color: var(--accent-light); font-size: 0.85rem; margin-bottom: 16px; display: inline-block; }
        .detail-back:hover { text-decoration: underline; }
        .rate-card { text-align: center; }
        .rate-value { font-size: 1.8rem; font-weight: 800; }
        .chk-row { display: flex; gap: 16px; align-items: center; }
        .chk-row label { font-size: 0.82rem; color: var(--text-secondary); display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="page-header">
        <h1 id="pageTitle">Campaigns</h1>
        <p class="page-subtitle" id="pageSubtitle">Automated PR outreach to streamers, outlets, and investors</p>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="showTab('campaigns')">Campaigns</button>
        <button class="tab" onclick="showTab('dnc')">Do Not Contact</button>
    </div>

    <!-- CAMPAIGN LIST -->
    <div id="campaignList">
        <div class="stats-grid" id="topStats"></div>
        <div class="btn-row">
            <button class="add-btn" onclick="openCreate()">+ New Campaign</button>
        </div>
        <div class="card"><div class="table-wrapper"><table class="data-table"><thead>
            <tr><th>Name</th><th>Status</th><th>Targets</th><th>Sent</th><th>Opened</th><th>Clicked</th><th>Created</th><th>Actions</th></tr>
        </thead><tbody id="campBody"></tbody></table></div></div>
    </div>

    <!-- CAMPAIGN DETAIL -->
    <div id="campaignDetail" style="display:none">
        <span class="detail-back" onclick="showList()">&larr; Back to campaigns</span>
        <div id="detailHeader"></div>
        <div class="stats-grid" id="detailStats"></div>
        <div class="btn-row" id="detailActions"></div>
        <div class="card"><div class="table-wrapper"><table class="data-table"><thead>
            <tr><th>Name</th><th>Type</th><th>Email</th><th>Status</th><th>Sent</th><th>Opened</th></tr>
        </thead><tbody id="outreachBody"></tbody></table></div></div>
    </div>

    <!-- DNC -->
    <div id="dncSection" style="display:none">
        <div class="btn-row">
            <button class="add-btn" onclick="openDNC()">+ Add to DNC</button>
        </div>
        <div class="card"><div class="table-wrapper"><table class="data-table"><thead>
            <tr><th>Email</th><th>Reason</th><th>Source</th><th>Date</th><th>Actions</th></tr>
        </thead><tbody id="dncBody"></tbody></table></div></div>
    </div>
</div>

<!-- CREATE/EDIT MODAL -->
<div class="form-overlay" id="createModal">
    <div class="form-modal">
        <button class="close-btn" onclick="closeModals()">&times;</button>
        <h2 id="modalTitle">New Campaign</h2>
        <form id="campForm" onsubmit="return saveCampaign(event)">
            <input type="hidden" id="editId">
            <div class="fg"><label>Campaign Name *</label><input id="fName" required></div>
            <div class="fg"><label>Description</label><textarea id="fDesc"></textarea></div>
            <div class="fg-row">
                <div class="fg"><label>Message ID *</label><input type="number" id="fMsgId" required></div>
                <div class="fg"><label>Domain ID *</label><input type="number" id="fDomainId" required></div>
            </div>
            <div class="fg-row3">
                <div class="fg"><label>From Email *</label><input id="fFrom" required></div>
                <div class="fg"><label>From Name</label><input id="fFromName"></div>
                <div class="fg"><label>Reply-To</label><input id="fReplyTo"></div>
            </div>
            <div class="fg"><label>Target Types</label>
                <div class="chk-row">
                    <label><input type="checkbox" id="tStreamer" checked> Streamers</label>
                    <label><input type="checkbox" id="tOutlet" checked> Outlets</label>
                    <label><input type="checkbox" id="tVC"> VCs</label>
                </div>
            </div>
            <div class="fg-row">
                <div class="fg"><label>Min Followers</label><input type="number" id="fMinF"></div>
                <div class="fg"><label>Max Followers</label><input type="number" id="fMaxF"></div>
            </div>
            <div class="fg-row">
                <div class="fg"><label>Languages (comma-sep)</label><input id="fLangs" placeholder="en,es,ja"></div>
                <div class="fg"><label>Platforms (comma-sep)</label><input id="fPlats" placeholder="twitch,youtube"></div>
            </div>
            <div class="fg-row3">
                <div class="fg"><label>Batch Size</label><input type="number" id="fBatch" value="20"></div>
                <div class="fg"><label>Batch Delay (s)</label><input type="number" id="fDelay" value="300"></div>
                <div class="fg"><label>Max Follow-ups</label><input type="number" id="fMaxFU" value="1"></div>
            </div>
            <div class="fg"><label><input type="checkbox" id="fFUEnabled"> Enable follow-up (after 3 days of no open)</label></div>
            <button type="submit" class="submit-btn">Create Campaign</button>
        </form>
    </div>
</div>

<!-- DNC MODAL -->
<div class="form-overlay" id="dncModal">
    <div class="form-modal" style="max-width:400px">
        <button class="close-btn" onclick="closeModals()">&times;</button>
        <h2>Add to Do Not Contact</h2>
        <form onsubmit="return addDNC(event)">
            <div class="fg"><label>Email *</label><input id="dncEmail" required></div>
            <div class="fg"><label>Reason</label><select id="dncReason"><option>manual</option><option>bounced</option><option>unsubscribed</option></select></div>
            <button type="submit" class="submit-btn">Add</button>
        </form>
    </div>
</div>

<script src="/static/nav.js"></script>
<script>
const token = localStorage.getItem('token');
const authH = token ? {'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json'} : {'Content-Type': 'application/json'};
let currentId = null;

function showTab(t) {
    document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', i === (t==='campaigns'?0:1)));
    document.getElementById('campaignList').style.display = t==='campaigns'?'':'none';
    document.getElementById('campaignDetail').style.display = 'none';
    document.getElementById('dncSection').style.display = t==='dnc'?'':'none';
    if(t==='campaigns') loadCampaigns();
    if(t==='dnc') loadDNC();
}

function showList() {
    document.getElementById('campaignList').style.display = '';
    document.getElementById('campaignDetail').style.display = 'none';
    loadCampaigns();
}

async function loadCampaigns() {
    const r = await fetch('/api/campaigns/');
    const data = await r.json();
    const total = data.length;
    const active = data.filter(c => ['sending','scheduled','personalizing'].includes(c.status)).length;
    const sent = data.reduce((s,c) => s + (c.sent_count||0), 0);
    const opened = data.reduce((s,c) => s + (c.opened_count||0), 0);
    document.getElementById('topStats').innerHTML = `
        <div class="stat-card"><div class="stat-value accent">${total}</div><div class="stat-label">Total Campaigns</div></div>
        <div class="stat-card"><div class="stat-value cyan">${active}</div><div class="stat-label">Active</div></div>
        <div class="stat-card"><div class="stat-value green">${sent}</div><div class="stat-label">Total Sent</div></div>
        <div class="stat-card"><div class="stat-value orange">${opened}</div><div class="stat-label">Total Opened</div></div>`;
    document.getElementById('campBody').innerHTML = data.map(c => `<tr>
        <td><a href="#" onclick="viewCampaign(${c.id});return false" style="color:var(--accent-light)">${esc(c.name)}</a></td>
        <td><span class="badge ${c.status}">${c.status}</span></td>
        <td>${c.total_targets}</td><td>${c.sent_count}</td><td>${c.opened_count}</td><td>${c.clicked_count}</td>
        <td>${new Date(c.created_at).toLocaleDateString()}</td>
        <td class="btn-row">
            ${c.status==='draft'?`<button class="act-btn" onclick="launchCamp(${c.id})">Launch</button><button class="act-btn danger" onclick="deleteCamp(${c.id})">Delete</button>`:''}
            ${['sending','scheduled'].includes(c.status)?`<button class="act-btn" onclick="pauseCamp(${c.id})">Pause</button>`:''}
            ${c.status==='paused'?`<button class="act-btn" onclick="resumeCamp(${c.id})">Resume</button>`:''}
        </td></tr>`).join('');
}

async function viewCampaign(id) {
    currentId = id;
    document.getElementById('campaignList').style.display = 'none';
    document.getElementById('campaignDetail').style.display = '';
    const [cr, sr, or] = await Promise.all([
        fetch(`/api/campaigns/${id}`).then(r=>r.json()),
        fetch(`/api/campaigns/${id}/stats`).then(r=>r.json()),
        fetch(`/api/campaigns/${id}/outreach`).then(r=>r.json()),
    ]);
    document.getElementById('detailHeader').innerHTML = `<div class="card" style="padding:20px">
        <h2 style="margin:0 0 8px">${esc(cr.name)} <span class="badge ${cr.status}">${cr.status}</span></h2>
        <p style="color:var(--text-muted);margin:0;font-size:0.85rem">${esc(cr.description||'')} &mdash; Message #${cr.message_id||'?'}, Domain #${cr.domain_id||'?'}, From: ${esc(cr.from_email||'')}</p>
    </div>`;
    const d = delivered = Math.max(sr.delivered||1,1);
    document.getElementById('detailStats').innerHTML = `
        <div class="stat-card rate-card"><div class="rate-value accent">${sr.sent}</div><div class="stat-label">Sent</div></div>
        <div class="stat-card rate-card"><div class="rate-value cyan">${sr.delivered}</div><div class="stat-label">Delivered</div></div>
        <div class="stat-card rate-card"><div class="rate-value green">${sr.opened}</div><div class="stat-label">Opened (${(sr.open_rate*100).toFixed(1)}%)</div></div>
        <div class="stat-card rate-card"><div class="rate-value green">${sr.clicked}</div><div class="stat-label">Clicked (${(sr.click_rate*100).toFixed(1)}%)</div></div>
        <div class="stat-card rate-card"><div class="rate-value orange">${sr.replied}</div><div class="stat-label">Replied (${(sr.reply_rate*100).toFixed(1)}%)</div></div>
        <div class="stat-card rate-card"><div class="rate-value red">${sr.bounced}</div><div class="stat-label">Bounced (${(sr.bounce_rate*100).toFixed(1)}%)</div></div>`;
    let btns = `<button class="act-btn" onclick="previewTargets(${id})">Preview Targets</button>
        <button class="act-btn" onclick="syncEvents(${id})">Sync Events</button>`;
    if(cr.status==='draft') btns += `<button class="add-btn" onclick="launchCamp(${id})">Launch Campaign</button>`;
    if(['sending','scheduled'].includes(cr.status)) btns += `<button class="act-btn" onclick="pauseCamp(${id})">Pause</button>`;
    if(cr.status==='paused') btns += `<button class="act-btn" onclick="resumeCamp(${id})">Resume</button>`;
    document.getElementById('detailActions').innerHTML = btns;
    document.getElementById('outreachBody').innerHTML = or.map(o => `<tr>
        <td>${esc(o.target_name)}</td><td>${o.target_type}</td><td style="font-size:0.8rem">${esc(o.target_email||'-')}</td>
        <td><span class="badge ${o.status}">${o.status}</span>${o.skip_reason?` <small>(${o.skip_reason})</small>`:''}</td>
        <td>${o.sent_at?new Date(o.sent_at).toLocaleString():'-'}</td>
        <td>${o.opened_at?new Date(o.opened_at).toLocaleString():'-'}</td>
    </tr>`).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--text-muted)">No outreach records yet</td></tr>';
}

async function previewTargets(id) {
    const r = await fetch(`/api/campaigns/${id}/preview`, {method:'POST', headers:authH});
    const d = await r.json();
    window.showToast?.(`Preview: ${d.total} targets (${d.with_email} with email, ${d.on_dnc_list} on DNC)`, 'success') || alert(`${d.total} targets, ${d.with_email} with email, ${d.on_dnc_list} on DNC`);
}

async function launchCamp(id) {
    if(!confirm('Launch this campaign? This will begin personalization and sending.')) return;
    const r = await fetch(`/api/campaigns/${id}/launch`, {method:'POST', headers:authH});
    if(r.ok) { window.showToast?.('Campaign launched!', 'success'); viewCampaign(id); }
    else { const e = await r.json(); window.showToast?.(e.detail||'Launch failed', 'error') || alert(e.detail); }
}

async function pauseCamp(id) {
    await fetch(`/api/campaigns/${id}/pause`, {method:'POST', headers:authH});
    window.showToast?.('Campaign paused', 'success');
    currentId ? viewCampaign(id) : loadCampaigns();
}

async function resumeCamp(id) {
    await fetch(`/api/campaigns/${id}/resume`, {method:'POST', headers:authH});
    window.showToast?.('Campaign resumed', 'success');
    currentId ? viewCampaign(id) : loadCampaigns();
}

async function deleteCamp(id) {
    if(!confirm('Delete this campaign?')) return;
    await fetch(`/api/campaigns/${id}`, {method:'DELETE', headers:authH});
    window.showToast?.('Campaign deleted', 'success');
    loadCampaigns();
}

async function syncEvents(id) {
    await fetch(`/api/campaigns/${id}/sync-events`, {method:'POST', headers:authH});
    window.showToast?.('Events synced', 'success');
    viewCampaign(id);
}

function openCreate() {
    document.getElementById('editId').value = '';
    document.getElementById('modalTitle').textContent = 'New Campaign';
    document.getElementById('campForm').reset();
    document.getElementById('fBatch').value = 20;
    document.getElementById('fDelay').value = 300;
    document.getElementById('fMaxFU').value = 1;
    document.getElementById('tStreamer').checked = true;
    document.getElementById('tOutlet').checked = true;
    document.getElementById('createModal').classList.add('active');
}
function closeModals() { document.querySelectorAll('.form-overlay').forEach(m => m.classList.remove('active')); }

async function saveCampaign(e) {
    e.preventDefault();
    const types = [];
    if(document.getElementById('tStreamer').checked) types.push('streamer');
    if(document.getElementById('tOutlet').checked) types.push('outlet');
    if(document.getElementById('tVC').checked) types.push('vc');
    const filters = {};
    const minF = document.getElementById('fMinF').value; if(minF) filters.min_followers = +minF;
    const maxF = document.getElementById('fMaxF').value; if(maxF) filters.max_followers = +maxF;
    const langs = document.getElementById('fLangs').value.trim(); if(langs) filters.languages = langs.split(',').map(s=>s.trim());
    const plats = document.getElementById('fPlats').value.trim(); if(plats) filters.platforms = plats.split(',').map(s=>s.trim());
    const body = {
        name: document.getElementById('fName').value,
        description: document.getElementById('fDesc').value || null,
        message_id: +document.getElementById('fMsgId').value,
        domain_id: +document.getElementById('fDomainId').value,
        from_email: document.getElementById('fFrom').value,
        from_name: document.getElementById('fFromName').value || null,
        reply_to: document.getElementById('fReplyTo').value || null,
        target_types: types,
        target_filters: Object.keys(filters).length ? filters : null,
        batch_size: +document.getElementById('fBatch').value || 20,
        batch_delay_seconds: +document.getElementById('fDelay').value || 300,
        follow_up_enabled: document.getElementById('fFUEnabled').checked,
        max_follow_ups: +document.getElementById('fMaxFU').value || 1,
    };
    const editId = document.getElementById('editId').value;
    const url = editId ? `/api/campaigns/${editId}` : '/api/campaigns/';
    const method = editId ? 'PUT' : 'POST';
    const r = await fetch(url, {method, headers:authH, body:JSON.stringify(body)});
    if(r.ok) { closeModals(); window.showToast?.('Campaign saved', 'success'); loadCampaigns(); }
    else { const e = await r.json(); window.showToast?.(e.detail||'Error', 'error'); }
    return false;
}

// DNC
async function loadDNC() {
    const r = await fetch('/api/campaigns/dnc/list');
    const data = await r.json();
    document.getElementById('dncBody').innerHTML = data.map(d => `<tr>
        <td>${esc(d.email)}</td><td>${d.reason}</td><td>${esc(d.source||'-')}</td>
        <td>${new Date(d.created_at).toLocaleDateString()}</td>
        <td><button class="act-btn danger" onclick="removeDNC(${d.id})">Remove</button></td>
    </tr>`).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">No entries</td></tr>';
}

function openDNC() { document.getElementById('dncModal').classList.add('active'); }

async function addDNC(e) {
    e.preventDefault();
    const r = await fetch('/api/campaigns/dnc', {method:'POST', headers:authH, body:JSON.stringify({
        email: document.getElementById('dncEmail').value,
        reason: document.getElementById('dncReason').value,
    })});
    if(r.ok) { closeModals(); window.showToast?.('Added to DNC', 'success'); loadDNC(); }
    return false;
}

async function removeDNC(id) {
    if(!confirm('Remove from Do Not Contact list?')) return;
    await fetch(`/api/campaigns/dnc/${id}`, {method:'DELETE', headers:authH});
    window.showToast?.('Removed', 'success');
    loadDNC();
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

loadCampaigns();
</script>
</body>
</html>
