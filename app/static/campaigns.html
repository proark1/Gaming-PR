<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaigns — Gaming PR Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Page-specific styles (shared styles loaded by nav.js) */
        .container { max-width: 1300px; }
        .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 16px; flex-wrap: wrap; }
        .add-btn { background: linear-gradient(135deg, var(--accent), #6344e0); color: #fff; border: none; padding: 10px 22px; border-radius: 10px; font-size: 0.88rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .2s; box-shadow: 0 4px 16px rgba(124,92,255,0.3); }
        .add-btn:hover { transform: translateY(-1px); }
        .act-btn { background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-secondary); padding: 6px 12px; border-radius: 6px; font-size: 0.76rem; font-weight: 500; cursor: pointer; font-family: inherit; transition: all .2s; }
        .act-btn:hover { border-color: var(--accent); color: var(--text-primary); }
        .act-btn.danger:hover { border-color: var(--red); color: var(--red); }
        .act-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .tabs { display: flex; gap: 4px; margin-bottom: 28px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 4px; width: fit-content; }
        .tab { padding: 8px 20px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; background: transparent; border: none; color: var(--text-muted); font-family: inherit; transition: all .2s; }
        .tab:hover { color: var(--text-secondary); }
        .tab.active { background: var(--accent); color: #fff; }
        .panel { display: none; }
        .panel.active { display: block; }
        .card { margin-bottom: 20px; }
        .stat-value.accent { color: var(--accent-light); }
        .stat-value.green { color: var(--green); }
        .stat-value.cyan { color: var(--cyan); }
        .stat-value.red { color: var(--red); }
        .stat-value.orange { color: var(--orange); }
        .form-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 200; align-items: center; justify-content: center; }
        .form-overlay.active { display: flex; }
        .form-modal { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 20px; padding: 32px; width: 100%; max-width: 600px; position: relative; box-shadow: 0 25px 60px rgba(0,0,0,0.5); max-height: 90vh; overflow-y: auto; }
        .form-modal h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; }
        .form-modal .close-btn { position: absolute; top: 14px; right: 14px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.3rem; }
        .submit-btn { width: 100%; padding: 11px; border-radius: 10px; font-weight: 600; font-size: 0.9rem; border: none; cursor: pointer; background: linear-gradient(135deg, var(--accent), #6344e0); color: #fff; font-family: inherit; margin-top: 8px; transition: all .2s; }
        .submit-btn:hover { transform: translateY(-1px); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .form-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; padding: 9px 12px; border-radius: 8px; font-size: 0.82rem; margin-bottom: 14px; display: none; }
        .form-error.visible { display: block; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .chk-row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        .chk-row label { display: flex; align-items: center; gap: 6px; font-size: 0.84rem; color: var(--text-secondary); cursor: pointer; }
        #detail-view { display: none; }
        .back-link { color: var(--accent-light); cursor: pointer; font-size: 0.85rem; font-weight: 500; margin-bottom: 16px; display: inline-block; }
        .back-link:hover { text-decoration: underline; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; font-size: 0.84rem; margin-bottom: 16px; }
        .info-grid dt { color: var(--text-muted); font-size: 0.78rem; }
        .info-grid dd { color: var(--text-primary); margin: 0 0 8px; }
        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); padding: 12px 20px; border-radius: 10px; font-size: 0.84rem; z-index: 999; opacity: 0; transform: translateY(10px); transition: all .3s; pointer-events: none; }
        .toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .dnc-input-row { display: flex; gap: 8px; margin-bottom: 16px; }
        .dnc-input-row input { flex: 1; background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary); padding: 8px 12px; border-radius: 8px; font-family: inherit; font-size: 0.84rem; }
        .dnc-input-row input:focus { outline: none; border-color: var(--accent); }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <script src="/static/nav.js" data-active="campaigns"></script>

    <div class="container">
        <!-- LIST VIEW -->
        <div id="list-view">
            <div class="header-row">
                <div><h1>Campaigns</h1><div class="subtitle">Create and manage outreach campaigns</div></div>
                <button class="add-btn" onclick="openForm()">+ New Campaign</button>
            </div>
            <div class="stat-grid" id="list-stats"></div>
            <div class="tabs">
                <button class="tab active" data-tab="campaigns" onclick="switchTab('campaigns')">Campaigns</button>
                <button class="tab" data-tab="dnc" onclick="switchTab('dnc')">Do Not Contact</button>
            </div>
            <div class="panel active" id="panel-campaigns">
                <div class="card"><div id="campaigns-table"><div class="loading"><div class="spinner"></div> Loading...</div></div></div>
            </div>
            <div class="panel" id="panel-dnc">
                <div class="card">
                    <div class="card-header"><span>Do Not Contact List</span></div>
                    <div class="dnc-input-row">
                        <input type="email" id="dnc-email" placeholder="email@example.com">
                        <input type="text" id="dnc-reason" placeholder="Reason (optional)">
                        <button class="add-btn" onclick="addDnc()">Add</button>
                    </div>
                    <div id="dnc-table"></div>
                </div>
            </div>
        </div>

        <!-- DETAIL VIEW -->
        <div id="detail-view">
            <span class="back-link" onclick="showList()">&larr; Back to Campaigns</span>
            <div class="header-row">
                <div><h1 id="detail-name"></h1><div class="subtitle" id="detail-desc"></div></div>
                <div class="btn-row" id="detail-actions"></div>
            </div>
            <div class="card"><div class="info-grid" id="detail-info"></div></div>
            <div class="stat-grid" id="detail-stats"></div>
            <div class="card">
                <div class="card-header"><span>Outreach Records</span><button class="act-btn" onclick="syncEvents()">Sync Events</button></div>
                <div id="outreach-table"><div class="loading"><div class="spinner"></div> Loading...</div></div>
            </div>
        </div>
    </div>

    <!-- Campaign Form Modal -->
    <div class="form-overlay" id="campaign-overlay">
        <div class="form-modal">
            <button class="close-btn" onclick="closeForm()">&times;</button>
            <h2 id="form-title">New Campaign</h2>
            <div class="form-error" id="form-error"></div>
            <form id="campaign-form" onsubmit="saveCampaign(event)">
                <div class="fg" style="margin-bottom:12px"><label>Name</label><input id="f-name" required></div>
                <div class="fg" style="margin-bottom:12px"><label>Description</label><textarea id="f-desc" rows="2"></textarea></div>
                <div class="form-row" style="margin-bottom:12px">
                    <div class="fg"><label>Message ID</label><input id="f-message-id" placeholder="UUID"></div>
                    <div class="fg"><label>Domain ID</label><input id="f-domain-id" placeholder="UUID"></div>
                </div>
                <div class="form-row-3" style="margin-bottom:12px">
                    <div class="fg"><label>From Email</label><input id="f-from-email" type="email"></div>
                    <div class="fg"><label>From Name</label><input id="f-from-name"></div>
                    <div class="fg"><label>Reply To</label><input id="f-reply-to" type="email"></div>
                </div>
                <div class="fg" style="margin-bottom:12px">
                    <label>Target Types</label>
                    <div class="chk-row">
                        <label><input type="checkbox" id="f-tt-streamer" value="streamer"> Streamer</label>
                        <label><input type="checkbox" id="f-tt-outlet" value="outlet"> Outlet</label>
                        <label><input type="checkbox" id="f-tt-vc" value="vc"> VC</label>
                    </div>
                </div>
                <div class="form-row" style="margin-bottom:12px">
                    <div class="fg"><label>Min Followers</label><input id="f-min-fol" type="number" min="0"></div>
                    <div class="fg"><label>Max Followers</label><input id="f-max-fol" type="number" min="0"></div>
                </div>
                <div class="form-row" style="margin-bottom:12px">
                    <div class="fg"><label>Languages (comma-sep)</label><input id="f-langs" placeholder="en,es"></div>
                    <div class="fg"><label>Platforms (comma-sep)</label><input id="f-platforms" placeholder="twitch,youtube"></div>
                </div>
                <div class="form-row" style="margin-bottom:12px">
                    <div class="fg"><label>Batch Size</label><input id="f-batch-size" type="number" min="1" value="50"></div>
                    <div class="fg"><label>Batch Delay (seconds)</label><input id="f-batch-delay" type="number" min="0" value="60"></div>
                </div>
                <div class="fg" style="margin-bottom:12px">
                    <label><input type="checkbox" id="f-followup"> Enable Follow-ups</label>
                </div>
                <div class="form-row" style="margin-bottom:12px" id="followup-fields" hidden>
                    <div class="fg"><label>Follow-up Delay (days)</label><input id="f-fu-delay" type="number" min="1" value="3"></div>
                    <div class="fg"><label>Max Follow-ups</label><input id="f-fu-max" type="number" min="1" value="2"></div>
                </div>
                <input type="hidden" id="f-id">
                <button type="submit" class="submit-btn" id="form-submit">Create Campaign</button>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    const API = '/api/campaigns';
    const token = () => localStorage.getItem('token');
    const authH = () => ({ 'Content-Type': 'application/json', ...(token() ? { Authorization: `Bearer ${token()}` } : {}) });
    let currentId = null;

    let _tt;
    function showToast(msg, isError = false) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.borderColor = isError ? 'var(--red)' : 'var(--border)';
        t.classList.add('show');
        clearTimeout(_tt);
        _tt = setTimeout(() => t.classList.remove('show'), 3000);
    }

    function switchTab(name) {
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
        document.getElementById('panel-campaigns').classList.toggle('active', name === 'campaigns');
        document.getElementById('panel-dnc').classList.toggle('active', name === 'dnc');
        if (name === 'dnc') loadDnc();
    }

    const STATUS_COLORS = { draft: '', personalizing: 'orange', scheduled: 'cyan', sending: 'accent', paused: 'orange', completed: 'green', failed: 'red' };
    function statusBadge(s) {
        const c = STATUS_COLORS[s] || '';
        return '<span class="badge' + (c ? ' badge-' + c : '') + '">' + (s || '-') + '</span>';
    }
    function fmtDate(d) { return d ? new Date(d).toLocaleDateString() : '-'; }
    function splitCsv(v) { return v ? v.split(',').map(s => s.trim()).filter(Boolean) : []; }

    document.getElementById('f-followup').addEventListener('change', function(e) {
        document.getElementById('followup-fields').hidden = !e.target.checked;
    });

    // --- LIST ---
    async function loadCampaigns() {
        try {
            var res = await fetch(API + '/', { headers: authH() });
            var data = await res.json();
            var list = Array.isArray(data) ? data : (data.campaigns || data.items || []);
            renderListStats(list);
            if (!list.length) { document.getElementById('campaigns-table').innerHTML = '<p style="color:var(--text-muted);padding:20px">No campaigns yet.</p>'; return; }
            var html = '<table><thead><tr><th>Name</th><th>Status</th><th>Targets</th><th>Sent</th><th>Opened</th><th>Clicked</th><th>Created</th><th>Actions</th></tr></thead><tbody>';
            list.forEach(function(c) {
                var tgt = (c.target_types || []).join(', ') || '-';
                html += '<tr>'
                    + '<td><a href="#" onclick="showDetail(\'' + c.id + '\');return false" style="color:var(--accent-light);text-decoration:none;font-weight:600">' + (c.name || 'Untitled') + '</a></td>'
                    + '<td>' + statusBadge(c.status || 'draft') + '</td>'
                    + '<td>' + tgt + '</td>'
                    + '<td>' + (c.sent_count || 0) + '</td>'
                    + '<td>' + (c.opened_count || 0) + '</td>'
                    + '<td>' + (c.clicked_count || 0) + '</td>'
                    + '<td>' + fmtDate(c.created_at) + '</td>'
                    + '<td class="btn-row">'
                    + '<button class="act-btn" onclick="showDetail(\'' + c.id + '\')">View</button>'
                    + (c.status === 'draft' ? '<button class="act-btn" onclick="launchCampaign(\'' + c.id + '\')">Launch</button>' : '')
                    + (c.status === 'sending' ? '<button class="act-btn" onclick="pauseCampaign(\'' + c.id + '\')">Pause</button>' : '')
                    + '<button class="act-btn danger" onclick="deleteCampaign(\'' + c.id + '\')">Delete</button>'
                    + '</td></tr>';
            });
            html += '</tbody></table>';
            document.getElementById('campaigns-table').innerHTML = html;
        } catch (e) { showToast('Failed to load campaigns: ' + e.message, true); }
    }

    function renderListStats(list) {
        var total = list.length;
        var active = list.filter(function(c) { return ['sending','scheduled','personalizing'].indexOf(c.status) >= 0; }).length;
        var sent = list.reduce(function(s, c) { return s + (c.sent_count || 0); }, 0);
        var opened = list.reduce(function(s, c) { return s + (c.opened_count || 0); }, 0);
        var items = [['Total', total, 'accent'], ['Active', active, 'cyan'], ['Sent', sent, 'green'], ['Opened', opened, 'orange']];
        document.getElementById('list-stats').innerHTML = items.map(function(x) {
            return '<div class="stat-card"><div class="stat-label">' + x[0] + '</div><div class="stat-value ' + x[2] + '">' + x[1] + '</div></div>';
        }).join('');
    }

    // --- FORM ---
    function openForm(campaign) {
        var f = function(id) { return document.getElementById(id); };
        f('form-title').textContent = campaign ? 'Edit Campaign' : 'New Campaign';
        f('form-submit').textContent = campaign ? 'Update Campaign' : 'Create Campaign';
        f('form-error').classList.remove('visible');
        f('f-id').value = (campaign && campaign.id) || '';
        f('f-name').value = (campaign && campaign.name) || '';
        f('f-desc').value = (campaign && campaign.description) || '';
        f('f-message-id').value = (campaign && campaign.message_id) || '';
        f('f-domain-id').value = (campaign && campaign.domain_id) || '';
        f('f-from-email').value = (campaign && campaign.from_email) || '';
        f('f-from-name').value = (campaign && campaign.from_name) || '';
        f('f-reply-to').value = (campaign && campaign.reply_to) || '';
        var tt = (campaign && campaign.target_types) || [];
        ['streamer','outlet','vc'].forEach(function(t) { f('f-tt-' + t).checked = tt.indexOf(t) >= 0; });
        var tf = (campaign && campaign.target_filters) || {};
        f('f-min-fol').value = tf.min_followers != null ? tf.min_followers : '';
        f('f-max-fol').value = tf.max_followers != null ? tf.max_followers : '';
        f('f-langs').value = (tf.languages || []).join(', ');
        f('f-platforms').value = (tf.platforms || []).join(', ');
        f('f-batch-size').value = (campaign && campaign.batch_size) || 50;
        f('f-batch-delay').value = (campaign && campaign.batch_delay_seconds != null) ? campaign.batch_delay_seconds : 60;
        f('f-followup').checked = (campaign && campaign.follow_up_enabled) || false;
        f('followup-fields').hidden = !f('f-followup').checked;
        f('f-fu-delay').value = (campaign && campaign.follow_up_delay_days) || 3;
        f('f-fu-max').value = (campaign && campaign.max_follow_ups) || 2;
        f('campaign-overlay').classList.add('active');
    }
    function closeForm() { document.getElementById('campaign-overlay').classList.remove('active'); }

    async function saveCampaign(e) {
        e.preventDefault();
        var f = function(id) { return document.getElementById(id).value; };
        var id = f('f-id');
        var target_types = ['streamer','outlet','vc'].filter(function(t) { return document.getElementById('f-tt-' + t).checked; });
        var body = {
            name: f('f-name'), description: f('f-desc') || null,
            message_id: f('f-message-id') || null, domain_id: f('f-domain-id') || null,
            from_email: f('f-from-email') || null, from_name: f('f-from-name') || null, reply_to: f('f-reply-to') || null,
            target_types: target_types,
            target_filters: {
                min_followers: f('f-min-fol') ? Number(f('f-min-fol')) : null,
                max_followers: f('f-max-fol') ? Number(f('f-max-fol')) : null,
                languages: splitCsv(f('f-langs')),
                platforms: splitCsv(f('f-platforms'))
            },
            batch_size: Number(f('f-batch-size')) || 50,
            batch_delay_seconds: Number(f('f-batch-delay')) || 60,
            follow_up_enabled: document.getElementById('f-followup').checked,
            follow_up_delay_days: Number(f('f-fu-delay')) || 3,
            max_follow_ups: Number(f('f-fu-max')) || 2
        };
        var btn = document.getElementById('form-submit');
        btn.disabled = true;
        try {
            var res = await fetch(id ? (API + '/' + id) : API + '/', {
                method: id ? 'PUT' : 'POST', headers: authH(), body: JSON.stringify(body)
            });
            var data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Failed');
            showToast(id ? 'Campaign updated' : 'Campaign created');
            closeForm(); loadCampaigns();
            if (currentId) loadDetail(currentId);
        } catch (err) {
            var el = document.getElementById('form-error');
            el.textContent = err.message; el.classList.add('visible');
        } finally { btn.disabled = false; }
    }

    // --- ACTIONS ---
    async function apiAction(url, method) {
        method = method || 'POST';
        try {
            var res = await fetch(url, { method: method, headers: authH() });
            var data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Failed');
            return data;
        } catch (e) { showToast(e.message, true); return null; }
    }

    async function launchCampaign(id) { if (await apiAction(API + '/' + id + '/launch')) { showToast('Campaign launched'); loadCampaigns(); if (currentId === id) loadDetail(id); } }
    async function pauseCampaign(id) { if (await apiAction(API + '/' + id + '/pause')) { showToast('Campaign paused'); loadCampaigns(); if (currentId === id) loadDetail(id); } }
    async function resumeCampaign(id) { if (await apiAction(API + '/' + id + '/resume')) { showToast('Campaign resumed'); loadCampaigns(); if (currentId === id) loadDetail(id); } }
    async function deleteCampaign(id) {
        if (!confirm('Delete this campaign?')) return;
        if (await apiAction(API + '/' + id, 'DELETE')) { showToast('Campaign deleted'); if (currentId === id) showList(); loadCampaigns(); }
    }
    async function previewCampaign(id) {
        var data = await apiAction(API + '/' + id + '/preview');
        if (data) showToast('Preview: ' + (data.total_targets || data.count || JSON.stringify(data).substring(0, 80)) + ' targets');
    }
    async function syncEvents() {
        if (await apiAction(API + '/' + currentId + '/sync-events')) { showToast('Events synced'); loadDetail(currentId); }
    }

    // --- DETAIL VIEW ---
    function showList() {
        currentId = null;
        document.getElementById('list-view').style.display = '';
        document.getElementById('detail-view').style.display = 'none';
    }

    async function showDetail(id) {
        currentId = id;
        document.getElementById('list-view').style.display = 'none';
        document.getElementById('detail-view').style.display = '';
        await loadDetail(id);
    }

    var _editCampaign = null;
    async function loadDetail(id) {
        try {
            var results = await Promise.all([
                fetch(API + '/' + id, { headers: authH() }),
                fetch(API + '/' + id + '/stats', { headers: authH() }),
                fetch(API + '/' + id + '/outreach', { headers: authH() })
            ]);
            var campaign = await results[0].json();
            var stats = results[1].ok ? await results[1].json() : {};
            var outreach = results[2].ok ? await results[2].json() : [];
            var oList = Array.isArray(outreach) ? outreach : (outreach.records || outreach.items || []);
            _editCampaign = campaign;

            document.getElementById('detail-name').textContent = campaign.name || 'Untitled';
            document.getElementById('detail-desc').textContent = campaign.description || '';

            document.getElementById('detail-info').innerHTML =
                '<div><dt>Status</dt><dd>' + statusBadge(campaign.status || 'draft') + '</dd></div>' +
                '<div><dt>Target Types</dt><dd>' + ((campaign.target_types || []).join(', ') || '-') + '</dd></div>' +
                '<div><dt>Batch Size</dt><dd>' + (campaign.batch_size || '-') + '</dd></div>' +
                '<div><dt>Created</dt><dd>' + fmtDate(campaign.created_at) + '</dd></div>' +
                '<div><dt>From</dt><dd>' + (campaign.from_email || '-') + '</dd></div>' +
                '<div><dt>Follow-ups</dt><dd>' + (campaign.follow_up_enabled ? 'Yes (' + campaign.max_follow_ups + 'x, ' + campaign.follow_up_delay_days + 'd delay)' : 'No') + '</dd></div>';

            var s = campaign.status || 'draft';
            var btns = '<button class="act-btn" onclick="previewCampaign(\'' + id + '\')">Preview</button>'
                + '<button class="act-btn" onclick="openForm(_editCampaign)">Edit</button>';
            if (s === 'draft') btns += '<button class="add-btn" onclick="launchCampaign(\'' + id + '\')">Launch</button>';
            if (s === 'sending') btns += '<button class="act-btn" onclick="pauseCampaign(\'' + id + '\')">Pause</button>';
            if (s === 'paused') btns += '<button class="add-btn" onclick="resumeCampaign(\'' + id + '\')">Resume</button>';
            document.getElementById('detail-actions').innerHTML = btns;

            var sent = stats.sent || 0, delivered = stats.delivered || 0, opened = stats.opened || 0;
            var clicked = stats.clicked || 0, replied = stats.replied || 0, bounced = stats.bounced || 0;
            var total = sent || 1;
            var pct = function(n) { return Math.round(n / total * 100); };
            var statItems = [
                ['Sent', sent, 'accent'], ['Delivered', delivered, 'cyan'],
                ['Opened', opened + ' (' + pct(opened) + '%)', 'green'],
                ['Clicked', clicked + ' (' + pct(clicked) + '%)', 'cyan'],
                ['Replied', replied, 'green'],
                ['Bounced', bounced + ' (' + pct(bounced) + '%)', 'red']
            ];
            document.getElementById('detail-stats').innerHTML = statItems.map(function(x) {
                return '<div class="stat-card"><div class="stat-label">' + x[0] + '</div><div class="stat-value ' + x[2] + '">' + x[1] + '</div></div>';
            }).join('');

            if (!oList.length) {
                document.getElementById('outreach-table').innerHTML = '<p style="color:var(--text-muted);padding:12px">No outreach records yet.</p>';
                return;
            }
            var html = '<table><thead><tr><th>Name</th><th>Type</th><th>Email</th><th>Status</th><th>Sent At</th><th>Opened At</th></tr></thead><tbody>';
            oList.forEach(function(r) {
                html += '<tr>'
                    + '<td>' + (r.name || r.contact_name || '-') + '</td>'
                    + '<td>' + (r.type || r.target_type || '-') + '</td>'
                    + '<td style="font-family:\'JetBrains Mono\',monospace;font-size:0.78rem">' + (r.email || '-') + '</td>'
                    + '<td>' + statusBadge(r.status || '-') + '</td>'
                    + '<td>' + fmtDate(r.sent_at) + '</td>'
                    + '<td>' + fmtDate(r.opened_at) + '</td>'
                    + '</tr>';
            });
            html += '</tbody></table>';
            document.getElementById('outreach-table').innerHTML = html;
        } catch (e) { showToast('Failed to load details: ' + e.message, true); }
    }

    // --- DNC ---
    async function loadDnc() {
        try {
            var res = await fetch(API + '/dnc/list', { headers: authH() });
            var data = await res.json();
            var list = Array.isArray(data) ? data : (data.entries || data.items || []);
            if (!list.length) { document.getElementById('dnc-table').innerHTML = '<p style="color:var(--text-muted)">No DNC entries.</p>'; return; }
            var html = '<table><thead><tr><th>Email</th><th>Reason</th><th>Added</th><th></th></tr></thead><tbody>';
            list.forEach(function(e) {
                html += '<tr>'
                    + '<td style="font-family:\'JetBrains Mono\',monospace;font-size:0.78rem">' + e.email + '</td>'
                    + '<td>' + (e.reason || '-') + '</td>'
                    + '<td>' + fmtDate(e.created_at) + '</td>'
                    + '<td><button class="act-btn danger" onclick="removeDnc(\'' + e.id + '\')">Remove</button></td>'
                    + '</tr>';
            });
            html += '</tbody></table>';
            document.getElementById('dnc-table').innerHTML = html;
        } catch (e) { showToast('Failed to load DNC: ' + e.message, true); }
    }

    async function addDnc() {
        var email = document.getElementById('dnc-email').value.trim();
        if (!email) return;
        var reason = document.getElementById('dnc-reason').value.trim();
        try {
            var res = await fetch(API + '/dnc', { method: 'POST', headers: authH(), body: JSON.stringify({ email: email, reason: reason || null }) });
            if (!res.ok) { var d = await res.json(); throw new Error(d.detail || 'Failed'); }
            showToast('Added to DNC');
            document.getElementById('dnc-email').value = '';
            document.getElementById('dnc-reason').value = '';
            loadDnc();
        } catch (e) { showToast(e.message, true); }
    }

    async function removeDnc(id) {
        if (await apiAction(API + '/dnc/' + id, 'DELETE')) { showToast('Removed from DNC'); loadDnc(); }
    }

    // Boot
    loadCampaigns();
    </script>
</body>
</html>
