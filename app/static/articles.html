<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles — Gaming PR Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Page-specific styles (shared styles loaded by nav.js) */

        /* Filters */
        .filters {
            display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px;
            padding: 16px 20px;
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
        }
        .filter-group { display: flex; flex-direction: column; gap: 4px; }
        .filter-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        .filter-input, .filter-select {
            background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary);
            padding: 8px 12px; border-radius: 8px; font-size: 0.84rem; font-family: inherit;
            outline: none; transition: border-color .2s;
        }
        .filter-input:focus, .filter-select:focus { border-color: var(--accent); }
        .filter-input { width: 260px; }
        .filter-select { min-width: 140px; cursor: pointer; }
        .filter-select option { background: var(--bg-primary); color: var(--text-primary); }
        .filter-btn {
            align-self: flex-end;
            background: var(--accent); color: #fff; border: none;
            padding: 8px 20px; border-radius: 8px; font-size: 0.84rem; font-weight: 600;
            cursor: pointer; font-family: inherit; transition: opacity .2s;
        }
        .filter-btn:hover { opacity: 0.85; }
        .filter-btn.secondary {
            background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
        }
        .filter-btn.secondary:hover { border-color: var(--accent); color: var(--text-primary); }

        /* Result bar */
        .result-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .result-count { font-size: 0.85rem; color: var(--text-secondary); }
        .result-count strong { color: var(--text-primary); }
        .pagination { display: flex; gap: 8px; }
        .page-btn {
            background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary);
            padding: 6px 14px; border-radius: 8px; font-size: 0.82rem; cursor: pointer;
            font-family: inherit; transition: all .2s;
        }
        .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--text-primary); }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Article cards */
        .articles-list { display: flex; flex-direction: column; gap: 12px; }
        .article-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 20px; transition: border-color .2s, background .2s; cursor: pointer;
            display: grid; grid-template-columns: 1fr auto; gap: 16px;
        }
        .article-card:hover { border-color: rgba(124,92,255,0.4); background: var(--bg-card-hover); }
        .article-title {
            font-size: 1rem; font-weight: 600; color: var(--text-primary);
            line-height: 1.4; margin-bottom: 8px;
        }
        .article-title a { color: inherit; text-decoration: none; }
        .article-title a:hover { color: var(--accent-light); }
        .article-meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 0.78rem; color: var(--text-muted); align-items: center; }
        .article-meta .sep { color: var(--border); }
        .article-summary { font-size: 0.85rem; color: var(--text-secondary); margin-top: 8px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .article-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .tag { padding: 2px 8px; background: rgba(124,92,255,0.1); color: var(--accent-light); border-radius: 4px; font-size: 0.7rem; font-weight: 500; }
        .article-thumb {
            width: 160px; height: 100px; border-radius: 8px; object-fit: cover;
            background: var(--bg-secondary); flex-shrink: 0;
        }
        @media (max-width: 700px) {
            .article-card { grid-template-columns: 1fr; }
            .article-thumb { width: 100%; height: 180px; order: -1; }
        }

        /* Detail modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 250;
            display: none; align-items: center; justify-content: center; padding: 24px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px;
            max-width: 800px; width: 100%; max-height: 85vh; overflow-y: auto;
            padding: 32px; position: relative;
        }
        .modal-close {
            position: absolute; top: 16px; right: 16px;
            background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary);
            width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 1.1rem;
            display: grid; place-items: center; transition: all .2s;
        }
        .modal-close:hover { border-color: var(--accent); color: var(--text-primary); }
        .modal h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 16px; padding-right: 40px; line-height: 1.4; }
        .modal-meta { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 20px; font-size: 0.82rem; color: var(--text-secondary); }
        .modal-meta dt { color: var(--text-muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.3px; font-weight: 600; margin-bottom: 2px; }
        .modal-meta dd { margin: 0; }
        .modal-body { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.7; }
        .modal-body img { max-width: 100%; border-radius: 8px; margin: 12px 0; }
        .modal-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
        .modal-section-title { font-size: 0.78rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 8px; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .detail-item dt { color: var(--text-muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.3px; font-weight: 600; }
        .detail-item dd { margin: 0; font-size: 0.85rem; color: var(--text-primary); }

        .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <script src="/static/nav.js" data-active="articles"></script>

    <div class="container">
        <h1>Scraped Articles</h1>
        <div class="subtitle">Browse, search, and filter articles collected from 80+ gaming outlets</div>

        <div class="filters">
            <div class="filter-group">
                <span class="filter-label">Search</span>
                <input class="filter-input" id="f-search" type="text" placeholder="Search article titles...">
            </div>
            <div class="filter-group">
                <span class="filter-label">Language</span>
                <select class="filter-select" id="f-language">
                    <option value="">All Languages</option>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">Source Type</span>
                <select class="filter-select" id="f-source">
                    <option value="">All Sources</option>
                    <option value="gaming_news">News Outlets</option>
                    <option value="gaming_vc">Gaming VCs</option>
                    <option value="gaming_streamer">Streamers</option>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">Article Type</span>
                <select class="filter-select" id="f-type">
                    <option value="">All Types</option>
                    <option value="news">News</option>
                    <option value="review">Review</option>
                    <option value="preview">Preview</option>
                    <option value="guide">Guide</option>
                    <option value="opinion">Opinion</option>
                    <option value="interview">Interview</option>
                    <option value="investment">Investment</option>
                    <option value="portfolio">Portfolio</option>
                    <option value="stream">Stream</option>
                    <option value="vod">VOD</option>
                    <option value="clip">Clip</option>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">Full Content</span>
                <select class="filter-select" id="f-full">
                    <option value="">Any</option>
                    <option value="true">Full Content Only</option>
                    <option value="false">Partial Only</option>
                </select>
            </div>
            <button class="filter-btn" onclick="resetAndLoad()">Search</button>
            <button class="filter-btn secondary" onclick="clearFilters()">Clear</button>
        </div>

        <div id="result-bar" class="result-bar" style="display:none">
            <div class="result-count" id="result-count"></div>
            <div class="pagination">
                <button class="page-btn" id="btn-prev" onclick="prevPage()" disabled>Previous</button>
                <button class="page-btn" id="btn-next" onclick="nextPage()">Next</button>
            </div>
        </div>

        <div id="articles-list" class="articles-list">
            <div style="display:flex;flex-direction:column;gap:12px;padding:8px"><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div></div>
        </div>
    </div>

    <!-- Detail modal -->
    <div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">x</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        let currentSkip = 0;
        const PAGE_SIZE = 30;
        let lastResultCount = 0;

        // Use shared utilities from nav.js (gprTimeAgo, gprEsc, gprFmt)
        function timeAgo(iso) { return typeof gprTimeAgo === 'function' ? gprTimeAgo(iso) : (iso || 'Unknown'); }
        function escapeHtml(str) { return typeof gprEsc === 'function' ? gprEsc(str) : (str || ''); }

        // Load languages into filter
        async function loadLanguages() {
            try {
                const res = await fetch('/api/languages');
                const langs = await res.json();
                const sel = document.getElementById('f-language');
                for (const [code, name] of Object.entries(langs)) {
                    const opt = document.createElement('option');
                    opt.value = code;
                    opt.textContent = name;
                    sel.appendChild(opt);
                }
            } catch (e) { /* ignore */ }
        }

        function buildQuery() {
            const params = new URLSearchParams();
            const search = document.getElementById('f-search').value.trim();
            const language = document.getElementById('f-language').value;
            const type = document.getElementById('f-type').value;
            const full = document.getElementById('f-full').value;

            const source = document.getElementById('f-source').value;
            if (search) params.set('search', search);
            if (language) params.set('language', language);
            if (type) params.set('article_type', type);
            if (full) params.set('has_full_content', full);
            if (source) params.set('outlet_category', source);
            params.set('skip', currentSkip);
            params.set('limit', PAGE_SIZE);
            return params.toString();
        }

        async function loadArticles() {
            const list = document.getElementById('articles-list');
            list.innerHTML = '<div style="display:flex;flex-direction:column;gap:12px;padding:8px"><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div></div>';

            try {
                const res = await fetch(`/api/scraper/articles?${buildQuery()}`);
                const articles = await res.json();
                lastResultCount = articles.length;

                document.getElementById('result-bar').style.display = 'flex';
                document.getElementById('result-count').innerHTML = `Showing <strong>${currentSkip + 1}</strong>-<strong>${currentSkip + articles.length}</strong> articles`;
                document.getElementById('btn-prev').disabled = currentSkip === 0;
                document.getElementById('btn-next').disabled = articles.length < PAGE_SIZE;

                if (articles.length === 0) {
                    const cat = typeof gprGetCategory === 'function' ? gprGetCategory() : '';
                    const labels = {gaming_news:'articles', gaming_vc:'VC posts', gaming_streamer:'streamer content'};
                    const contentType = labels[cat] || 'content';
                    list.innerHTML = `<div class="gpr-empty">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                        <div class="msg">No ${contentType} found</div>
                        <div class="hint">Try adjusting your filters or run a scrape first</div>
                    </div>`;
                    return;
                }

                const CAT_LABELS = {gaming_news:'News', gaming_vc:'VC', gaming_streamer:'Streamer'};
                const CAT_CLASSES = {gaming_news:'badge-cyan', gaming_vc:'badge-green', gaming_streamer:'badge-orange'};
                list.innerHTML = articles.map(a => {
                    const catLabel = a.outlet_category ? CAT_LABELS[a.outlet_category] || a.outlet_category : null;
                    const catClass = a.outlet_category ? CAT_CLASSES[a.outlet_category] || 'badge-accent' : '';
                    return `
                    <div class="article-card" onclick="openArticle(${a.id})">
                        <div>
                            <div class="article-title">
                                <a href="${escapeHtml(a.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${escapeHtml(a.title)}</a>
                            </div>
                            <div class="article-meta">
                                ${a.outlet_name ? `<span style="font-weight:600">${escapeHtml(a.outlet_name)}</span><span class="sep">|</span>` : ''}
                                ${catLabel ? `<span class="badge ${catClass}">${catLabel}</span>` : ''}
                                ${a.author ? `<span>${escapeHtml(a.author)}</span><span class="sep">|</span>` : ''}
                                <span>${timeAgo(a.published_at || a.scraped_at)}</span>
                                <span class="sep">|</span>
                                <span class="badge badge-accent">${a.language || '?'}</span>
                                ${a.article_type ? `<span class="badge badge-cyan">${a.article_type}</span>` : ''}
                                ${a.is_full_content ? '<span class="badge badge-green">full</span>' : '<span class="badge badge-orange">partial</span>'}
                                ${a.word_count ? `<span>${a.word_count.toLocaleString()} words</span>` : ''}
                                ${a.reading_time_minutes ? `<span>${a.reading_time_minutes} min read</span>` : ''}
                            </div>
                            ${a.summary ? `<div class="article-summary">${escapeHtml(a.summary)}</div>` : ''}
                            <div class="article-tags">
                                ${(a.categories || []).slice(0,3).map(c => `<span class="tag">${escapeHtml(c)}</span>`).join('')}
                                ${(a.game_titles || []).slice(0,3).map(g => `<span class="tag">${escapeHtml(g)}</span>`).join('')}
                                ${(a.platforms || []).slice(0,3).map(p => `<span class="tag">${escapeHtml(p)}</span>`).join('')}
                            </div>
                        </div>
                        ${a.featured_image_url ? `<img class="article-thumb" src="${escapeHtml(a.featured_image_url)}" alt="" onerror="this.style.display='none'">` : ''}
                    </div>
                `}).join('');
            } catch (err) {
                list.innerHTML = `<div class="empty-state">
                    <div style="color:var(--red);font-weight:600;margin-bottom:8px">Failed to load articles</div>
                    <div>${err.message}</div>
                    <button class="filter-btn" style="margin-top:16px" onclick="loadArticles()">Retry</button>
                </div>`;
            }
        }

        async function openArticle(id) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            modal.classList.add('open');
            content.innerHTML = '<div class="loading"><div class="spinner"></div> Loading article...</div>';

            try {
                const res = await fetch(`/api/scraper/articles/${id}`);
                const a = await res.json();

                content.innerHTML = `
                    <h2>${escapeHtml(a.title)}</h2>
                    ${a.featured_image_url ? `<img src="${escapeHtml(a.featured_image_url)}" style="width:100%;border-radius:10px;margin-bottom:20px;max-height:300px;object-fit:cover" onerror="this.style.display='none'">` : ''}
                    <div class="modal-meta">
                        ${a.author ? `<dl><dt>Author</dt><dd>${escapeHtml(a.author)}</dd></dl>` : ''}
                        ${a.published_at ? `<dl><dt>Published</dt><dd>${timeAgo(a.published_at)}</dd></dl>` : ''}
                        ${a.language ? `<dl><dt>Language</dt><dd>${a.language}</dd></dl>` : ''}
                        ${a.article_type ? `<dl><dt>Type</dt><dd>${a.article_type}</dd></dl>` : ''}
                        ${a.word_count ? `<dl><dt>Words</dt><dd>${a.word_count.toLocaleString()}</dd></dl>` : ''}
                        ${a.reading_time_minutes ? `<dl><dt>Reading Time</dt><dd>${a.reading_time_minutes} min</dd></dl>` : ''}
                    </div>

                    ${a.summary ? `<div class="modal-section"><div class="modal-section-title">Summary</div><div class="modal-body">${escapeHtml(a.summary)}</div></div>` : ''}

                    ${a.full_body_text ? `<div class="modal-section"><div class="modal-section-title">Full Content</div><div class="modal-body" style="max-height:300px;overflow-y:auto;padding:12px;background:var(--bg-primary);border-radius:8px">${escapeHtml(a.full_body_text).substring(0, 5000)}${a.full_body_text.length > 5000 ? '...' : ''}</div></div>` : ''}

                    <div class="modal-section">
                        <div class="modal-section-title">Details</div>
                        <div class="detail-grid">
                            <div class="detail-item"><dt>Source URL</dt><dd><a href="${escapeHtml(a.url)}" target="_blank" rel="noopener" style="color:var(--accent-light);word-break:break-all">${escapeHtml(a.url)}</a></dd></div>
                            ${a.outlet_id ? `<div class="detail-item"><dt>Outlet ID</dt><dd>#${a.outlet_id}</dd></div>` : ''}
                            <div class="detail-item"><dt>Full Content</dt><dd>${a.is_full_content ? 'Yes' : 'No'}</dd></div>
                            ${a.scraped_at ? `<div class="detail-item"><dt>Scraped</dt><dd>${timeAgo(a.scraped_at)}</dd></div>` : ''}
                            ${a.comment_count !== null && a.comment_count !== undefined ? `<div class="detail-item"><dt>Comments</dt><dd>${a.comment_count}</dd></div>` : ''}
                            ${a.rating_score ? `<div class="detail-item"><dt>Rating</dt><dd>${a.rating_score}${a.rating_max ? '/' + a.rating_max : ''}</dd></div>` : ''}
                        </div>
                    </div>

                    ${(a.categories && a.categories.length) || (a.tags && a.tags.length) || (a.game_titles && a.game_titles.length) || (a.platforms && a.platforms.length) ? `
                    <div class="modal-section">
                        <div class="modal-section-title">Tags & Classification</div>
                        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">
                            ${(a.categories||[]).map(c => `<span class="tag">${escapeHtml(c)}</span>`).join('')}
                            ${(a.tags||[]).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
                            ${(a.game_titles||[]).map(g => `<span class="tag" style="background:rgba(236,72,153,0.1);color:var(--pink)">${escapeHtml(g)}</span>`).join('')}
                            ${(a.platforms||[]).map(p => `<span class="tag" style="background:var(--cyan-dim);color:var(--cyan)">${escapeHtml(p)}</span>`).join('')}
                        </div>
                    </div>` : ''}

                    ${a.meta_description ? `<div class="modal-section"><div class="modal-section-title">SEO Description</div><div style="font-size:0.85rem;color:var(--text-secondary)">${escapeHtml(a.meta_description)}</div></div>` : ''}
                `;
            } catch (err) {
                content.innerHTML = `<div style="color:var(--red);padding:20px">Failed to load article: ${err.message}</div>`;
            }
        }

        function closeModal() { document.getElementById('modal').classList.remove('open'); }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        function resetAndLoad() { currentSkip = 0; loadArticles(); }
        function prevPage() { currentSkip = Math.max(0, currentSkip - PAGE_SIZE); loadArticles(); }
        function nextPage() { currentSkip += PAGE_SIZE; loadArticles(); }

        function clearFilters() {
            document.getElementById('f-search').value = '';
            document.getElementById('f-source').value = '';
            document.getElementById('f-language').value = '';
            document.getElementById('f-type').value = '';
            document.getElementById('f-full').value = '';
            resetAndLoad();
        }

        // Enter key to search
        const debouncedSearch = typeof gprDebounce === 'function' ? gprDebounce(resetAndLoad, 400) : resetAndLoad;
        document.getElementById('f-search').addEventListener('input', debouncedSearch);
        document.getElementById('f-search').addEventListener('keydown', e => { if (e.key === 'Enter') resetAndLoad(); });

        // Sync with global category
        setTimeout(() => {
            const gCat = typeof gprGetCategory === 'function' ? gprGetCategory() : '';
            if (gCat) document.getElementById('f-source').value = gCat;
            const h1 = document.querySelector('h1');
            if (h1 && gCat) {
                const labels = {gaming_news:'Scraped Articles', gaming_vc:'VC Posts & News', gaming_streamer:'Streamer Content'};
                h1.textContent = labels[gCat] || 'Scraped Content';
            }
        }, 50);
        window.addEventListener('gpr-category-change', e => {
            const cat = e.detail.category || '';
            document.getElementById('f-source').value = cat;
            const h1 = document.querySelector('h1');
            const labels = {gaming_news:'Scraped Articles', gaming_vc:'VC Posts & News', gaming_streamer:'Streamer Content'};
            h1.textContent = labels[cat] || 'Scraped Content';
            resetAndLoad();
        });

        loadLanguages();
        loadArticles();
    </script>
</body>
</html>
