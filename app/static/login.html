<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Gaming PR Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #16161f;
            --border: #2a2a3a;
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --accent: #7c5cff;
            --accent-light: #9b7fff;
            --green: #22c55e;
            --red: #f87171;
            --radius: 12px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #1a0033 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(124, 92, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124, 92, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: calc(var(--radius) * 2);
            padding: 48px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
        }

        .login-logo-text {
            font-size: 18px;
            font-weight: 700;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124, 92, 255, 0.1);
        }

        input::placeholder {
            color: var(--text-secondary);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 24px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .forgot-password {
            color: var(--accent-light);
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-password:hover {
            color: var(--accent);
        }

        .btn {
            width: 100%;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-login {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            color: white;
            margin-bottom: 16px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(124, 92, 255, 0.3);
        }

        .btn-demo {
            background: transparent;
            color: var(--accent-light);
            border: 1px solid var(--accent);
        }

        .btn-demo:hover {
            background: rgba(124, 92, 255, 0.1);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: var(--text-secondary);
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .signup-prompt {
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 24px;
        }

        .signup-prompt a {
            color: var(--accent-light);
            text-decoration: none;
            font-weight: 600;
        }

        .signup-prompt a:hover {
            color: var(--accent);
        }

        .error-message {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: var(--red);
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: var(--green);
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        .loading {
            display: inline-block;
            width: 4px;
            height: 4px;
            background: currentColor;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .loading:nth-child(2) { animation-delay: 0.2s; }
        .loading:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { opacity: 0.3; }
            40% { opacity: 1; }
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            margin-top: 24px;
            text-align: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent-light);
        }
    </style>
</head>
<body>
<div class="bg-grid"></div>

<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <div class="logo-icon">GP</div>
                <div class="login-logo-text">Gaming PR</div>
            </div>
            <h1>Welcome Back</h1>
            <p>Access your gaming news scraping dashboard</p>
        </div>

        <form id="login-form">
            <div id="error-message" class="error-message"></div>
            <div id="success-message" class="success-message"></div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="hello@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" name="remember" id="remember">
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-login" id="login-btn">Sign In</button>
            <button type="button" class="btn btn-demo" onclick="demoLogin()">Demo Account</button>
        </form>

        <div class="divider">or</div>

        <div style="text-align: center; color: var(--text-secondary); font-size: 13px;">
            <p style="margin-bottom: 16px;">🚀 API access coming soon<br>Early access via /docs endpoint</p>
        </div>

        <div class="signup-prompt">
            Don't have an account? <a href="/">Contact us</a>
        </div>

        <a href="/" class="back-link">← Back to home</a>
    </div>
</div>

<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('login-btn');
        const errorEl = document.getElementById('error-message');
        const successEl = document.getElementById('success-message');

        // Hide messages
        errorEl.style.display = 'none';
        successEl.style.display = 'none';

        // Disable button
        btn.disabled = true;
        const originalText = btn.textContent;
        btn.textContent = 'Signing in...';

        try {
            // For now, show a demo message
            // In production, you'd authenticate against a real endpoint
            successEl.textContent = '✓ Authentication ready! API endpoints require appropriate headers.';
            successEl.style.display = 'block';

            setTimeout(() => {
                window.location.href = '/';
            }, 1500);
        } catch (err) {
            errorEl.textContent = '✗ ' + (err.message || 'Login failed. Please try again.');
            errorEl.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = originalText;
        }
    });

    function demoLogin() {
        document.getElementById('email').value = 'demo@gaming-pr.com';
        document.getElementById('password').value = 'demo-password';
        document.getElementById('login-form').dispatchEvent(new Event('submit'));
    }
</script>
</body>
</html>
